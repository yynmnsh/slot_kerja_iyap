        /* --- CRYPTOGRAPHY --- */
        const hashPassword = async (text) => {
            if (!text) return text;
            const msgUint8 = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        /* --- HELPER FUNCTIONS --- */
        const formatDate = (dateString, lang = 'id') => {
            if (!dateString) return '';
            let dateObj = dateString.includes('T') ? new Date(dateString) : new Date(dateString.split('-')[0], dateString.split('-')[1]-1, dateString.split('-')[2]);
            return dateObj.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { weekday: 'short', day: 'numeric', month: 'short' });
        };
        
        const formatFullDate = (dateString, lang = 'id') => {
            if (!dateString) return '';
            let dateObj = dateString.includes('T') ? new Date(dateString) : new Date(dateString.split('-')[0], dateString.split('-')[1]-1, dateString.split('-')[2]);
            return dateObj.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'long', year: 'numeric' });
        };

        const formatTimeInZone = (dateObj, timeZone) => {
            return dateObj.toLocaleTimeString('en-US', { timeZone, hour12: false, hour: '2-digit', minute: '2-digit' });
        };

        const getEpochFromWIB = (dateStr, timeStr) => {
            if (!dateStr || !timeStr) return 0;
            const [y, m, d] = dateStr.split('-').map(Number);
            const [hr, min] = timeStr.split(':').map(Number);
            return Date.UTC(y, m - 1, d, hr - TZ_CONFIG['WIB'].offsetUTC, min, 0); 
        };

        const getDbTime = (timeStr, dateStr, tzCode) => {
            if (!timeStr || !dateStr) return { date: dateStr, time: timeStr };
            if (tzCode === 'WIB') return { date: dateStr, time: timeStr };
            const diffHours = TZ_CONFIG['WIB'].offsetUTC - TZ_CONFIG[tzCode].offsetUTC;
            const d = new Date(`${dateStr}T${timeStr}:00Z`);
            d.setUTCHours(d.getUTCHours() + diffHours); 
            
            const yearStr = d.getUTCFullYear();
            const monthStr = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dayStr = String(d.getUTCDate()).padStart(2, '0');
            const hourStr = String(d.getUTCHours()).padStart(2, '0');
            const minStr = String(d.getUTCMinutes()).padStart(2, '0');
            
            return { date: `${yearStr}-${monthStr}-${dayStr}`, time: `${hourStr}:${minStr}` };
        };

        const getDisplayTime = (timeStr, dateStr, tzCode) => {
            if (!timeStr || !dateStr) return { date: dateStr, time: timeStr, originalObj: new Date() };
            const epoch = getEpochFromWIB(dateStr, timeStr);
            const d = new Date(epoch + TZ_CONFIG[tzCode].offsetUTC * 3600000);
            
            const yearStr = d.getUTCFullYear();
            const monthStr = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dayStr = String(d.getUTCDate()).padStart(2, '0');
            const hourStr = String(d.getUTCHours()).padStart(2, '0');
            const minStr = String(d.getUTCMinutes()).padStart(2, '0');
            
            return { date: `${yearStr}-${monthStr}-${dayStr}`, time: `${hourStr}:${minStr}`, originalObj: new Date(epoch) };
        };

        const getPSTDayFromEpoch = (epoch) => {
            const d = new Date(epoch + TZ_CONFIG['PST'].offsetUTC * 3600000); 
            const yearStr = d.getUTCFullYear();
            const monthStr = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dayStr = String(d.getUTCDate()).padStart(2, '0');
            return `${yearStr}-${monthStr}-${dayStr}`;
        };

        const getPSTDay = (dbDateStr, dbTimeStr) => {
            if (!dbDateStr || !dbTimeStr) return null;
            const epoch = getEpochFromWIB(dbDateStr, dbTimeStr);
            return getPSTDayFromEpoch(epoch);
        };

        const formatCurrency = (amount, lang = 'id') => {
            const num = parseFloat(amount) || 0;
            if (lang === 'id') {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
            }
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
        };

        const showToastError = (showNotify, message) => {
            showNotify(message, "error", 4000); 
        };

            return <i className="fas fa-circle-notch fa-spin text-white"></i>;

                    </div>

                        <i className="fas fa-times opacity-90 hover:opacity-100"></i>
                    </button>
                </div>
            );

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 animate-fade-in backdrop-blur-sm">

                        <div className="flex items-center gap-3 mb-3 text-orange-500">
                            <i className="fas fa-exclamation-triangle text-xl"></i>
                            <h3 className="text-lg font-bold text-slate-800">{t.common.confirmTitle}</h3>
                        </div>
                        <p className="text-slate-600 mb-6 font-medium leading-relaxed">{message}</p>
                        <div className="flex gap-2">
                            <button onClick={onCancel} className="flex-1 py-2.5 text-slate-500 font-bold text-sm hover:bg-slate-50 border border-slate-200 rounded-xl transition">
                                {t.common.cancel}
                            </button>
                            <button onClick={onConfirm} className="flex-1 py-2.5 bg-indigo-600 text-white font-bold text-sm rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition">
                                {t.common.yes}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const PasswordModal = ({ mode, onSubmit, onClose, loading, t, showNotify, userName }) => {
            const [password, setPassword] = React.useState('');
            
            const handleSubmit = (e) => { 
                e.preventDefault();

            let btnText = mode === 'create' ? t.auth.createBtn : mode === 'change' ? t.auth.changeBtn : t.auth.loginBtn;
            let isChangeMode = mode === 'change' || mode === 'create';

            return (
                 <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 animate-fade-in backdrop-blur-sm">
                    <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold text-slate-800">
                                {title}
                                {userName && <span className="text-blue-600 border-l-2 border-slate-200 pl-2 ml-2">{userName}</span>}
                            </h3>
                            <button type="button" onClick={onClose} className="text-slate-400 hover:text-slate-600">

                for(let i=0; i<7; i++) {
                    const tempD = new Date(Date.UTC(y, m - 1, d - i));
                    const yy = tempD.getUTCFullYear();
                    const mm = String(tempD.getUTCMonth()+1).padStart(2,'0');
                    const dd = String(tempD.getUTCDate()).padStart(2,'0');
                    dates.push(`${yy}-${mm}-${dd}`);
                }
                return dates;
            };
            
            const rangeDays = getLast7DaysPST();
            const my7DaysSheets = timesheets.filter(ts => String(ts.userId) === String(currentUser) && rangeDays.includes(getPSTDay(ts.date, ts.startTime)));

            const my7DaysEarnings = (my7DaysMinutes / 60) * rate;
            
            const myPendingSheets = timesheets.filter(ts => String(ts.userId) === String(currentUser) && ts.status === 'pending');
            const myPendingMinutes = myPendingSheets.reduce((acc, ts) => acc + parseInt(ts.duration || 0), 0);

                paidGroups[dateKey].totalMinutes += parseInt(ts.duration || 0);
                paidGroups[dateKey].dates.push(getPSTDay(ts.date, ts.startTime) || ts.date);

            const sortedPaidHistory = Object.keys(paidGroups).sort((a,b) => new Date(b) - new Date(a));

            const disciplineData = rangeDays.map(pstDateStr => {
                const dailySchedules = schedules.filter(s => String(s.userId) === String(currentUser) && getPSTDay(s.startDate || s.date, s.startTime) === pstDateStr).map(s => {
                    const startConv = getDisplayTime(s.startTime, s.startDate || s.date, timezone);
                    const endConv = getDisplayTime(s.endTime, s.endDate || s.date, timezone);
                    const startEpoch = getEpochFromWIB(s.startDate || s.date, s.startTime);
                    let endEpoch = getEpochFromWIB(s.endDate || s.date, s.endTime);
                    if (!s.endDate && endEpoch <= startEpoch) endEpoch += 86400000;
                    return { 
                        id: s.id, 
                        start: startConv.time, 
                        end: endConv.time, 
                        origStart: startConv.originalObj, 
                        planMins: (endEpoch - startEpoch) / 60000, 
                        actualMins: 0, 
                        matched: [] 
                    };
                });
                
                const dailySheets = timesheets.filter(ts => String(ts.userId) === String(currentUser) && getPSTDay(ts.date, ts.startTime) === pstDateStr);
                const unplanned = [];
                
                dailySheets.forEach(ts => {
                    const tConv = getDisplayTime(ts.startTime, ts.date, timezone);
                    let bestMatch = ts.scheduleId ? dailySchedules.find(s => s.id === ts.scheduleId) : null;
                    if (!bestMatch) {
                        let minDiff = Infinity;
                        dailySchedules.forEach(s => { 
                            let diff = Math.abs((s.origStart - tConv.originalObj) / 60000); 
                            if (diff < 180 && diff < minDiff) { 
                                minDiff = diff; 
                                bestMatch = s; 
                            } 
                        });
                    }
                    if (bestMatch) { 
                        bestMatch.actualMins += parseInt(ts.duration || 0); 
                        bestMatch.matched.push(ts);

                return { date: pstDateStr, schedules: dailySchedules, unplanned };

        const ScheduleManager = ({ editScheduleId, setEditScheduleId, scheduleForm, setScheduleForm, saveSchedule, loading, schedules, currentUser, getUserColor, getUserName, deleteSchedule, editSchedule, isAdmin, lang, t, timezone, sysSettings, showNotify }) => {
            const [showHistory, setShowHistory] = React.useState(false);
            const [filterMine, setFilterMine] = React.useState(false);
            const [sortOrder, setSortOrder] = React.useState('asc'); 
            
            const currentObj = new Date(Date.now() + TZ_CONFIG[timezone].offsetUTC * 3600000);
            const cy = currentObj.getUTCFullYear();
            const cm = String(currentObj.getUTCMonth() + 1).padStart(2, '0');
            const cd = String(currentObj.getUTCDate()).padStart(2, '0');
            const displayDate = scheduleForm.startDate || `${cy}-${cm}-${cd}`;

            const targetPstDate = React.useMemo(() => {
                if (scheduleForm.startDate && scheduleForm.startTime) {
                    return getPSTDayFromEpoch(getEpochFromWIB(getDbTime(scheduleForm.startTime, scheduleForm.startDate, timezone).date, getDbTime(scheduleForm.startTime, scheduleForm.startDate, timezone).time));
                }
                return getPSTDayFromEpoch(Date.now());
            }, [scheduleForm.startDate, scheduleForm.startTime, timezone]);

            const MAX_MINUTES = (sysSettings?.dailyQuotaHours || 10) * 60; 
            
            const dailyUsedMinutes = React.useMemo(() => {
                if (!targetPstDate) return 0;
                return schedules.filter(s => editScheduleId !== s.id && getPSTDay(s.startDate || s.date, s.startTime) === targetPstDate).reduce((acc, s) => {
                         const startEpoch = getEpochFromWIB(s.startDate || s.date, s.startTime);
                         let endEpoch = getEpochFromWIB(s.endDate || s.date, s.endTime);
                         if (!s.endDate && endEpoch <= startEpoch) endEpoch += 86400000;
                         return acc + Math.floor((endEpoch - startEpoch)/60000);
                    }, 0);
            }, [schedules, targetPstDate, editScheduleId]);

            const remainingMinutes = Math.max(0, MAX_MINUTES - dailyUsedMinutes);
            const usedPercentage = Math.min(100, (dailyUsedMinutes / MAX_MINUTES) * 100);
            const isCritical = remainingMinutes < 60;
            const isFormDirty = scheduleForm.startDate !== '' || scheduleForm.startTime !== '14:00' || scheduleForm.endDate !== '' || scheduleForm.endTime !== '15:00';

            const filteredSchedules = React.useMemo(() => {
                let filtered = [...schedules];
                if (!showHistory) {
                    const currentEpoch = Date.now();
                    filtered = filtered.filter(s => {
                        const startEpoch = getEpochFromWIB(s.startDate || s.date, s.startTime);
                        let endEpoch = getEpochFromWIB(s.endDate || s.date, s.endTime);
                        if (!s.endDate && endEpoch <= startEpoch) endEpoch += 86400000; 
                        return endEpoch > currentEpoch;
                    });
                }
                if (filterMine) filtered = filtered.filter(s => String(s.userId) === String(currentUser));
                
                filtered.sort((a,b) => sortOrder === 'asc' 
                    ? getEpochFromWIB(a.startDate || a.date, a.startTime) - getEpochFromWIB(b.startDate || b.date, b.startTime) 
                    : getEpochFromWIB(b.startDate || b.date, b.startTime) - getEpochFromWIB(a.startDate || a.date, a.startTime));
                return filtered;
            }, [schedules, showHistory, filterMine, sortOrder, currentUser]);

            const timelineBlocks = [];
            schedules.forEach(s => {
                if (editScheduleId && s.id === editScheduleId) return; 
                
                const uiStart = getDisplayTime(s.startTime, s.startDate || s.date, timezone);
                const uiEnd = getDisplayTime(s.endTime, s.endDate || s.date, timezone);
                const startMins = parseInt(uiStart.time.split(':')[0]) * 60 + parseInt(uiStart.time.split(':')[1]);
                const endMins = parseInt(uiEnd.time.split(':')[0]) * 60 + parseInt(uiEnd.time.split(':')[1]);
                
                if (uiStart.date === displayDate && uiEnd.date === displayDate) { 
                    if(endMins - startMins > 0) timelineBlocks.push({...s, startPct: startMins/1440*100, widthPct: (endMins - startMins)/1440*100, uiStart, uiEnd}); 
                } else if (uiStart.date === displayDate && uiEnd.date > displayDate) { 
                    timelineBlocks.push({...s, startPct: startMins/1440*100, widthPct: (1440 - startMins)/1440*100, uiStart, uiEnd}); 
                } else if (uiEnd.date === displayDate && uiStart.date < displayDate) { 
                    timelineBlocks.push({...s, startPct: 0, widthPct: endMins/1440*100, uiStart, uiEnd}); 
                } else if (uiStart.date < displayDate && uiEnd.date > displayDate) { 
                    timelineBlocks.push({...s, startPct: 0, widthPct: 100, uiStart, uiEnd}); 
                }
            });

            let previewBlock = null;
            if (scheduleForm.startDate === displayDate && scheduleForm.startTime && scheduleForm.endTime) {
                 const sMins = parseInt(scheduleForm.startTime.split(':')[0]) * 60 + parseInt(scheduleForm.startTime.split(':')[1]);
                 let eMins = parseInt(scheduleForm.endTime.split(':')[0]) * 60 + parseInt(scheduleForm.endTime.split(':')[1]);
                 let pStart = sMins, pEnd = eMins;
                 if (scheduleForm.endDate > scheduleForm.startDate) pEnd = 1440; 
                 else if (eMins < sMins && !scheduleForm.endDate) pEnd = 1440; 
                 
                 const pWidth = (pEnd-pStart)/1440*100;
                 if (pEnd > pStart) previewBlock = { startPct: pStart/1440*100, widthPct: pWidth };
            }

            return (

                                            <i className="fas fa-undo"></i> {t.common.clear}

                                    </div>
                                    <div className="text-[10px] font-medium text-slate-500">
                                        {t.schedule.used}: <span className="font-bold text-slate-700">{(dailyUsedMinutes/60).toFixed(1)}{t.common.unitShort}</span> / <span className="font-bold text-slate-700">{sysSettings?.dailyQuotaHours || 10}{t.common.unitShort}</span>
                                    </div>
                                </div>
                                <div className="w-full bg-slate-200/60 rounded-full h-1.5 overflow-hidden">
                                    <div className={`h-1.5 rounded-full transition-all duration-700 ease-out ${isCritical ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${usedPercentage}%` }}></div>
                                </div>
                                <div className="mt-1.5 text-right">
                                    <span className={`text-[9px] font-bold uppercase ${isCritical ? 'text-red-500' : 'text-blue-600'}`}>
                                        {t.schedule.remaining}: {(remainingMinutes/60).toFixed(1)}{t.common.unitShort}
                                    </span>
                                </div>
                            </div>

                                                <button onClick={() => editTimesheet(item)} title={t.common.edit} className="text-xs text-blue-500"><i className="fas fa-pen"></i></button>
                                                <button onClick={() => deleteTimesheet(item.id)} title={t.common.delete} className="text-xs text-red-500"><i className="fas fa-trash"></i></button>
                                            </div>

                                    </div>

                        {filteredTimesheets.filter(item => filterMine ? String(item.userId) === String(currentUser) : true).length === 0 && (
                            <div className="text-center p-6 bg-slate-50 rounded-xl border border-slate-100 border-dashed">
                                <p className="text-xs font-medium text-slate-400">{t.timesheet.noData}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ timesheets, users, schedules, loading, setLoading, showNotify, t, lang, formatCurrency, getUserColor, timezone, sysSettings, updateSettings, onAddUser, onEditUser, onDeleteUser, onConfirmAction }) => {
             const [viewMode, setViewMode] = React.useState('pending');
             const [settingsForm, setSettingsForm] = React.useState({ dailyQuotaHours: 10, baseHourlyRateUSD: 15, usdToIdr: 16000, offsetWIB: 7, offsetAEDT: 11, offsetPST: -8 });
             
             React.useEffect(() => { 
                 setSettingsForm({ 
                     dailyQuotaHours: sysSettings?.dailyQuotaHours || 10, 
                     baseHourlyRateUSD: sysSettings?.baseHourlyRateUSD || 15, 
                     usdToIdr: sysSettings?.usdToIdr || 16000, 
                     offsetWIB: sysSettings?.offsetWIB !== undefined ? sysSettings.offsetWIB : 7, 
                     offsetAEDT: sysSettings?.offsetAEDT !== undefined ? sysSettings.offsetAEDT : 11, 
                     offsetPST: sysSettings?.offsetPST !== undefined ? sysSettings.offsetPST : -8 
                 }); 
             }, [sysSettings]);

            const getAmount = (item) => { 
                const baseVal = parseFloat(item.paymentUSD) || 0; 
                return lang === 'id' ? baseVal * (RATES.id / RATES.en) : baseVal; 
            };
            
            const pendingSheets = timesheets.filter(t => t.status === 'pending');
            const totalPending = pendingSheets.reduce((sum, t) => sum + getAmount(t), 0);
            const totalPendingMins = pendingSheets.reduce((sum, t) => sum + parseInt(t.duration || 0), 0);
            
            const paidSheets = timesheets.filter(t => t.status === 'paid');
            const totalAllTimePaid = paidSheets.reduce((sum, t) => sum + getAmount(t), 0);
            const totalAllTimePaidMins = paidSheets.reduce((sum, t) => sum + parseInt(t.duration || 0), 0);
            
            const paidHistory = {};
            const weeklyStats = {}; 
            const weeklyMins = {}; 
            const userTotalPaid = {}; 
            const userTotalMins = {}; 
            const userWeeklyPaid = {}; 
            const userWeeklyMins = {};
            const weeklyDateRanges = {}; 

            paidSheets.forEach(t => { 
                const amount = getAmount(t);
                const duration = parseInt(t.duration || 0);
                const pstDay = getPSTDay(t.date, t.startTime) || t.date;
                const d = pstDay; 
                
                if(!paidHistory[d]) paidHistory[d] = []; 
                paidHistory[d].push(t);
                
                const [y, m, day] = d.split('-').map(Number);
                const paidDateObj = new Date(y, m - 1, day);
                const firstDayOfYear = new Date(y, 0, 1);
                const pastDaysOfYear = (paidDateObj - firstDayOfYear) / 86400000;
                const weekNum = Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
                const weekKey = `${y}-W${String(weekNum).padStart(2, '0')}`;

                if (!weeklyDateRanges[weekKey]) {
                    const wStart = new Date(y, 0, 1 + (weekNum - 1) * 7 - firstDayOfYear.getDay());
                    const wEnd = new Date(wStart);
                    wEnd.setDate(wStart.getDate() + 6);
                    
                    const strStart = `${wStart.getDate()} ${wStart.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { month: 'short' })}`;
                    const strEnd = `${wEnd.getDate()} ${wEnd.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { month: 'short' })}`;
                    weeklyDateRanges[weekKey] = `${strStart} - ${strEnd}`;
                }
                
                if (!weeklyStats[weekKey]) { weeklyStats[weekKey] = 0; weeklyMins[weekKey] = 0; }
                weeklyStats[weekKey] += amount;
                weeklyMins[weekKey] += duration;

                if (!userTotalPaid[t.userId]) { userTotalPaid[t.userId] = 0; userTotalMins[t.userId] = 0; }
                userTotalPaid[t.userId] += amount;
                userTotalMins[t.userId] += duration;

                if (!userWeeklyPaid[weekKey]) { userWeeklyPaid[weekKey] = {}; userWeeklyMins[weekKey] = {}; }
                if (!userWeeklyPaid[weekKey][t.userId]) { userWeeklyPaid[weekKey][t.userId] = 0; userWeeklyMins[weekKey][t.userId] = 0; }
                userWeeklyPaid[weekKey][t.userId] += amount;
                userWeeklyMins[weekKey][t.userId] += duration;
            });
            
            const sortedHistory = Object.keys(paidHistory).sort((a,b) => new Date(b) - new Date(a));
            const sortedWeeks = Object.keys(weeklyStats).sort().reverse(); 
            
            const handleMarkPaid = async (sheetIds) => { 
                onConfirmAction(t.timesheet.confirmPaid, async () => { 
                    setLoading(true); 
                    try { 
                        const batch = window.fs.writeBatch(window.db); 
                        sheetIds.forEach(id => { 
                            const docRef = window.fs.doc(window.db, "timesheets", id); 
                            batch.update(docRef, { status: 'paid', paidAt: new Date().toISOString() }); 
                        }); 
                        await batch.commit(); 
                        showNotify(t.admin.markedPaid);

                        showNotify(t.common.error, "error");

                        setLoading(false);

                                <div className="flex items-end gap-2">

                                            acc[curr.userId].sheets.push(curr.id);

                            </div>

                                <div className="h-px bg-slate-200 flex-1"></div>

                            <div className="space-y-4">

                                            <div className="text-right bg-white px-2 py-1 rounded-lg border border-slate-100 shadow-sm">
                                                <p className="text-sm font-black text-slate-800">{formatCurrency(weeklyStats[week], lang)}</p>

                                            {userWeeklyPaid[week] && Object.keys(userWeeklyPaid[week]).sort((a,b) => userWeeklyPaid[week][b] - userWeeklyPaid[week][a]).map(uid => {

                                                const uColor = getUserColor(uid) || '#cbd5e1';
                                                return (
                                                    <div key={uid} className="flex justify-between items-center text-xs group p-1.5 hover:bg-slate-50 rounded-lg transition-colors border border-transparent hover:border-slate-100">
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-5 h-5 rounded-full flex items-center justify-center text-white font-bold text-[8px] shadow-sm group-hover:scale-110 transition-transform" style={{backgroundColor: uColor}}>
                                                                {u?.name ? u.name.substring(0,1).toUpperCase() : '?'}
                                                            </div>

                                                            <span className="text-[9px] font-medium text-slate-400 bg-white px-1.5 py-0.5 rounded border border-slate-100 shadow-sm">{(userWeeklyMins[week][uid]/60).toFixed(1)}{t.common.unitShort}</span>
                                                            <span className="font-bold text-slate-700 min-w-[70px] group-hover:text-green-600 transition-colors">{formatCurrency(userWeeklyPaid[week][uid], lang)}</span>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="flex items-center gap-3 mt-10 mb-4">
                                <div className="h-px bg-slate-200 flex-1"></div>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest"><i className="fas fa-calendar-day mr-1 text-emerald-500"></i> {t.admin.sectionDaily}</span>
                                <div className="h-px bg-slate-200 flex-1"></div>
                            </div>

                            <div className="space-y-6">
                                {sortedHistory.map((d, index) => (
                                    <div key={d} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow duration-300 animate-slide-up" style={{animationDelay: `${index * 0.05}s`}}>
                                        <div className="flex items-center gap-2 mb-4 border-b border-slate-100 pb-3">
                                            <div className="bg-green-100 text-green-600 p-1.5 rounded-lg">
                                                <i className="fas fa-calendar-day"></i>
                                            </div>
                                            <h4 className="text-sm font-bold text-slate-700 tracking-wide">{formatFullDate(d, lang)} ({t.common.pst})</h4>
                                        </div>
                                        <div className="space-y-3">
                                            {paidHistory[d].sort((a,b) => getAmount(b) - getAmount(a)).map((item, idx) => { 
                                                const u = users.find(u => String(u.id) === String(item.userId)); 
                                                const uColor = getUserColor(item.userId) || '#cbd5e1';
                                                
                                                const uiStart = getDisplayTime(item.startTime, item.date, timezone);
                                                let endTimeStr = '...';
                                                if (item.endTime) {
                                                    endTimeStr = getDisplayTime(item.endTime, item.endDate || item.date, timezone).time;
                                                } else if (item.duration) {
                                                    const startEpoch = getEpochFromWIB(item.date, item.startTime);
                                                    const endEpoch = startEpoch + (item.duration * 60000);
                                                    const targetOffset = TZ_CONFIG[timezone].offsetUTC;
                                                    const dObj = new Date(endEpoch + targetOffset * 3600000);
                                                    endTimeStr = `${String(dObj.getUTCHours()).padStart(2, '0')}:${String(dObj.getUTCMinutes()).padStart(2, '0')}`;
                                                }

                                                return (
                                                    <div key={item.id} className="group relative flex items-center justify-between p-3 rounded-xl border border-transparent hover:border-slate-200 hover:bg-slate-50 transition-all duration-200">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-xs shadow-sm transition-transform group-hover:scale-110" style={{backgroundColor: uColor}}>
                                                                {u?.name ? u.name.substring(0,2).toUpperCase() : '?'}
                                                            </div>
                                                            <div>
                                                                <span className="font-bold text-slate-700 text-sm block group-hover:text-slate-900 transition-colors">{u?.name || t.common.unknown}</span>

                                                        </div>
                                                    </div> 
                                                )
                                            })}

                                    </div>
                                ))}
                            </div>
                        </div> 
                    )}

                    {viewMode === 'settings' && (

                                            <input type="number" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 font-bold" value={settingsForm.usdToIdr} onChange={e => setSettingsForm({...settingsForm, usdToIdr: Number(e.target.value)})} />

                                    {t.admin.userList}
                                    <InfoTooltip text={t.tooltips.adminInfo} />
                                </h3>
                                <button onClick={onAddUser} className="bg-blue-600 text-white text-xs px-3 py-1.5 rounded-lg">{t.admin.addUser}</button>
                            </div>
                            <div className="bg-white rounded-xl border border-slate-200 divide-y">
                                {users.map(u => {
                                    return (
                                        <div key={u.id} className={`p-3 flex items-center justify-between ${u.hidden ? 'opacity-60 bg-slate-50' : ''}`}>
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold" style={{backgroundColor: u.color}}>
                                                    {u.name.substring(0,2)}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-sm text-slate-700 flex items-center gap-2">
                                                        {u.name}
                                                        {u.hidden && <span className="text-[9px] bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded uppercase tracking-wider">{t.admin.inactive}</span>}
                                                    </p>
                                                    <p className="text-xs text-slate-400">{u.bankName || '-'}</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => onEditUser(u)} title={t.common.edit} className="text-blue-500 text-xs">
                                                    <i className="fas fa-pen"></i>
                                                </button>
                                                <button onClick={() => onDeleteUser(u.id)} title={t.common.delete} className="text-red-500 text-xs">
                                                    <i className="fas fa-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div> 
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = React.useState('dashboard');
            const [currentUser, setCurrentUser] = React.useState(null);
            const [users, setUsers] = React.useState([]);
            const [schedules, setSchedules] = React.useState([]);
            const [timesheets, setTimesheets] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [notify, setNotify] = React.useState(null);
            const [sysSettings, setSysSettings] = React.useState({ dailyQuotaHours: 10 });
            const [showProfileModal, setShowProfileModal] = React.useState(false);
            const [showUserModal, setShowUserModal] = React.useState(false);
            const [passwordModal, setPasswordModal] = React.useState({ show: false, mode: 'login', userId: null });
            const [editingUser, setEditingUser] = React.useState(null);
            
            const [lang, setLang] = React.useState('en'); 
            const [timezone, setTimezone] = React.useState('AEDT'); 
            const t = TRANSLATIONS[lang];
            
            const [scheduleForm, setScheduleForm] = React.useState({ startDate: '', startTime: '14:00', endDate: '', endTime: '15:00' });
            const [editScheduleId, setEditScheduleId] = React.useState(null);
            const [timesheetForm, setTimesheetForm] = React.useState({ scheduleId: '', date: '', startTime: '', endDate: '', endTime: '' });
            const [editTimesheetId, setEditTimesheetId] = React.useState(null);
            const [confirmModal, setConfirmModal] = React.useState({ show: false, message: '', action: null });

            React.useEffect(() => {
                const initData = async () => {
                    if (!window.db) return;

                    window.fs.onSnapshot(window.fs.collection(window.db, 'users'), (snapshot) => {
                        const fetchedUsers = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                        if(fetchedUsers.length === 0) { 
                            setUsers(INITIAL_USERS); 
                            INITIAL_USERS.forEach(async (u) => {
                                try {
                                    await window.fs.setDoc(window.fs.doc(window.db, 'users', u.id), u);
                                } catch(e) {}
                            }); 
                        } else { 
                            setUsers(fetchedUsers); 
                        }
                    }, (err) => console.error("Users error:", err.message));
                    
                    window.fs.onSnapshot(window.fs.query(window.fs.collection(window.db, 'schedules')), (snapshot) => { 
                        setSchedules(snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}))); 
                    }, (err) => console.error(err));
                    
                    window.fs.onSnapshot(window.fs.query(window.fs.collection(window.db, 'timesheets')), (snapshot) => { 
                        setTimesheets(snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}))); 
                    }, (err) => console.error(err));
                    
                    window.fs.onSnapshot(window.fs.doc(window.db, 'settings', 'global'), (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setSysSettings(data);
                            if (data.baseHourlyRateUSD !== undefined) RATES.en = data.baseHourlyRateUSD;
                            if (data.baseHourlyRateUSD !== undefined && data.usdToIdr !== undefined) RATES.id = data.baseHourlyRateUSD * data.usdToIdr;
                            if (data.offsetWIB !== undefined) TZ_CONFIG['WIB'].offsetUTC = data.offsetWIB;
                            if (data.offsetAEDT !== undefined) TZ_CONFIG['AEDT'].offsetUTC = data.offsetAEDT;
                            if (data.offsetPST !== undefined) TZ_CONFIG['PST'].offsetUTC = data.offsetPST;
                        } else {
                            window.fs.setDoc(window.fs.doc(window.db, 'settings', 'global'), { 
                                dailyQuotaHours: 10, baseHourlyRateUSD: 15, usdToIdr: 16000, 
                                offsetWIB: 7, offsetAEDT: 11, offsetPST: -8 
                            }).catch(e => {});
                        }
                    }, (err) => console.error(err));
                };
                
                if (window.fa && window.auth) {
                    window.fa.signInAnonymously(window.auth).then(() => {
                        initData();
                    }).catch(err => {
                        console.error("Anonymous auth failed (might be preview environment):", err);
                        initData();
                    });
                } else {
                    initData();
                }
                
            }, []);

            const showNotify = (msg, type = 'success', duration = 3000) => { setNotify({ msg, type }); if (duration > 0) setTimeout(() => setNotify(null), duration); };
            const getUserName = (uid) => users.find(u => String(u.id) === String(uid))?.name || t.common.unknown;
            const getUserColor = (uid) => users.find(u => String(u.id) === String(uid))?.color || '#cbd5e1';
            const triggerConfirm = (message, action) => { setConfirmModal({ show: true, message, action }); };
            const executeConfirm = () => { if (confirmModal.action) confirmModal.action(); setConfirmModal({ show: false, message: '', action: null }); };
            
            const saveUserProfile = async (data) => { 
                if(!currentUser) return; 
                setLoading(true); 
                try { 
                    await window.fs.updateDoc(window.fs.doc(window.db, 'users', currentUser), data); 
                    showNotify(t.common.saved); 
                    setShowProfileModal(false); 
                } catch(e) { 
                    showNotify(t.common.error, "error"); 
                } finally { 
                    setLoading(false); 
                } 
            };
            
            const handleSaveUser = async (userData) => { 
                setLoading(true); 
                try { 
                    if (editingUser) {
                        await window.fs.updateDoc(window.fs.doc(window.db, 'users', editingUser.id), userData);
                    } else {
                        const newId = Date.now().toString();
                        await window.fs.setDoc(window.fs.doc(window.db, 'users', newId), { ...userData, id: newId });
                    }
                    showNotify(editingUser ? t.admin.userUpdated : t.admin.userAdded); 
                    setShowUserModal(false); 
                    setEditingUser(null); 
                } catch(e) { 
                    showNotify(t.common.error, "error"); 
                } finally { 
                    setLoading(false); 
                } 
            };
            
            const handleDeleteUser = (uid) => { 
                triggerConfirm(t.admin.deleteUserConfirm, async () => { 
                    try { 
                        await window.fs.deleteDoc(window.fs.doc(window.db, 'users', uid)); 
                        showNotify(t.admin.userDeleted); 
                    } catch(e) { 
                        showNotify(t.common.error, "error"); 
                    } 
                }); 
            };
            
            const updateSysSettings = async (newSettings) => { 
                setLoading(true); 
                try { 
                    await window.fs.setDoc(window.fs.doc(window.db, 'settings', 'global'), newSettings, { merge: true }); 
                    showNotify(t.common.saved); 
                } catch(e) { 
                    showNotify(t.common.error, "error"); 
                } finally { 
                    setLoading(false); 
                } 
            };

            const handleLogout = () => {
                setCurrentUser(null);
                showNotify(t.common.logoutSuccess);
            };

            const handleUserChange = (e) => { 
                const selectedId = e.target.value; 
                if (!selectedId) { setCurrentUser(null); return; } 
                
                const selectedUser = users.find(u => String(u.id) === String(selectedId));
                if (!selectedUser) return;
                
                if (!selectedUser.password) { 
                    setPasswordModal({ show: true, mode: 'create', userId: selectedId }); 
                } else { 
                    setPasswordModal({ show: true, mode: 'login', userId: selectedId }); 
                }
            };

            const handlePasswordSubmit = async (password) => {
                const { mode, userId } = passwordModal;
                const targetId = userId || currentUser;
                const user = users.find(u => String(u.id) === String(targetId));
                
                setLoading(true);
                try {
                    const hashed = await hashPassword(password);
                    
                    if (mode === 'create') {
                        await window.fs.updateDoc(window.fs.doc(window.db, 'users', targetId), { password: hashed });
                        setCurrentUser(targetId);
                        setPasswordModal({ show: false, mode: 'login', userId: null });
                        showNotify(t.auth.successCreate, 'success');
                    } else if (mode === 'login') {
                        if (user && (user.password === password || user.password === hashed)) {
                            if (user.password === password) {
                                await window.fs.updateDoc(window.fs.doc(window.db, 'users', targetId), { password: hashed });
                            }
                            setCurrentUser(targetId); 
                            setPasswordModal({ show: false, mode: 'login', userId: null }); 
                            showNotify(t.auth.successLogin); 
                        } else {
                            showNotify(t.auth.errorPass, "error"); 
                        }
                    } else if (mode === 'change') {
                        if (user && (user.password === password || user.password === hashed)) {
                             showNotify(t.auth.errorSame, "error"); 
                             return; 
                        }
                        setPasswordModal(prev => ({ ...prev, show: false }));
                        triggerConfirm(t.auth.confirmChange, async () => { 
                            setLoading(true); 
                            try { 
                                await window.fs.updateDoc(window.fs.doc(window.db, 'users', currentUser), { password: hashed }); 
                                showNotify(t.auth.successChange, 'success'); 
                            } catch(e) { 
                                showNotify(t.auth.errorUpdatePass, "error"); 
                            } finally { 
                                setLoading(false); 
                            } 
                        });
                    }
                } catch(err) {
                    showNotify(t.common.error, "error");
                    console.error("Pass Submit Error:", err);
                } finally {
                    setLoading(false); 
                }
            };

            const saveSchedule = async (e) => {
                e.preventDefault(); 
                if (!currentUser) return showNotify(t.timesheet.selectUser, "error");
                if (!scheduleForm.startDate || !scheduleForm.startTime || !scheduleForm.endDate || !scheduleForm.endTime) return showNotify(t.common.requiredField, "error");
                
                const startStr = `${scheduleForm.startDate}T${scheduleForm.startTime}`;
                const endStr = `${scheduleForm.endDate}T${scheduleForm.endTime}`;
                if (endStr <= startStr) return showNotify(t.timesheet.timeError, "error"); 

                const dbStart = getDbTime(scheduleForm.startTime, scheduleForm.startDate, timezone);
                const dbEnd = getDbTime(scheduleForm.endTime, scheduleForm.endDate, timezone);
                const newStartEpoch = getEpochFromWIB(dbStart.date, dbStart.time);
                const newEndEpoch = getEpochFromWIB(dbEnd.date, dbEnd.time);

                const currentEpochNow = Date.now();
                const dNowComp = new Date(currentEpochNow + TZ_CONFIG[timezone].offsetUTC * 3600000);
                const currentTimeTzStr = `${dNowComp.getUTCFullYear()}-${String(dNowComp.getUTCMonth() + 1).padStart(2, '0')}-${String(dNowComp.getUTCDate()).padStart(2, '0')}T${String(dNowComp.getUTCHours()).padStart(2, '0')}:${String(dNowComp.getUTCMinutes()).padStart(2, '0')}`;
                
                if (!editScheduleId && startStr < currentTimeTzStr) {
                    if ((new Date(currentTimeTzStr) - new Date(startStr)) > 60000) return showNotify(t.schedule.pastError, "error");
                }

                let conflictUser = null;
                const isConflict = schedules.some(s => {
                    if (editScheduleId && s.id === editScheduleId) return false;
                    const existStartEpoch = getEpochFromWIB(s.startDate || s.date, s.startTime);
                    let existEndEpoch = getEpochFromWIB(s.endDate || s.date, s.endTime);
                    if (!s.endDate && existEndEpoch <= existStartEpoch) existEndEpoch += 86400000;
                    if (newStartEpoch < existEndEpoch && newEndEpoch > existStartEpoch) { conflictUser = getUserName(s.userId); return true; }
                    return false;
                });

                if (isConflict) return showNotify(`${t.schedule.conflict} ${conflictUser}!`, "error");

                triggerConfirm(t.schedule.confirmBooking, async () => {
                    setLoading(true);
                    try {
                        const payload = { userId: currentUser, startDate: dbStart.date, startTime: dbStart.time, endDate: dbEnd.date, endTime: dbEnd.time, updatedAt: new Date().toISOString() };
                        if (editScheduleId) { await window.fs.updateDoc(window.fs.doc(window.db, 'schedules', editScheduleId), payload); } else { await window.fs.addDoc(window.fs.collection(window.db, 'schedules'), payload); }
                        showNotify(t.schedule.success); setScheduleForm({ startDate: '', startTime: '14:00', endDate: '', endTime: '15:00' }); setEditScheduleId(null);
                    } catch(err) { showNotify(err.message || t.common.error, "error"); } finally { setLoading(false); }
                });
            };

            const deleteSchedule = (id) => { 
                if (timesheets.some(ts => ts.scheduleId === id)) return showNotify(t.schedule.deleteLinkedError, "error", 5000);
                triggerConfirm(t.common.delete + "?", async () => { await window.fs.deleteDoc(window.fs.doc(window.db, 'schedules', id)); }); 
            };

            const editSchedule = (item) => { 
                const uiStart = getDisplayTime(item.startTime, item.startDate || item.date, timezone);
                const uiEnd = getDisplayTime(item.endTime, item.endDate || item.date, timezone);
                setScheduleForm({startDate: uiStart.date, startTime: uiStart.time, endDate: uiEnd.date, endTime: uiEnd.time}); setEditScheduleId(item.id); window.scrollTo({top:0,behavior:'smooth'}); 
            };

            const saveTimesheet = async (e) => {
                e.preventDefault(); 
                if (!currentUser) return showNotify(t.timesheet.selectUser, "error");
                if (!timesheetForm.scheduleId || !timesheetForm.date || !timesheetForm.startTime || !timesheetForm.endDate || !timesheetForm.endTime) return showNotify(t.common.requiredField, "error");

                const startStr = `${timesheetForm.date}T${timesheetForm.startTime}`;
                const endStr = `${timesheetForm.endDate || timesheetForm.date}T${timesheetForm.endTime}`;
                if (endStr <= startStr) return showNotify(t.timesheet.timeError, "error"); 

                if (timesheetForm.scheduleId) {
                    if (timesheets.some(ts => String(ts.userId) === String(currentUser) && ts.scheduleId && String(ts.scheduleId) === String(timesheetForm.scheduleId) && ts.id !== editTimesheetId)) return showNotify(t.timesheet.duplicateError, "error");
                    const selectedSchedule = schedules.find(s => String(s.id) === String(timesheetForm.scheduleId));
                    if (selectedSchedule) {
                        const schedStartEpoch = getEpochFromWIB(selectedSchedule.startDate || selectedSchedule.date, selectedSchedule.startTime);
                        let schedEndEpoch = getEpochFromWIB(selectedSchedule.endDate || selectedSchedule.date, selectedSchedule.endTime);
                        if (schedEndEpoch <= schedStartEpoch) schedEndEpoch += 86400000; 
                        if (Date.now() < (schedEndEpoch - 120000)) return showNotify(t.timesheet.earlySubmitError, "error");
                    }
                }

                const dbStart = getDbTime(timesheetForm.startTime, timesheetForm.date, timezone);
                const dbEnd = getDbTime(timesheetForm.endTime, timesheetForm.endDate || timesheetForm.date, timezone);
                const newStartEpoch = getEpochFromWIB(dbStart.date, dbStart.time);
                let newEndEpoch = getEpochFromWIB(dbEnd.date, dbEnd.time);
                if (newEndEpoch <= newStartEpoch) newEndEpoch += 86400000;

                const isOverlap = timesheets.some(ts => {
                    if (String(ts.userId) !== String(currentUser)) return false;
                    if (editTimesheetId && ts.id === editTimesheetId) return false;
                    const existStartEpoch = getEpochFromWIB(ts.date, ts.startTime);
                    let existEndEpoch;
                    if (ts.endTime) { existEndEpoch = getEpochFromWIB(ts.endDate || ts.date, ts.endTime); if (existEndEpoch <= existStartEpoch) existEndEpoch += 86400000; } else if (ts.duration) { existEndEpoch = existStartEpoch + (ts.duration * 60000); } else return false;
                    return (newStartEpoch < existEndEpoch && newEndEpoch > existStartEpoch);
                });

                if (isOverlap) return showNotify(t.timesheet.overlapError, "error");

                triggerConfirm(t.timesheet.confirmSubmit, async () => {
                    setLoading(true);
                    try {
                        const d1 = new Date(`${dbStart.date}T${dbStart.time}:00Z`);
                        let d2 = new Date(`${dbEnd.date}T${dbEnd.time}:00Z`);
                        if (d2 < d1) d2.setUTCDate(d2.getUTCDate() + 1);
                        const dur = Math.max(0, Math.round((d2 - d1) / 60000));
                        if (dur <= 0) { setLoading(false); return showNotify(t.timesheet.timeError, "error"); }

                        const idr = Math.round((dur/60) * RATES.id);
                        const usd = ((dur/60) * RATES.en).toFixed(2); 
                        
                        const payload = { userId: currentUser, scheduleId: timesheetForm.scheduleId || '', date: dbStart.date, startTime: dbStart.time, endDate: dbEnd.date, endTime: dbEnd.time, duration: dur, paymentUSD: usd, paymentIDR: idr, status: 'pending', updatedAt: new Date().toISOString() };
                        if (editTimesheetId) { await window.fs.updateDoc(window.fs.doc(window.db, 'timesheets', editTimesheetId), payload); } else { payload.createdAt = new Date().toISOString(); await window.fs.addDoc(window.fs.collection(window.db, 'timesheets'), payload); }
                        showNotify(t.common.saved); setTimesheetForm({ scheduleId: '', date: '', startTime: '', endDate: '', endTime: '' }); setEditTimesheetId(null);
                    } catch(e) { showNotify(t.common.error, "error"); } finally { setLoading(false); }
                });
            };
            
            const deleteTimesheet = (id) => { triggerConfirm(t.common.delete + "?", async () => { await window.fs.deleteDoc(window.fs.doc(window.db, 'timesheets', id)); }); };
            
            const editTimesheet = (item) => { 
                const uiStart = getDisplayTime(item.startTime, item.date, timezone);
                let finalEndDate = item.endDate || item.date;
                let finalEndTime = item.endTime;

                if (!finalEndTime && item.duration) {
                     const startEpoch = getEpochFromWIB(item.date, item.startTime);
                     const endEpoch = startEpoch + (item.duration * 60000);
                     const d = new Date(endEpoch);
                     const targetZone = TZ_CONFIG[timezone].iana || 'Asia/Jakarta';
                     const formatterDate = new Intl.DateTimeFormat('en-CA', { timeZone: targetZone, year: 'numeric', month: '2-digit', day: '2-digit' });
                     const formatterTime = new Intl.DateTimeFormat('en-GB', { timeZone: targetZone, hour: '2-digit', minute: '2-digit', hour12: false });
                     finalEndDate = formatterDate.format(d);
                     finalEndTime = formatterTime.format(d);
                } else if (finalEndTime) {
                     const uiEnd = getDisplayTime(finalEndTime, finalEndDate, timezone);
                     finalEndDate = uiEnd.date;
                     finalEndTime = uiEnd.time;
                }

                setTimesheetForm({ scheduleId: item.scheduleId || '', date: uiStart.date, startTime: uiStart.time, endDate: finalEndDate, endTime: finalEndTime || '' }); 
                setEditTimesheetId(item.id); window.scrollTo({top:0,behavior:'smooth'}); 
            };

            const isAdmin = String(currentUser) === ADMIN_ID;
            const activeUser = users.find(u => String(u.id) === String(currentUser));
            const hasPaymentInfo = activeUser && activeUser.bankName && activeUser.accountNumber;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col font-sans text-slate-800">
                    {notify && (
                        <Notification 
                            msg={notify.msg} 
                            type={notify.type} 
                            onClose={() => setNotify(null)} 
                        />
                    )}
                    
                    {showProfileModal && (
                        <ProfileModal 
                            user={activeUser} 
                            onClose={() => setShowProfileModal(false)} 
                            onSave={saveUserProfile} 
                            loading={loading} 
                            lang={lang} 
                            t={t} 
                            onChangePassword={() => { setShowProfileModal(false); setPasswordModal({show: true, mode: 'change', userId: currentUser}); }} 
                            showNotify={showNotify} 
                        />
                    )}
                    
                    {showUserModal && (
                        <UserModal 
                            user={editingUser} 
                            onClose={() => {setShowUserModal(false); setEditingUser(null);}} 
                            onSave={handleSaveUser} 
                            loading={loading} 
                            t={t} 
                            showNotify={showNotify} 
                        />
                    )}
                    
                    {passwordModal.show && (
                        <PasswordModal 
                            mode={passwordModal.mode} 
                            userName={users.find(u => String(u.id) === String(passwordModal.userId))?.name} 
                            onSubmit={handlePasswordSubmit} 
                            onClose={() => setPasswordModal({ ...passwordModal, show: false })} 
                            loading={loading} 
                            t={t} 
                            showNotify={showNotify} 
                        />
                    )}
                    
                    {confirmModal.show && (
                        <ConfirmationModal 
                            isOpen={confirmModal.show} 
                            message={confirmModal.message} 
                            onConfirm={executeConfirm} 
                            onCancel={() => setConfirmModal({ ...confirmModal, show: false })} 
                            t={t} 
                        />
                    )}

                    <header className="bg-white sticky top-0 z-20 shadow-sm border-b border-slate-100">
                        <div className="px-4 pt-3 pb-2 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center text-white shadow-md">
                                    <i className="fas fa-layer-group text-sm"></i>
                                </div>
                                <div>
                                    {/* --- BRANDING CHANGES START HERE --- */}
                                    <h1 className="font-bold text-lg text-slate-800 leading-tight tracking-tight">Scheduler</h1>
                                    <p className="text-[10px] text-blue-600 font-bold tracking-widest uppercase">Remote Work</p>
                                    {/* --- BRANDING CHANGES END HERE --- */}
                                </div>
                            </div>
                            
                            <div className="relative group flex items-center gap-2">
                                {currentUser && (
                                    <button onClick={handleLogout} title={t.common.logout} className="text-slate-400 hover:text-red-500 transition p-1.5 rounded-full hover:bg-red-50">
                                        <i className="fas fa-sign-out-alt"></i>
                                    </button>
                                )}
                                <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-full pl-1 pr-3 py-1 shadow-sm group-hover:border-blue-300 transition-all cursor-pointer" title={t.tooltips.userSelect}>
                                    <div className="w-6 h-6 rounded-full flex items-center justify-center text-white text-[10px] font-bold shadow-sm" style={{backgroundColor: activeUser ? activeUser.color : '#94a3b8'}}>
                                        {activeUser ? activeUser.name.substring(0,1) : <i className="fas fa-user"></i>}
                                    </div>
                                    <span className="text-xs font-semibold text-slate-600 max-w-[80px] truncate">
                                        {activeUser ? activeUser.name : t.timesheet.selectUser}
                                    </span>
                                    <i className="fas fa-chevron-down text-[10px] text-slate-400"></i>
                                    <select className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value={currentUser || passwordModal.userId || ''} onChange={handleUserChange}>
                                        <option value="" disabled>{t.timesheet.selectUser}</option>
                                        {users.filter(u => !u.hidden).map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div className="px-4 pb-3 flex flex-col gap-2">
                             <div className="flex gap-2 mt-1">
                                 <button onClick={() => setLang(l => l === 'id' ? 'en' : 'id')} title={t.tooltips.langToggle} className="flex items-center gap-1.5 px-2.5 py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg transition-all active:scale-95">
                                    <div className="w-4 h-4 rounded-full bg-slate-200 flex items-center justify-center text-[8px] font-bold text-slate-600">{lang === 'id' ? 'ID' : 'EN'}</div>
                                    <span className="text-[10px] font-semibold text-slate-600">{lang === 'id' ? 'Bahasa Indonesia' : 'English'}</span>
                                 </button>

                                 <div className="relative flex-1">
                                    <div className="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none">
                                        <i className="far fa-clock text-slate-400 text-xs"></i>
                                    </div>
                                    <select className="appearance-none w-full bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg pl-8 pr-8 py-1.5 text-[10px] font-semibold text-slate-600 outline-none focus:ring-2 focus:ring-blue-100 transition-all cursor-pointer" value={timezone} title={t.tooltips.tzToggle} onChange={e => setTimezone(e.target.value)}>
                                        {Object.keys(TZ_CONFIG).map(k => <option key={k} value={k}>{TZ_CONFIG[k].label}</option>)}
                                    </select>
                                    <div className="absolute inset-y-0 right-0 flex items-center px-2.5 pointer-events-none">
                                        <i className="fas fa-chevron-down text-[10px] text-slate-400"></i>
                                    </div>
                                 </div>
                                 
                                 <div className="flex items-center justify-center bg-slate-50 border border-slate-200 px-2 rounded-lg">
                                     <InfoTooltip text={t.tooltips.tzInfo} align="right" />
                                 </div>
                             </div>
                        </div>

                        <div className="bg-amber-50 border-y border-amber-100 px-4 py-2 flex items-center gap-2">
                            <i className="fas fa-exclamation-circle text-amber-500 text-xs flex-shrink-0"></i>
                            <p className="text-[10px] text-amber-700 font-medium leading-tight">{t.common.reminder}</p>
                        </div>
                    </header>

                    <main className="flex-1 p-4">
                        {loading && !users.length ? (
                            <div className="flex flex-col items-center justify-center h-64 text-slate-400">
                                <i className="fas fa-circle-notch fa-spin text-4xl mb-3"></i>
                                <p>{t.common.loading}</p>
                            </div>
                        ) : (
                            <>
                                {view === 'dashboard' && (
                                    <DashboardView 
                                        currentUser={currentUser} 
                                        getUserName={getUserName} 
                                        timesheets={timesheets} 
                                        schedules={schedules} 
                                        users={users} 
                                        getUserColor={getUserColor} 
                                        onEditProfile={() => { if(!currentUser) return showNotify(t.timesheet.selectUser, "error"); setShowProfileModal(true); }} 
                                        setView={setView} 
                                        t={t} 
                                        formatCurrency={formatCurrency} 
                                        lang={lang} 
                                        timezone={timezone} 
                                    />
                                )}
                                {view === 'schedule' && (
                                    <ScheduleManager 
                                        editScheduleId={editScheduleId} 
                                        setEditScheduleId={setEditScheduleId} 
                                        scheduleForm={scheduleForm} 
                                        setScheduleForm={setScheduleForm} 
                                        saveSchedule={saveSchedule} 
                                        loading={loading} 
                                        schedules={schedules} 
                                        currentUser={currentUser} 
                                        getUserColor={getUserColor} 
                                        getUserName={getUserName} 
                                        deleteSchedule={deleteSchedule} 
                                        editSchedule={editSchedule} 
                                        isAdmin={isAdmin} 
                                        lang={lang} 
                                        t={t} 
                                        timezone={timezone} 
                                        sysSettings={sysSettings} 
                                        showNotify={showNotify} 
                                    />
                                )}
                                {view === 'timesheet' && (
                                    <ReportManager 
                                        saveTimesheet={saveTimesheet} 
                                        timesheetForm={timesheetForm} 
                                        setTimesheetForm={setTimesheetForm} 
                                        loading={loading} 
                                        timesheets={timesheets} 
                                        schedules={schedules} 
                                        getUserName={getUserName} 
                                        currentUser={currentUser} 
                                        deleteTimesheet={deleteTimesheet} 
                                        editTimesheetId={editTimesheetId} 
                                        setEditTimesheetId={setEditTimesheetId} 
                                        editTimesheet={editTimesheet} 
                                        hasPaymentInfo={hasPaymentInfo} 
                                        onOpenProfile={() => setShowProfileModal(true)} 
                                        isAdmin={isAdmin} 
                                        lang={lang} 
                                        t={t} 
                                        formatCurrency={formatCurrency} 
                                        timezone={timezone} 
                                        showNotify={showNotify} 
                                    />
                                )}
                                {view === 'analytics' && (
                                    <AnalyticsView 
                                        timesheets={timesheets} 
                                        schedules={schedules} 
                                        users={users} 
                                        currentUser={currentUser} 
                                        isAdmin={isAdmin} 
                                        loading={loading} 
                                        lang={lang} 
                                        t={t} 
                                        formatCurrency={formatCurrency} 
                                        timezone={timezone} 
                                    />
                                )}
                                {view === 'admin' && isAdmin && (
                                    <AdminPanel 
                                        timesheets={timesheets} 
                                        users={users} 
                                        schedules={schedules} 
                                        loading={loading} 
                                        setLoading={setLoading} 
                                        showNotify={showNotify} 
                                        t={t} 
                                        lang={lang} 
                                        formatCurrency={formatCurrency} 
                                        onAddUser={() => { setEditingUser(null); setShowUserModal(true); }} 
                                        onEditUser={(u) => { setEditingUser(u); setShowUserModal(true); }} 
                                        onDeleteUser={handleDeleteUser} 
                                        onConfirmAction={triggerConfirm} 
                                        sysSettings={sysSettings} 
                                        updateSettings={updateSysSettings} 
                                        getUserColor={getUserColor} 
                                        timezone={timezone} 
                                    />
                                )}
                            </>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 py-2 z-30 max-w-md mx-auto">
                        <div className={`grid ${isAdmin ? 'grid-cols-5' : 'grid-cols-4'} gap-1 px-2`}>
                            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2 rounded-xl transition ${view === 'dashboard' ? 'text-blue-600 bg-blue-50' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <i className="fas fa-home text-lg mb-1"></i> 
                                <span className="text-[10px] font-medium">{t.nav.home}</span>
                            </button>
                            <button onClick={() => setView('schedule')} className={`flex flex-col items-center p-2 rounded-xl transition ${view === 'schedule' ? 'text-blue-600 bg-blue-50' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <i className="fas fa-calendar-alt text-lg mb-1"></i> 
                                <span className="text-[10px] font-medium">{t.nav.schedule}</span>
                            </button>
                            <button onClick={() => setView('timesheet')} className={`flex flex-col items-center p-2 rounded-xl transition ${view === 'timesheet' ? 'text-blue-600 bg-blue-50' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <i className="fas fa-file-invoice-dollar text-lg mb-1"></i> 
                                <span className="text-[10px] font-medium">{t.nav.timesheet}</span>
                            </button>
                            <button onClick={() => setView('analytics')} className={`flex flex-col items-center p-2 rounded-xl transition ${view === 'analytics' ? 'text-blue-600 bg-blue-50' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <i className="fas fa-chart-pie text-lg mb-1"></i> 
                                <span className="text-[10px] font-medium">{t.nav.analytics}</span>
                            </button>
                            {isAdmin && (
                                <button onClick={() => setView('admin')} className={`flex flex-col items-center p-2 rounded-xl transition ${view === 'admin' ? 'text-purple-600 bg-purple-50' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <i className="fas fa-user-shield text-lg mb-1"></i> 
                                    <span className="text-[10px] font-medium">{t.nav.admin}</span>
                                </button>
                            )}
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
