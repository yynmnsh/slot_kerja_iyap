<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        /* ═══════════════════════════════════════════════
           CONSTANTS
           ═══════════════════════════════════════════════ */
        const THEMES = {
            1: { id:1, name:'Ocean',    primary:'#2563eb', primaryLight:'#60a5fa', primaryDark:'#1d4ed8', primary50:'#eff6ff', primary100:'#dbeafe', primary200:'#bfdbfe', accent:'#06b6d4', bg1:'#eef2ff', bg2:'#f8fafc', bg3:'#ecfeff', emoji:'🌊' },
            2: { id:2, name:'Forest',   primary:'#16a34a', primaryLight:'#4ade80', primaryDark:'#15803d', primary50:'#f0fdf4', primary100:'#dcfce7', primary200:'#bbf7d0', accent:'#059669', bg1:'#f0fdf4', bg2:'#f8fafc', bg3:'#ecfdf5', emoji:'🌲' },
            3: { id:3, name:'Sunset',   primary:'#ea580c', primaryLight:'#fb923c', primaryDark:'#c2410c', primary50:'#fff7ed', primary100:'#ffedd5', primary200:'#fed7aa', accent:'#d97706', bg1:'#fff7ed', bg2:'#fffbeb', bg3:'#fef3c7', emoji:'🌅' },
            4: { id:4, name:'Lavender', primary:'#7c3aed', primaryLight:'#a78bfa', primaryDark:'#6d28d9', primary50:'#f5f3ff', primary100:'#ede9fe', primary200:'#ddd6fe', accent:'#a855f7', bg1:'#f5f3ff', bg2:'#faf5ff', bg3:'#fdf4ff', emoji:'💜' },
            5: { id:5, name:'Rose',     primary:'#e11d48', primaryLight:'#fb7185', primaryDark:'#be123c', primary50:'#fff1f2', primary100:'#ffe4e6', primary200:'#fecdd3', accent:'#f43f5e', bg1:'#fff1f2', bg2:'#fef2f2', bg3:'#fdf2f8', emoji:'🌹' },
            6: { id:6, name:'Slate',    primary:'#475569', primaryLight:'#94a3b8', primaryDark:'#334155', primary50:'#f8fafc', primary100:'#f1f5f9', primary200:'#e2e8f0', accent:'#64748b', bg1:'#f8fafc', bg2:'#f1f5f9', bg3:'#f8fafc', emoji:'🪨' },
            7: { id:7, name:'Midnight', primary:'#1e3a5f', primaryLight:'#3b6fa0', primaryDark:'#172e4a', primary50:'#eff6ff', primary100:'#dbeafe', primary200:'#bfdbfe', accent:'#d4a017', bg1:'#f0f4f8', bg2:'#f8fafc', bg3:'#fefce8', emoji:'🌙' },
        };

        const TZ_CONFIG = {
            PT:   { label: 'Pacific Time (PT)',  short: 'PT',   iana: 'America/Los_Angeles', offsetUTC: -7 },
            AEDT: { label: 'Melbourne (AEDT)',   short: 'AEDT', iana: 'Australia/Melbourne',  offsetUTC: 11 },
            WIB:  { label: 'Jakarta (WIB)',      short: 'WIB',  iana: 'Asia/Jakarta',         offsetUTC: 7  },
        };

        const ALL_PERMS = {
            'schedule.view_own':     'Lihat jadwal sendiri',
            'schedule.view_all':     'Lihat jadwal semua',
            'schedule.create':       'Buat jadwal',
            'schedule.edit_own':     'Edit jadwal sendiri',
            'schedule.edit_all':     'Edit jadwal semua',
            'schedule.delete_own':   'Hapus jadwal sendiri',
            'schedule.delete_all':   'Hapus jadwal semua',
            'timesheet.view_own':    'Lihat timesheet sendiri',
            'timesheet.view_all':    'Lihat timesheet semua',
            'timesheet.create':      'Buat timesheet',
            'timesheet.edit_own':    'Edit timesheet sendiri',
            'timesheet.edit_all':    'Edit timesheet semua',
            'timesheet.delete_own':  'Hapus timesheet sendiri',
            'timesheet.delete_all':  'Hapus timesheet semua',
            'analytics.view_own':    'Lihat analitik sendiri',
            'analytics.view_all':    'Lihat analitik semua',
            'admin.view_users':      'Lihat daftar pengguna',
            'admin.manage_users':    'Kelola pengguna',
            'admin.view_settings':   'Lihat pengaturan',
            'admin.edit_settings':   'Ubah pengaturan',
            'admin.view_activity_log':'Lihat log aktivitas',
        };

        const PERM_GROUPS = {
            'Jadwal':    ['schedule.view_own','schedule.view_all','schedule.create','schedule.edit_own','schedule.edit_all','schedule.delete_own','schedule.delete_all'],
            'Timesheet': ['timesheet.view_own','timesheet.view_all','timesheet.create','timesheet.edit_own','timesheet.edit_all','timesheet.delete_own','timesheet.delete_all'],
            'Analitik':  ['analytics.view_own','analytics.view_all'],
            'Admin':     ['admin.view_users','admin.manage_users','admin.view_settings','admin.edit_settings','admin.view_activity_log'],
        };

        const PRESETS = {
            user:      ['schedule.view_own','schedule.create','schedule.edit_own','schedule.delete_own','timesheet.view_own','timesheet.create','timesheet.edit_own','timesheet.delete_own','analytics.view_own'],
            semiadmin: ['schedule.view_own','schedule.view_all','schedule.create','schedule.edit_own','schedule.edit_all','schedule.delete_own','timesheet.view_own','timesheet.view_all','timesheet.create','timesheet.edit_own','timesheet.edit_all','timesheet.delete_own','analytics.view_own','analytics.view_all','admin.view_users','admin.view_settings','admin.view_activity_log'],
        };

        const USER_COLORS = ['#2563eb','#16a34a','#ea580c','#7c3aed','#e11d48','#0891b2','#ca8a04','#be123c','#4f46e5','#059669','#d97706','#9333ea','#dc2626','#0284c7','#65a30d'];

        /* ═══════════════════════════════════════════════
           HELPERS
           ═══════════════════════════════════════════════ */
        const hashPw = async (t) => {
            if (!t) return t;
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        };

        const applyTheme = (id) => {
            const t = THEMES[id] || THEMES[1];
            const r = document.documentElement;
            Object.entries({ '--c-primary':t.primary,'--c-primary-light':t.primaryLight,'--c-primary-dark':t.primaryDark,'--c-primary-50':t.primary50,'--c-primary-100':t.primary100,'--c-primary-200':t.primary200,'--c-accent':t.accent,'--c-bg-1':t.bg1,'--c-bg-2':t.bg2,'--c-bg-3':t.bg3 }).forEach(([k,v])=>r.style.setProperty(k,v));
            document.body.style.background = `linear-gradient(145deg, ${t.bg1} 0%, ${t.bg2} 45%, ${t.bg3} 100%)`;
        };

        const SK = 'scheduler_v2_session';
        const saveSession = (d) => localStorage.setItem(SK, JSON.stringify(d));
        const loadSession = () => { try { return JSON.parse(localStorage.getItem(SK)); } catch { return null; } };
        const clearSession = () => localStorage.removeItem(SK);
        const gid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);

        /* ═══════════════════════════════════════════════
           NOTIFICATION
           ═══════════════════════════════════════════════ */
        const Notifs = ({ items }) => (
            <div className="fixed top-4 right-4 z-[999] flex flex-col gap-2 max-w-sm pointer-events-none">
                {items.map(n => (
                    <div key={n.id} className={`pointer-events-auto animate-slide-down rounded-2xl px-4 py-3 shadow-lg border text-sm font-semibold flex items-center gap-3 ${
                        n.type==='success'?'bg-emerald-50 border-emerald-200 text-emerald-700':
                        n.type==='error'?'bg-red-50 border-red-200 text-red-700':
                        n.type==='warning'?'bg-amber-50 border-amber-200 text-amber-700':
                        'bg-blue-50 border-blue-200 text-blue-700'
                    }`}>
                        <i className={`fas ${n.type==='success'?'fa-check-circle':n.type==='error'?'fa-exclamation-circle':n.type==='warning'?'fa-exclamation-triangle':'fa-info-circle'}`}></i>
                        <span className="flex-1">{n.msg}</span>
                    </div>
                ))}
            </div>
        );

        /* ═══════════════════════════════════════════════
           MODAL
           ═══════════════════════════════════════════════ */
        const Modal = ({ show, onClose, title, wide, children }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/25 backdrop-blur-sm animate-fade-in"></div>
                    <div className={`relative glass-strong rounded-3xl shadow-2xl border border-white/50 animate-pop-in overflow-hidden ${wide?'w-full max-w-2xl':'w-full max-w-md'}`} onClick={e=>e.stopPropagation()}>
                        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100/80">
                            <h3 className="text-base font-bold text-slate-800">{title}</h3>
                            <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all"><i className="fas fa-times text-sm"></i></button>
                        </div>
                        <div className="px-6 py-5 max-h-[72vh] overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           CONFIRM
           ═══════════════════════════════════════════════ */
        const Confirm = ({ show, title, msg, danger, onOk, onNo }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/25 backdrop-blur-sm animate-fade-in" onClick={onNo}></div>
                    <div className="relative glass-strong rounded-3xl shadow-2xl border border-white/50 animate-pop-in w-full max-w-sm p-6">
                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 ${danger?'bg-red-100':'bg-blue-100'}`}>
                            <i className={`fas ${danger?'fa-trash-alt text-red-500':'fa-question-circle text-blue-500'} text-xl`}></i>
                        </div>
                        <h4 className="text-center font-bold text-slate-800 mb-1">{title}</h4>
                        <p className="text-center text-sm text-slate-500 mb-6">{msg}</p>
                        <div className="flex gap-3">
                            <button onClick={onNo} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-500 font-semibold text-sm hover:bg-slate-50 transition-all">Batal</button>
                            <button onClick={onOk} className={`flex-1 py-2.5 rounded-xl font-semibold text-sm text-white transition-all ${danger?'bg-red-500 hover:bg-red-600':'btn-primary'}`}>{danger?'Hapus':'Ya'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           SETUP WIZARD
           ═══════════════════════════════════════════════ */
        const SetupWizard = ({ onDone, notify }) => {
            const [step, setStep] = useState(0);
            const [f, sF] = useState({ username:'', password:'', confirm:'', name:'' });
            const [busy, setBusy] = useState(false);
            const [showPw, setShowPw] = useState(false);

            const go = async () => {
                if (!f.name.trim()||!f.username.trim()||!f.password) { notify('Semua kolom wajib diisi','error'); return; }
                if (f.username.trim().length < 3) { notify('Username minimal 3 karakter','error'); return; }
                if (f.password.length < 6) { notify('Password minimal 6 karakter','error'); return; }
                if (f.password !== f.confirm) { notify('Konfirmasi password tidak cocok','error'); return; }
                setBusy(true);
                try {
                    await window.fa.signInAnonymously(window.auth);
                    const uid = gid();
                    await window.fs.setDoc(window.fs.doc(window.db, 'users', uid), {
                        username: f.username.trim().toLowerCase(), passwordHash: await hashPw(f.password),
                        displayName: f.name.trim(), role: 'superadmin', tenantId: null,
                        permissions: Object.keys(ALL_PERMS), color: '#2563eb', isActive: true, createdAt: new Date().toISOString(),
                    });
                    await window.fs.setDoc(window.fs.doc(window.db, 'system', 'config'), { superadminId: uid, setupComplete: true, createdAt: new Date().toISOString() });
                    notify('Akun superadmin berhasil dibuat!','success');
                    onDone({ id:uid, username:f.username.trim().toLowerCase(), displayName:f.name.trim(), role:'superadmin', tenantId:null, permissions:Object.keys(ALL_PERMS), color:'#2563eb' });
                } catch(e) { notify('Gagal: '+e.message,'error'); }
                setBusy(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative">
                    <div className="blob blob-1 animate-float"></div>
                    <div className="blob blob-2 animate-pulse-soft"></div>
                    <div className="relative z-10 w-full max-w-md">
                        {step === 0 ? (
                            <div className="text-center animate-fade-in">
                                <div className="w-20 h-20 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl shadow-lg shadow-blue-200" style={{background:'linear-gradient(135deg, var(--c-primary), var(--c-accent))'}}>
                                    <i className="fas fa-layer-group"></i>
                                </div>
                                <h1 className="text-3xl font-extrabold mb-3 bg-gradient-to-r from-slate-800 to-slate-500 bg-clip-text text-transparent">Selamat Datang</h1>
                                <p className="text-slate-500 mb-8 leading-relaxed">Siapkan akun administrator utama<br/>untuk memulai menggunakan Scheduler.</p>
                                <button onClick={()=>setStep(1)} className="btn-primary px-8 py-3.5 rounded-2xl font-bold text-sm tracking-wide">
                                    Mulai Pengaturan <i className="fas fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        ) : (
                            <div className="glass-strong rounded-3xl shadow-2xl border border-white/50 overflow-hidden animate-scale-in">
                                <div className="px-7 pt-7 pb-3">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm" style={{background:'var(--c-primary)'}}><i className="fas fa-user-shield"></i></div>
                                        <div>
                                            <h2 className="text-lg font-bold text-slate-800">Buat Superadmin</h2>
                                            <p className="text-[11px] text-slate-400">Akun pengendali utama sistem</p>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Nama Tampilan</label>
                                            <input value={f.name} onChange={e=>sF({...f,name:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="cth: Admin Utama" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Username</label>
                                            <input value={f.username} onChange={e=>sF({...f,username:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium font-mono placeholder:text-slate-300" placeholder="cth: superadmin" autoComplete="off" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Password</label>
                                            <div className="relative">
                                                <input type={showPw?'text':'password'} value={f.password} onChange={e=>sF({...f,password:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium pr-11 placeholder:text-slate-300" placeholder="Minimal 6 karakter" />
                                                <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i className={`fas ${showPw?'fa-eye-slash':'fa-eye'} text-sm`}></i></button>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Konfirmasi Password</label>
                                            <input type={showPw?'text':'password'} value={f.confirm} onChange={e=>sF({...f,confirm:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="Ketik ulang password" />
                                        </div>
                                    </div>
                                </div>
                                <div className="px-7 py-4 bg-slate-50/40 border-t border-slate-100/80 flex gap-3">
                                    <button onClick={()=>setStep(0)} className="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-500 font-semibold text-sm hover:bg-white transition-all"><i className="fas fa-arrow-left mr-1.5"></i>Kembali</button>
                                    <button onClick={go} disabled={busy} className="flex-1 btn-primary py-2.5 rounded-xl font-bold text-sm disabled:opacity-50">
                                        {busy?<><i className="fas fa-spinner fa-spin mr-2"></i>Membuat...</>:<><i className="fas fa-check mr-2"></i>Buat Akun</>}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           LOGIN
           ═══════════════════════════════════════════════ */
        const Login = ({ onLogin, notify }) => {
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            const [busy, setBusy] = useState(false);
            const [showPw, setShowPw] = useState(false);

            const go = async () => {
                if (!u.trim()||!p) { notify('Masukkan username dan password','error'); return; }
                setBusy(true);
                try {
                    await window.fa.signInAnonymously(window.auth);
                    const q = window.fs.query(window.fs.collection(window.db,'users'), window.fs.where('username','==',u.trim().toLowerCase()));
                    const snap = await window.fs.getDocs(q);
                    if (snap.empty) { notify('Username tidak ditemukan','error'); setBusy(false); return; }
                    const doc = snap.docs[0]; const d = doc.data();
                    if (!d.isActive) { notify('Akun dinonaktifkan. Hubungi admin.','error'); setBusy(false); return; }
                    if (await hashPw(p) !== d.passwordHash) { notify('Password salah','error'); setBusy(false); return; }
                    const s = { id:doc.id, username:d.username, displayName:d.displayName, role:d.role, tenantId:d.tenantId, permissions:d.permissions||[], color:d.color||'#2563eb' };
                    saveSession(s);
                    notify(`Selamat datang, ${d.displayName}!`,'success');
                    onLogin(s);
                } catch(e) { notify('Gagal login: '+e.message,'error'); }
                setBusy(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative">
                    <div className="blob blob-1 animate-float"></div>
                    <div className="blob blob-2 animate-pulse-soft"></div>
                    <div className="relative z-10 w-full max-w-sm animate-scale-in">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 rounded-2xl mx-auto mb-5 flex items-center justify-center text-white text-2xl shadow-lg" style={{background:'linear-gradient(135deg, var(--c-primary), var(--c-primary-dark))'}}>
                                <i className="fas fa-layer-group"></i>
                            </div>
                            <h1 className="text-2xl font-extrabold text-slate-800">Masuk ke Scheduler</h1>
                            <p className="text-sm text-slate-400 mt-1">Kelola jadwal dan timesheet tim Anda</p>
                        </div>
                        <div className="glass-strong rounded-3xl shadow-2xl border border-white/50 p-7">
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1.5">Username</label>
                                    <div className="relative">
                                        <i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                                        <input value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} className="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium font-mono placeholder:text-slate-300" placeholder="username" autoComplete="off" autoFocus />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1.5">Password</label>
                                    <div className="relative">
                                        <i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                                        <input type={showPw?'text':'password'} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} className="w-full pl-11 pr-11 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="••••••" />
                                        <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i className={`fas ${showPw?'fa-eye-slash':'fa-eye'} text-sm`}></i></button>
                                    </div>
                                </div>
                            </div>
                            <button onClick={go} disabled={busy} className="w-full btn-primary py-3.5 rounded-2xl font-bold text-sm mt-6 disabled:opacity-50">
                                {busy?<><i className="fas fa-spinner fa-spin mr-2"></i>Memverifikasi...</>:<><i className="fas fa-sign-in-alt mr-2"></i>Masuk</>}
                            </button>
                        </div>
                        <p className="text-center text-xs text-slate-300 mt-6">Scheduler v2 &middot; Multi-Tenant Platform</p>
                    </div>
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           TENANT FORM MODAL
           ═══════════════════════════════════════════════ */
        const TenantForm = ({ show, onClose, editing, onSave }) => {
            const [f, sF] = useState({ appName:'', appTagline:'', themeId:1, enabledTimezones:['WIB'], defaultTimezone:'WIB' });

            useEffect(() => {
                if (show) sF(editing ? { appName:editing.appName||'', appTagline:editing.appTagline||'', themeId:editing.themeId||1, enabledTimezones:editing.enabledTimezones||['WIB'], defaultTimezone:editing.defaultTimezone||'WIB' } : { appName:'', appTagline:'', themeId:1, enabledTimezones:['WIB'], defaultTimezone:'WIB' });
            }, [editing, show]);

            const toggleTz = (tz) => sF(prev => {
                const tzs = prev.enabledTimezones.includes(tz)?prev.enabledTimezones.filter(t=>t!==tz):[...prev.enabledTimezones,tz];
                if (!tzs.length) return prev;
                return {...prev, enabledTimezones:tzs, defaultTimezone:tzs.includes(prev.defaultTimezone)?prev.defaultTimezone:tzs[0]};
            });

            const th = THEMES[f.themeId]||THEMES[1];

            return (
                <Modal show={show} onClose={onClose} title={editing?'Edit Workspace':'Workspace Baru'} wide>
                    <div className="space-y-5">
                        <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Nama Aplikasi</label>
                            <input value={f.appName} onChange={e=>sF({...f,appName:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="cth: Slot Kerja Tim Riset" />
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Tagline <span className="text-slate-300">(opsional)</span></label>
                            <input value={f.appTagline} onChange={e=>sF({...f,appTagline:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="cth: Manajemen jadwal kerja jarak jauh" />
                        </div>

                        <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-2.5">Tema Warna</label>
                            <div className="grid grid-cols-7 gap-2">
                                {Object.values(THEMES).map(t => (
                                    <button key={t.id} onClick={()=>sF({...f,themeId:t.id})} className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl border-2 transition-all relative ${f.themeId===t.id?'border-slate-700 shadow-lg scale-[1.06]':'border-transparent hover:border-slate-200 hover:shadow'}`}>
                                        <div className="w-9 h-9 rounded-xl shadow-inner" style={{background:`linear-gradient(135deg, ${t.primary}, ${t.primaryDark})`}}></div>
                                        <span className="text-[9px] font-bold text-slate-400">{t.emoji}</span>
                                        {f.themeId===t.id && <div className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-slate-700 text-white flex items-center justify-center shadow"><i className="fas fa-check text-[8px]"></i></div>}
                                    </button>
                                ))}
                            </div>
                            <p className="text-[11px] text-slate-400 mt-2">Tema: <span className="font-bold" style={{color:th.primary}}>{th.name} {th.emoji}</span></p>
                        </div>

                        <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-2.5">Zona Waktu</label>
                            <div className="space-y-2">
                                {Object.entries(TZ_CONFIG).map(([k,tz]) => (
                                    <label key={k} className={`flex items-center justify-between p-3.5 rounded-xl border-2 cursor-pointer transition-all ${f.enabledTimezones.includes(k)?'border-blue-200 bg-blue-50/40':'border-slate-100 hover:border-slate-200'}`}>
                                        <div className="flex items-center gap-3">
                                            <input type="checkbox" className="perm-check" checked={f.enabledTimezones.includes(k)} onChange={()=>toggleTz(k)} />
                                            <div>
                                                <span className="text-sm font-bold text-slate-700">{tz.short}</span>
                                                <span className="text-xs text-slate-400 ml-2">{tz.label}</span>
                                            </div>
                                        </div>
                                        {f.enabledTimezones.includes(k) && (
                                            <button onClick={e=>{e.preventDefault();sF({...f,defaultTimezone:k})}} className={`text-[10px] font-bold px-2.5 py-1 rounded-full transition-all ${f.defaultTimezone===k?'bg-blue-500 text-white':'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                                {f.defaultTimezone===k?'✓ Default':'Jadikan default'}
                                            </button>
                                        )}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="flex gap-3 pt-2">
                            <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-500 font-semibold text-sm hover:bg-slate-50 transition-all">Batal</button>
                            <button onClick={()=>onSave(f)} disabled={!f.appName.trim()} className="flex-1 btn-primary py-2.5 rounded-xl font-bold text-sm disabled:opacity-40">
                                <i className={`fas ${editing?'fa-save':'fa-plus'} mr-2`}></i>{editing?'Simpan':'Buat Workspace'}
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        /* ═══════════════════════════════════════════════
           USER FORM MODAL
           ═══════════════════════════════════════════════ */
        const UserForm = ({ show, onClose, editing, onSave, tenants, notify }) => {
            const init = { username:'', password:'', displayName:'', role:'user', tenantId:'', permissions:[...PRESETS.user], color:USER_COLORS[Math.floor(Math.random()*USER_COLORS.length)], isActive:true, hourlyRate:0, currency:'IDR' };
            const [f, sF] = useState(init);
            const [showPw, setShowPw] = useState(false);

            useEffect(() => {
                if (!show) return;
                sF(editing ? { username:editing.username||'', password:'', displayName:editing.displayName||'', role:editing.role||'user', tenantId:editing.tenantId||'', permissions:editing.permissions||[], color:editing.color||'#2563eb', isActive:editing.isActive!==false, hourlyRate:editing.hourlyRate||0, currency:editing.currency||'IDR' } : {...init, tenantId:tenants[0]?.id||'', color:USER_COLORS[Math.floor(Math.random()*USER_COLORS.length)]});
            }, [editing, show]);

            const toggleP = (p) => sF(prev=>({...prev, permissions:prev.permissions.includes(p)?prev.permissions.filter(x=>x!==p):[...prev.permissions,p]}));

            const save = async () => {
                if (!f.displayName.trim()) { notify('Nama wajib diisi','error'); return; }
                if (!f.tenantId) { notify('Pilih workspace','error'); return; }
                if (!editing && (!f.username.trim()||!f.password)) { notify('Username & password wajib diisi','error'); return; }
                if (!editing && f.password.length<6) { notify('Password minimal 6 karakter','error'); return; }
                const data = { displayName:f.displayName.trim(), role:f.role, tenantId:f.tenantId, permissions:f.role==='admin'?Object.keys(ALL_PERMS):f.permissions, color:f.color, isActive:f.isActive, hourlyRate:parseFloat(f.hourlyRate)||0, currency:f.currency };
                if (!editing) { data.username=f.username.trim().toLowerCase(); data.passwordHash=await hashPw(f.password); }
                if (editing && f.password) data.passwordHash=await hashPw(f.password);
                onSave(data);
            };

            return (
                <Modal show={show} onClose={onClose} title={editing?'Edit Pengguna':'Pengguna Baru'} wide>
                    <div className="space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">Nama Tampilan</label>
                                <input value={f.displayName} onChange={e=>sF({...f,displayName:e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="cth: Budi Santoso" />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">Username</label>
                                <input value={f.username} onChange={e=>sF({...f,username:e.target.value})} disabled={!!editing} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium font-mono placeholder:text-slate-300 disabled:opacity-50" placeholder="cth: budi" autoComplete="off" />
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">{editing?'Password Baru (opsional)':'Password'}</label>
                                <div className="relative">
                                    <input type={showPw?'text':'password'} value={f.password} onChange={e=>sF({...f,password:e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium pr-10 placeholder:text-slate-300" placeholder={editing?'Kosongkan jika tetap':'Min. 6 karakter'} />
                                    <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i className={`fas ${showPw?'fa-eye-slash':'fa-eye'} text-xs`}></i></button>
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">Workspace</label>
                                <select value={f.tenantId} onChange={e=>sF({...f,tenantId:e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium">
                                    <option value="">-- Pilih --</option>
                                    {tenants.map(t=><option key={t.id} value={t.id}>{t.appName}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="grid grid-cols-3 gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">Peran</label>
                                <select value={f.role} onChange={e=>{const r=e.target.value; sF({...f, role:r, permissions:r==='admin'?Object.keys(ALL_PERMS):(PRESETS[r]||f.permissions)});}} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium">
                                    <option value="user">User</option>
                                    <option value="semiadmin">Semi-Admin</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">Warna</label>
                                <div className="flex flex-wrap gap-1.5 mt-0.5">
                                    {USER_COLORS.slice(0,8).map(c=>(
                                        <button key={c} onClick={()=>sF({...f,color:c})} className={`w-6 h-6 rounded-full border-2 transition-all ${f.color===c?'border-slate-700 scale-110':'border-transparent hover:scale-105'}`} style={{background:c}}></button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center gap-3 pt-5">
                                <div className={`toggle-track ${f.isActive?'active':''}`} onClick={()=>sF({...f,isActive:!f.isActive})}>
                                    <div className="toggle-knob"></div>
                                </div>
                                <span className="text-xs font-semibold text-slate-600">{f.isActive?'Aktif':'Nonaktif'}</span>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">Tarif/Jam</label>
                                <input type="number" value={f.hourlyRate} onChange={e=>sF({...f,hourlyRate:e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium" min="0" />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">Mata Uang</label>
                                <select value={f.currency} onChange={e=>sF({...f,currency:e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium">
                                    <option value="IDR">IDR (Rupiah)</option>
                                    <option value="USD">USD (Dollar)</option>
                                </select>
                            </div>
                        </div>

                        {f.role !== 'admin' && (
                            <div>
                                <div className="flex items-center justify-between mb-2">
                                    <label className="text-xs font-semibold text-slate-500">Izin Akses</label>
                                    <div className="flex gap-1">
                                        <button onClick={()=>sF({...f,permissions:[...PRESETS.user],role:'user'})} className="text-[10px] font-bold px-2.5 py-1 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all">Preset User</button>
                                        <button onClick={()=>sF({...f,permissions:[...PRESETS.semiadmin],role:'semiadmin'})} className="text-[10px] font-bold px-2.5 py-1 rounded-full bg-blue-50 text-blue-500 hover:bg-blue-100 transition-all">Preset Semi-Admin</button>
                                    </div>
                                </div>
                                <div className="border border-slate-200 rounded-xl overflow-hidden divide-y divide-slate-100 max-h-52 overflow-y-auto">
                                    {Object.entries(PERM_GROUPS).map(([g,perms]) => (
                                        <div key={g} className="p-3">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">{g}</p>
                                            <div className="grid grid-cols-2 gap-1">
                                                {perms.map(p=>(
                                                    <label key={p} className="flex items-center gap-2 cursor-pointer py-1 px-2 rounded-lg hover:bg-slate-50 transition-colors">
                                                        <input type="checkbox" className="perm-check" checked={f.permissions.includes(p)} onChange={()=>toggleP(p)} />
                                                        <span className="text-[11px] text-slate-600">{ALL_PERMS[p]}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="flex gap-3 pt-2">
                            <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-500 font-semibold text-sm hover:bg-slate-50 transition-all">Batal</button>
                            <button onClick={save} className="flex-1 btn-primary py-2.5 rounded-xl font-bold text-sm">
                                <i className={`fas ${editing?'fa-save':'fa-plus'} mr-2`}></i>{editing?'Simpan':'Buat'}
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        /* ═══════════════════════════════════════════════
           SUPERADMIN DASHBOARD
           ═══════════════════════════════════════════════ */
        const SuperDash = ({ session, onLogout, notify, onEnter }) => {
            const [tab, setTab] = useState('tenants');
            const [tenants, setTenants] = useState([]);
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showTF, setShowTF] = useState(false);
            const [showUF, setShowUF] = useState(false);
            const [editT, setEditT] = useState(null);
            const [editU, setEditU] = useState(null);
            const [cfm, setCfm] = useState({show:false});

            useEffect(() => {
                let u1,u2;
                (async () => {
                    try {
                        await window.fa.signInAnonymously(window.auth);
                        u1 = window.fs.onSnapshot(window.fs.collection(window.db,'tenants'), s=>setTenants(s.docs.map(d=>({id:d.id,...d.data()}))));
                        u2 = window.fs.onSnapshot(window.fs.collection(window.db,'users'), s=>setUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
                    } catch(e) { notify('Gagal memuat data','error'); }
                    setLoading(false);
                })();
                return () => { u1&&u1(); u2&&u2(); };
            }, []);

            const nonSuper = users.filter(u=>u.role!=='superadmin');
            const cntFor = (tid) => users.filter(u=>u.tenantId===tid).length;

            const saveT = async (data) => {
                try {
                    if (editT) { await window.fs.updateDoc(window.fs.doc(window.db,'tenants',editT.id), data); notify('Workspace diperbarui','success'); }
                    else { await window.fs.setDoc(window.fs.doc(window.db,'tenants',gid()), {...data,createdAt:new Date().toISOString()}); notify('Workspace dibuat','success'); }
                    setShowTF(false); setEditT(null);
                } catch(e) { notify('Gagal: '+e.message,'error'); }
            };

            const delT = async (tid) => {
                try {
                    const batch = window.fs.writeBatch(window.db);
                    users.filter(u=>u.tenantId===tid).forEach(u=>batch.delete(window.fs.doc(window.db,'users',u.id)));
                    batch.delete(window.fs.doc(window.db,'tenants',tid));
                    await batch.commit();
                    notify('Workspace dihapus','success');
                } catch(e) { notify('Gagal: '+e.message,'error'); }
            };

            const saveU = async (data) => {
                try {
                    if (editU) {
                        const ud = {...data}; if(!ud.passwordHash) delete ud.passwordHash;
                        await window.fs.updateDoc(window.fs.doc(window.db,'users',editU.id), ud);
                        notify('Pengguna diperbarui','success');
                    } else {
                        const q = window.fs.query(window.fs.collection(window.db,'users'), window.fs.where('username','==',data.username));
                        const snap = await window.fs.getDocs(q);
                        if (!snap.empty) { notify('Username sudah digunakan','error'); return; }
                        await window.fs.setDoc(window.fs.doc(window.db,'users',gid()), {...data,createdAt:new Date().toISOString()});
                        notify('Pengguna dibuat','success');
                    }
                    setShowUF(false); setEditU(null);
                } catch(e) { notify('Gagal: '+e.message,'error'); }
            };

            const delU = async (uid) => {
                try { await window.fs.deleteDoc(window.fs.doc(window.db,'users',uid)); notify('Pengguna dihapus','success'); } catch(e) { notify('Gagal: '+e.message,'error'); }
            };

            const RoleBadge = ({role}) => {
                const m = {admin:{bg:'bg-purple-100',tx:'text-purple-700',l:'Admin'},semiadmin:{bg:'bg-blue-100',tx:'text-blue-700',l:'Semi-Admin'},user:{bg:'bg-slate-100',tx:'text-slate-600',l:'User'}};
                const s = m[role]||m.user;
                return <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${s.bg} ${s.tx}`}>{s.l}</span>;
            };

            return (
                <div className="min-h-screen">
                    <header className="glass-strong border-b border-white/50 sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white text-sm" style={{background:'linear-gradient(135deg, var(--c-primary), var(--c-primary-dark))'}}><i className="fas fa-shield-alt"></i></div>
                                <div>
                                    <h1 className="text-sm font-extrabold text-slate-800 leading-tight">Superadmin</h1>
                                    <p className="text-[10px] text-slate-400 font-medium">Panel Kontrol Utama</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="text-xs font-semibold text-slate-500 hidden sm:block">{session.displayName}</span>
                                <button onClick={onLogout} className="w-9 h-9 rounded-xl flex items-center justify-center hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all" title="Keluar"><i className="fas fa-sign-out-alt text-sm"></i></button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-5xl mx-auto px-4 py-6">
                        {/* Stats */}
                        <div className="grid grid-cols-3 gap-3 mb-6 stagger">
                            {[
                                { icon:'fa-building', color:'var(--c-primary-50)', iconColor:'var(--c-primary)', val:tenants.length, label:'Workspace' },
                                { icon:'fa-users', color:'#ecfdf5', iconColor:'#22c55e', val:nonSuper.length, label:'Pengguna' },
                                { icon:'fa-palette', color:'#fef3c7', iconColor:'#f59e0b', val:7, label:'Tema' },
                            ].map((s,i) => (
                                <div key={i} className="glass-strong rounded-2xl border border-white/50 p-4 card-lift">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg" style={{background:s.color,color:s.iconColor}}><i className={`fas ${s.icon}`}></i></div>
                                        <div>
                                            <p className="text-2xl font-extrabold text-slate-800">{s.val}</p>
                                            <p className="text-[11px] text-slate-400 font-medium">{s.label}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Tabs */}
                        <div className="flex gap-1 p-1 rounded-2xl bg-slate-100/80 mb-6">
                            {[{id:'tenants',icon:'fa-building',l:'Workspace'},{id:'users',icon:'fa-users',l:'Pengguna'}].map(t=>(
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-semibold transition-all ${tab===t.id?'bg-white shadow-sm text-slate-800':'text-slate-400 hover:text-slate-600'}`}>
                                    <i className={`fas ${t.icon} text-xs`}></i>{t.l}
                                </button>
                            ))}
                        </div>

                        {/* Tenants */}
                        {tab==='tenants' && (
                            <div className="animate-fade-in">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-slate-800">Daftar Workspace</h2>
                                    <button onClick={()=>{setEditT(null);setShowTF(true)}} className="btn-primary px-4 py-2 rounded-xl text-sm font-semibold"><i className="fas fa-plus mr-2"></i>Tambah</button>
                                </div>
                                {tenants.length===0 ? (
                                    <div className="glass-strong rounded-2xl border border-white/50 p-12 text-center">
                                        <div className="text-5xl mb-4">🏢</div>
                                        <p className="text-slate-400 font-semibold">Belum ada workspace</p>
                                        <p className="text-xs text-slate-300 mt-1">Buat workspace pertama untuk memulai</p>
                                    </div>
                                ) : (
                                    <div className="grid gap-3 stagger">
                                        {tenants.map(t => {
                                            const th = THEMES[t.themeId]||THEMES[1];
                                            return (
                                                <div key={t.id} className="glass-strong rounded-2xl border border-white/50 p-5 card-lift">
                                                    <div className="flex items-start justify-between">
                                                        <div className="flex items-center gap-4 min-w-0">
                                                            <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-white text-lg font-bold shadow-md flex-shrink-0" style={{background:`linear-gradient(135deg, ${th.primary}, ${th.primaryDark})`}}>
                                                                {(t.appName||'W')[0].toUpperCase()}
                                                            </div>
                                                            <div className="min-w-0">
                                                                <h3 className="font-bold text-slate-800 truncate">{t.appName||'Tanpa Nama'}</h3>
                                                                {t.appTagline && <p className="text-xs text-slate-400 truncate">{t.appTagline}</p>}
                                                                <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                                                                    <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{background:th.primary50,color:th.primary}}>{th.emoji} {th.name}</span>
                                                                    <span className="text-[10px] text-slate-400"><i className="fas fa-users mr-1"></i>{cntFor(t.id)}</span>
                                                                    <span className="text-[10px] text-slate-400"><i className="fas fa-globe mr-1"></i>{(t.enabledTimezones||[]).join(', ')}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-1 flex-shrink-0 ml-2">
                                                            <button onClick={()=>onEnter(t)} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-blue-50 text-slate-400 hover:text-blue-500 transition-all" title="Masuk"><i className="fas fa-sign-in-alt text-xs"></i></button>
                                                            <button onClick={()=>{setEditT(t);setShowTF(true)}} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all" title="Edit"><i className="fas fa-pen text-xs"></i></button>
                                                            <button onClick={()=>setCfm({show:true,title:'Hapus Workspace?',msg:`"${t.appName}" dan semua datanya akan dihapus.`,danger:true,onOk:()=>{delT(t.id);setCfm({show:false})}})} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all" title="Hapus"><i className="fas fa-trash-alt text-xs"></i></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Users */}
                        {tab==='users' && (
                            <div className="animate-fade-in">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-slate-800">Semua Pengguna</h2>
                                    <button onClick={()=>{setEditU(null);setShowUF(true)}} disabled={!tenants.length} className="btn-primary px-4 py-2 rounded-xl text-sm font-semibold disabled:opacity-40" title={!tenants.length?'Buat workspace dulu':''}><i className="fas fa-plus mr-2"></i>Tambah</button>
                                </div>
                                {nonSuper.length===0 ? (
                                    <div className="glass-strong rounded-2xl border border-white/50 p-12 text-center">
                                        <div className="text-5xl mb-4">👥</div>
                                        <p className="text-slate-400 font-semibold">Belum ada pengguna</p>
                                        <p className="text-xs text-slate-300 mt-1">{!tenants.length?'Buat workspace dulu':'Tambahkan pengguna ke workspace'}</p>
                                    </div>
                                ) : (
                                    <div className="glass-strong rounded-2xl border border-white/50 overflow-hidden">
                                        <div className="divide-y divide-slate-100/80">
                                            {nonSuper.map(u => {
                                                const tn = tenants.find(t=>t.id===u.tenantId);
                                                return (
                                                    <div key={u.id} className="flex items-center justify-between px-5 py-3.5 hover:bg-slate-50/50 transition-colors">
                                                        <div className="flex items-center gap-3 min-w-0">
                                                            <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:u.color||'#94a3b8'}}>{(u.displayName||'?')[0].toUpperCase()}</div>
                                                            <div className="min-w-0">
                                                                <div className="flex items-center gap-2 flex-wrap">
                                                                    <span className="font-semibold text-sm text-slate-800">{u.displayName}</span>
                                                                    <RoleBadge role={u.role} />
                                                                    {!u.isActive && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-600">Nonaktif</span>}
                                                                </div>
                                                                <div className="flex items-center gap-2 mt-0.5">
                                                                    <span className="text-[11px] text-slate-400 font-mono">@{u.username}</span>
                                                                    {tn && <span className="text-[10px] text-slate-400">· {tn.appName}</span>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-1 flex-shrink-0 ml-2">
                                                            <button onClick={()=>{setEditU(u);setShowUF(true)}} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all"><i className="fas fa-pen text-xs"></i></button>
                                                            <button onClick={()=>setCfm({show:true,title:'Hapus Pengguna?',msg:`"${u.displayName}" akan dihapus permanen.`,danger:true,onOk:()=>{delU(u.id);setCfm({show:false})}})} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all"><i className="fas fa-trash-alt text-xs"></i></button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <TenantForm show={showTF} onClose={()=>{setShowTF(false);setEditT(null)}} editing={editT} onSave={saveT} />
                    <UserForm show={showUF} onClose={()=>{setShowUF(false);setEditU(null)}} editing={editU} onSave={saveU} tenants={tenants} notify={notify} />
                    <Confirm show={cfm.show} title={cfm.title} msg={cfm.msg} danger={cfm.danger} onOk={cfm.onOk} onNo={()=>setCfm({show:false})} />
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           SCHEDULER APP (TENANT VIEW)
           ═══════════════════════════════════════════════ */
        const SchedulerApp = ({ session, tenant, onLogout, onBack, notify }) => {
            const [view, setView] = useState('dashboard');
            const [td, setTd] = useState(tenant);
            const [users, setUsers] = useState([]);
            const [schedules, setSch] = useState([]);
            const [timesheets, setTs] = useState([]);
            const [tz, setTz] = useState(tenant.defaultTimezone||'WIB');

            const isSA = session.role==='superadmin';
            const isAdm = session.role==='admin'||isSA;
            const hasPerm = (p) => isAdm || (session.permissions||[]).includes(p);
            const canAdmin = isAdm || (session.permissions||[]).some(p=>p.startsWith('admin.'));
            const theme = THEMES[td.themeId]||THEMES[1];

            useEffect(()=>{ applyTheme(td.themeId||1); }, [td.themeId]);

            useEffect(() => {
                if (!tenant?.id) return;
                const un = [];
                (async () => {
                    try {
                        await window.fa.signInAnonymously(window.auth);
                        un.push(window.fs.onSnapshot(window.fs.doc(window.db,'tenants',tenant.id), s=>{ if(s.exists()) setTd({id:s.id,...s.data()}); }));
                        un.push(window.fs.onSnapshot(window.fs.query(window.fs.collection(window.db,'users'), window.fs.where('tenantId','==',tenant.id)), s=>setUsers(s.docs.map(d=>({id:d.id,...d.data()})))));
                        un.push(window.fs.onSnapshot(window.fs.collection(window.db,`tenants/${tenant.id}/schedules`), s=>setSch(s.docs.map(d=>({id:d.id,...d.data()})))));
                        un.push(window.fs.onSnapshot(window.fs.collection(window.db,`tenants/${tenant.id}/timesheets`), s=>setTs(s.docs.map(d=>({id:d.id,...d.data()})))));
                    } catch(e) { console.error(e); }
                })();
                return () => un.forEach(u=>u());
            }, [tenant?.id]);

            const etzs = td.enabledTimezones||['WIB'];

            const navs = [
                { id:'dashboard', icon:'fa-home',              l:'Beranda',   show:true },
                { id:'schedule',  icon:'fa-calendar-alt',      l:'Jadwal',    show:hasPerm('schedule.view_own')||hasPerm('schedule.view_all') },
                { id:'timesheet', icon:'fa-file-invoice-dollar',l:'Timesheet', show:hasPerm('timesheet.view_own')||hasPerm('timesheet.view_all') },
                { id:'analytics', icon:'fa-chart-pie',         l:'Analitik',  show:hasPerm('analytics.view_own')||hasPerm('analytics.view_all') },
                { id:'admin',     icon:'fa-cog',               l:'Admin',     show:canAdmin },
            ].filter(n=>n.show);

            const today = new Date().toISOString().split('T')[0];
            const todaySch = schedules.filter(s=>s.date===today);
            const mySch = todaySch.filter(s=>s.userId===session.id);
            const activeUsers = users.filter(u=>u.isActive);

            const Placeholder = ({icon, color, title, sub}) => (
                <div className="text-center py-16 animate-fade-in">
                    <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style={{background:color}}><i className={`fas ${icon} text-2xl`} style={{color:'inherit'}}></i></div>
                    <h2 className="text-xl font-bold text-slate-800 mb-2">{title}</h2>
                    <p className="text-sm text-slate-400">{sub}</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="glass-strong border-b border-white/50 sticky top-0 z-50">
                        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                {onBack && <button onClick={onBack} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all"><i className="fas fa-arrow-left text-sm"></i></button>}
                                <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white text-sm font-bold shadow-md" style={{background:`linear-gradient(135deg, ${theme.primary}, ${theme.primaryDark})`}}>
                                    {(td.appName||'S')[0].toUpperCase()}
                                </div>
                                <div>
                                    <h1 className="text-sm font-extrabold text-slate-800 leading-tight">{td.appName||'Scheduler'}</h1>
                                    {td.appTagline && <p className="text-[10px] text-slate-400">{td.appTagline}</p>}
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {etzs.length>1 && (
                                    <div className="flex gap-0.5 p-0.5 rounded-lg bg-slate-100/80">
                                        {etzs.map(z=>(
                                            <button key={z} onClick={()=>setTz(z)} className={`px-2 py-1 rounded-md text-[10px] font-bold transition-all ${tz===z?'bg-white shadow-sm text-slate-800':'text-slate-400 hover:text-slate-600'}`}>{z}</button>
                                        ))}
                                    </div>
                                )}
                                <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-[10px] font-bold" style={{background:session.color||theme.primary}}>{(session.displayName||'?')[0].toUpperCase()}</div>
                                <button onClick={onLogout} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all"><i className="fas fa-sign-out-alt text-sm"></i></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-6">
                        {view==='dashboard' && (
                            <div className="space-y-4 stagger animate-fade-in">
                                {/* Welcome */}
                                <div className="glass-strong rounded-2xl border border-white/50 p-5 card-lift overflow-hidden relative">
                                    <div className="absolute top-0 right-0 w-32 h-32 rounded-full opacity-[0.07]" style={{background:theme.primary,transform:'translate(30%,-30%)'}}></div>
                                    <p className="text-xs font-semibold text-slate-400 mb-0.5">Selamat datang kembali,</p>
                                    <h2 className="text-xl font-extrabold text-slate-800">{session.displayName} 👋</h2>
                                    <p className="text-[11px] text-slate-400 mt-1"><i className="fas fa-clock mr-1"></i>{TZ_CONFIG[tz]?.label||tz}</p>
                                </div>
                                {/* Stats */}
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="glass-strong rounded-2xl border border-white/50 p-4 text-center card-lift">
                                        <p className="text-2xl font-extrabold" style={{color:theme.primary}}>{mySch.length}</p>
                                        <p className="text-[10px] font-semibold text-slate-400 mt-0.5">Jadwal Hari Ini</p>
                                    </div>
                                    <div className="glass-strong rounded-2xl border border-white/50 p-4 text-center card-lift">
                                        <p className="text-2xl font-extrabold text-emerald-500">{activeUsers.length}</p>
                                        <p className="text-[10px] font-semibold text-slate-400 mt-0.5">Anggota Tim</p>
                                    </div>
                                    <div className="glass-strong rounded-2xl border border-white/50 p-4 text-center card-lift">
                                        <p className="text-2xl font-extrabold text-amber-500">{todaySch.length}</p>
                                        <p className="text-[10px] font-semibold text-slate-400 mt-0.5">Total Hari Ini</p>
                                    </div>
                                </div>
                                {/* Team today */}
                                {hasPerm('schedule.view_all') && todaySch.length>0 && (
                                    <div className="glass-strong rounded-2xl border border-white/50 p-5">
                                        <h3 className="text-sm font-bold text-slate-800 mb-3"><i className="fas fa-users mr-2" style={{color:theme.primary}}></i>Aktivitas Tim</h3>
                                        <div className="space-y-2">
                                            {todaySch.map(s => {
                                                const usr = users.find(x=>x.id===s.userId);
                                                return (
                                                    <div key={s.id} className="flex items-center gap-3 p-2.5 rounded-xl bg-slate-50/60 hover:bg-slate-50 transition-colors">
                                                        <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-[10px] font-bold" style={{background:usr?.color||'#94a3b8'}}>{(usr?.displayName||'?')[0].toUpperCase()}</div>
                                                        <span className="flex-1 text-xs font-semibold text-slate-700 truncate">{usr?.displayName||'?'}</span>
                                                        <span className="text-[11px] font-mono font-semibold text-slate-500">{s.startTime}–{s.endTime}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                                {todaySch.length===0 && (
                                    <div className="glass-strong rounded-2xl border border-white/50 p-8 text-center">
                                        <div className="text-4xl mb-3">📅</div>
                                        <p className="text-sm font-semibold text-slate-500">Belum ada jadwal hari ini</p>
                                        <p className="text-xs text-slate-400 mt-1">Jadwal akan muncul saat dibuat</p>
                                    </div>
                                )}
                            </div>
                        )}
                        {view==='schedule' && <Placeholder icon="fa-calendar-alt" color="var(--c-primary-50)" title="Modul Jadwal" sub="Akan tersedia di Fase 2" />}
                        {view==='timesheet' && <Placeholder icon="fa-file-invoice-dollar" color="#ecfdf5" title="Modul Timesheet" sub="Akan tersedia di Fase 3" />}
                        {view==='analytics' && <Placeholder icon="fa-chart-pie" color="#eef2ff" title="Modul Analitik" sub="Akan tersedia di Fase 3" />}
                        {view==='admin' && canAdmin && <Placeholder icon="fa-cog" color="#f5f3ff" title="Panel Admin" sub="Akan diperluas di fase berikutnya" />}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 glass-strong border-t border-white/50 shadow-lg z-50 max-w-2xl mx-auto safe-area-bottom">
                        <div className="flex px-2 py-1.5" style={{display:'grid',gridTemplateColumns:`repeat(${navs.length},1fr)`}}>
                            {navs.map(n => (
                                <button key={n.id} onClick={()=>setView(n.id)}
                                    className={`flex flex-col items-center py-2 px-1 rounded-xl transition-all duration-200 active:scale-90 select-none ${view===n.id?'text-white shadow-md':'text-slate-400 hover:text-slate-600 hover:bg-white/40'}`}
                                    style={view===n.id?{background:`linear-gradient(135deg, ${theme.primary}, ${theme.primaryDark})`}:{}}>
                                    <i className={`fas ${n.icon} text-[15px] ${view===n.id?'scale-110':''}`}></i>
                                    <span className="text-[9px] font-bold mt-0.5 tracking-tight">{n.l}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           ROOT APP
           ═══════════════════════════════════════════════ */
        const App = () => {
            const [state, setState] = useState('loading');
            const [session, setSession] = useState(null);
            const [tenant, setTenant] = useState(null);
            const [notifs, setNotifs] = useState([]);

            const notify = useCallback((msg, type='info', dur=3500) => {
                const id = Date.now()+Math.random();
                setNotifs(p=>[...p,{id,msg,type}]);
                setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)), dur);
            }, []);

            useEffect(() => {
                (async () => {
                    try {
                        await window.fa.signInAnonymously(window.auth);
                        const cfg = await window.fs.getDoc(window.fs.doc(window.db,'system','config'));
                        if (!cfg.exists()||!cfg.data().setupComplete) { setState('setup'); return; }
                        const saved = loadSession();
                        if (saved) {
                            const uSnap = await window.fs.getDoc(window.fs.doc(window.db,'users',saved.id));
                            if (uSnap.exists() && uSnap.data().isActive) {
                                const d = uSnap.data();
                                const s = {...saved, displayName:d.displayName, role:d.role, tenantId:d.tenantId, permissions:d.permissions||[], color:d.color||'#2563eb'};
                                setSession(s); saveSession(s);
                                if (s.role==='superadmin') { applyTheme(1); setState('super'); return; }
                                if (s.tenantId) {
                                    const tSnap = await window.fs.getDoc(window.fs.doc(window.db,'tenants',s.tenantId));
                                    if (tSnap.exists()) { setTenant({id:tSnap.id,...tSnap.data()}); applyTheme(tSnap.data().themeId||1); setState('app'); return; }
                                }
                            }
                            clearSession();
                        }
                        setState('login');
                    } catch(e) { console.error(e); setState('login'); }
                })();
            }, []);

            const login = (s) => {
                setSession(s); saveSession(s);
                if (s.role==='superadmin') { applyTheme(1); setState('super'); }
                else if (s.tenantId) {
                    window.fs.getDoc(window.fs.doc(window.db,'tenants',s.tenantId)).then(snap=>{
                        if (snap.exists()) { const t={id:snap.id,...snap.data()}; setTenant(t); applyTheme(t.themeId||1); setState('app'); }
                        else notify('Workspace tidak ditemukan','error');
                    });
                }
            };

            const logout = () => { clearSession(); setSession(null); setTenant(null); applyTheme(1); setState('login'); notify('Berhasil keluar','info'); };

            const enterTenant = (t) => { setTenant(t); applyTheme(t.themeId||1); setState('app'); };
            const backToSuper = () => { setTenant(null); applyTheme(1); setState('super'); };

            return (
                <>
                    <Notifs items={notifs} />
                    {state==='loading' && (
                        <div className="min-h-screen flex flex-col items-center justify-center animate-fade-in">
                            <div className="w-12 h-12 rounded-full border-4 border-slate-200 animate-spin" style={{borderTopColor:'var(--c-primary)'}}></div>
                            <p className="mt-4 text-sm font-medium text-slate-400">Memuat...</p>
                        </div>
                    )}
                    {state==='setup' && <SetupWizard onDone={s=>{setSession(s);saveSession(s);applyTheme(1);setState('super')}} notify={notify} />}
                    {state==='login' && <Login onLogin={login} notify={notify} />}
                    {state==='super' && session && <SuperDash session={session} onLogout={logout} notify={notify} onEnter={enterTenant} />}
                    {state==='app' && session && tenant && <SchedulerApp session={session} tenant={tenant} onLogout={logout} onBack={session.role==='superadmin'?backToSuper:null} notify={notify} />}
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
