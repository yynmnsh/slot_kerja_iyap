    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        /* ═══════════════════════════════════════════════

        const THEMES = {

        const TZ_CONFIG = {

            AEDT: { label: 'Melbourne (AEDT)',   short: 'AEDT', iana: 'Australia/Melbourne',  offsetUTC: 11 },
            WIB:  { label: 'Jakarta (WIB)',      short: 'WIB',  iana: 'Asia/Jakarta',         offsetUTC: 7  },
        };

        const ALL_PERMS = {
            'schedule.view_own':     'Lihat jadwal sendiri',
            'schedule.view_all':     'Lihat jadwal semua',
            'schedule.create':       'Buat jadwal',
            'schedule.edit_own':     'Edit jadwal sendiri',
            'schedule.edit_all':     'Edit jadwal semua',
            'schedule.delete_own':   'Hapus jadwal sendiri',
            'schedule.delete_all':   'Hapus jadwal semua',
            'timesheet.view_own':    'Lihat timesheet sendiri',
            'timesheet.view_all':    'Lihat timesheet semua',
            'timesheet.create':      'Buat timesheet',
            'timesheet.edit_own':    'Edit timesheet sendiri',
            'timesheet.edit_all':    'Edit timesheet semua',
            'timesheet.delete_own':  'Hapus timesheet sendiri',
            'timesheet.delete_all':  'Hapus timesheet semua',
            'analytics.view_own':    'Lihat analitik sendiri',
            'analytics.view_all':    'Lihat analitik semua',
            'admin.view_users':      'Lihat daftar pengguna',
            'admin.manage_users':    'Kelola pengguna',
            'admin.view_settings':   'Lihat pengaturan',
            'admin.edit_settings':   'Ubah pengaturan',
            'admin.view_activity_log':'Lihat log aktivitas',
        };

        const PERM_GROUPS = {
            'Jadwal':    ['schedule.view_own','schedule.view_all','schedule.create','schedule.edit_own','schedule.edit_all','schedule.delete_own','schedule.delete_all'],
            'Timesheet': ['timesheet.view_own','timesheet.view_all','timesheet.create','timesheet.edit_own','timesheet.edit_all','timesheet.delete_own','timesheet.delete_all'],
            'Analitik':  ['analytics.view_own','analytics.view_all'],
            'Admin':     ['admin.view_users','admin.manage_users','admin.view_settings','admin.edit_settings','admin.view_activity_log'],
        };

        const PRESETS = {
            user:      ['schedule.view_own','schedule.view_all','schedule.create','schedule.edit_own','schedule.delete_own','timesheet.view_own','timesheet.view_all','timesheet.create','timesheet.edit_own','timesheet.delete_own','analytics.view_own'],
            semiadmin: ['schedule.view_own','schedule.view_all','schedule.create','schedule.edit_own','schedule.edit_all','schedule.delete_own','timesheet.view_own','timesheet.view_all','timesheet.create','timesheet.edit_own','timesheet.edit_all','timesheet.delete_own','analytics.view_own','analytics.view_all','admin.view_users','admin.view_settings','admin.view_activity_log'],
        };

        const USER_COLORS = ['#2563eb','#16a34a','#ea580c','#7c3aed','#e11d48','#0891b2','#ca8a04','#be123c','#4f46e5','#059669','#d97706','#9333ea','#dc2626','#0284c7','#65a30d'];

        /* ═══════════════════════════════════════════════
           HELPERS
           ═══════════════════════════════════════════════ */
        const hashPw = async (t) => {
            if (!t) return t;
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        };

        const applyTheme = (id) => {
            const t = THEMES[id] || THEMES[1];
            const r = document.documentElement;
            Object.entries({ '--c-primary':t.primary,'--c-primary-light':t.primaryLight,'--c-primary-dark':t.primaryDark,'--c-primary-50':t.primary50,'--c-primary-100':t.primary100,'--c-primary-200':t.primary200,'--c-accent':t.accent,'--c-bg-1':t.bg1,'--c-bg-2':t.bg2,'--c-bg-3':t.bg3 }).forEach(([k,v])=>r.style.setProperty(k,v));
            document.body.style.background = `linear-gradient(145deg, ${t.bg1} 0%, ${t.bg2} 45%, ${t.bg3} 100%)`;
        };

        const SK = 'scheduler_v2_session';
        const saveSession = (d) => localStorage.setItem(SK, JSON.stringify(d));
        const loadSession = () => { try { return JSON.parse(localStorage.getItem(SK)); } catch { return null; } };
        const clearSession = () => localStorage.removeItem(SK);
        const gid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);

        /* ─── Timezone Conversion ─── */
        // DB stores times in WIB. These helpers convert to/from display timezone.
        const getEpochFromWIB = (dateStr, timeStr) => {
            if (!dateStr || !timeStr) return 0;
            const [y,m,d] = dateStr.split('-').map(Number);
            const [hr,min] = timeStr.split(':').map(Number);
            return Date.UTC(y, m-1, d, hr - TZ_CONFIG.WIB.offsetUTC, min, 0);
        };

        const toDbTime = (timeStr, dateStr, fromTz) => {
            if (!timeStr || !dateStr) return { date: dateStr, time: timeStr };
            if (fromTz === 'WIB') return { date: dateStr, time: timeStr };
            const diffH = TZ_CONFIG.WIB.offsetUTC - TZ_CONFIG[fromTz].offsetUTC;
            const d = new Date(`${dateStr}T${timeStr}:00Z`);
            d.setUTCHours(d.getUTCHours() + diffH);
            return { date: `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`, time: `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}` };
        };

        const toDisplayTime = (timeStr, dateStr, toTz) => {
            if (!timeStr || !dateStr) return { date: dateStr, time: timeStr };
            if (toTz === 'WIB') return { date: dateStr, time: timeStr };
            const epoch = getEpochFromWIB(dateStr, timeStr);
            const d = new Date(epoch + TZ_CONFIG[toTz].offsetUTC * 3600000);
            return { date: `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`, time: `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}` };
        };

        const formatDateId = (dateStr) => {
            if (!dateStr) return '';
            const [y,m,d] = dateStr.split('-').map(Number);
            const dt = new Date(y, m-1, d);
            return dt.toLocaleDateString('id-ID', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
        };

        const formatDateShort = (dateStr) => {
            if (!dateStr) return '';
            const [y,m,d] = dateStr.split('-').map(Number);
            const dt = new Date(y, m-1, d);
            return dt.toLocaleDateString('id-ID', { weekday:'short', day:'numeric', month:'short' });
        };

        const getDayName = (dateStr) => {
            if (!dateStr) return '';
            const [y,m,d] = dateStr.split('-').map(Number);
            return new Date(y,m-1,d).toLocaleDateString('id-ID',{weekday:'long'});
        };

        const addDays = (dateStr, n) => {
            const [y,m,d] = dateStr.split('-').map(Number);
            const dt = new Date(y, m-1, d);
            dt.setDate(dt.getDate() + n);
            return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        };

        const getToday = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        const calcDurationMins = (start, end) => {
            if (!start || !end) return 0;
            const [sh,sm] = start.split(':').map(Number);
            const [eh,em] = end.split(':').map(Number);
            let diff = (eh*60+em) - (sh*60+sm);
            if (diff < 0) diff += 24*60;
            return diff;
        };

        const fmtDuration = (mins) => {
            const h = Math.floor(mins/60); const m = mins%60;
            return h > 0 ? (m > 0 ? `${h}j ${m}m` : `${h}j`) : `${m}m`;
        };

        const getPSTDayFromEpoch = (epoch) => {
            const d = new Date(epoch + TZ_CONFIG.PT.offsetUTC * 3600000);
            return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        };

        const getPSTDay = (dbDateStr, dbTimeStr) => {
            if (!dbDateStr || !dbTimeStr) return null;
            return getPSTDayFromEpoch(getEpochFromWIB(dbDateStr, dbTimeStr));
        };

        const getPayPeriodInfo = () => {
            const ptOff = TZ_CONFIG.PT.offsetUTC * 3600000;
            const ptNow = new Date(Date.now() + ptOff);
            const ptDow = ptNow.getUTCDay();
            const daysUntilWed = ptDow === 3 ? 0 : (3 - ptDow + 7) % 7;
            const isPayday = ptDow === 3;
            const paydayEp = Date.now() + daysUntilWed * 86400000;
            const pEndEp = paydayEp - 2 * 86400000;
            const pStartEp = pEndEp - 6 * 86400000;
            const nPaydayEp = paydayEp + (isPayday ? 7 : 0) * 86400000;
            const nPEndEp = nPaydayEp - 2 * 86400000;
            const nPStartEp = nPEndEp - 6 * 86400000;
            const fmt = ep => { const d = new Date(ep + ptOff); return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`; };
            return {
                isPayday,
                currentPeriodStart: fmt(isPayday ? nPStartEp : pStartEp),
                currentPeriodEnd: fmt(isPayday ? nPEndEp : pEndEp),
                upcomingPayday: fmt(isPayday ? nPaydayEp : paydayEp),
                todayPeriodStart: isPayday ? fmt(pStartEp) : null,
                todayPeriodEnd: isPayday ? fmt(pEndEp) : null,
            };
        };

        const getPtCutoffInTz = (tzCode) => {
            if (tzCode === 'PT') return { startStr:'00:00', endStr:'23:59', crossMidnight: false };
            const diff = TZ_CONFIG[tzCode].offsetUTC - TZ_CONFIG.PT.offsetUTC;
            const startH = ((diff % 24) + 24) % 24;
            const endH = ((startH - 1) % 24 + 24) % 24;
            const pad = n => String(n).padStart(2,'0');
            return { startStr:`${pad(startH)}:00`, endStr:`${pad(endH)}:59`, crossMidnight: startH > 0 };
        };

        /* ═══════════════════════════════════════════════
           NOTIFICATION
           ═══════════════════════════════════════════════ */

        /* ═══════════════════════════════════════════════
           SETUP WIZARD
           ═══════════════════════════════════════════════ */
        const SetupWizard = ({ onDone, notify }) => {
            const [step, setStep] = useState(0);

            const [busy, setBusy] = useState(false);
            const [showPw, setShowPw] = useState(false);

            const go = async () => {
                if (!f.name.trim()||!f.username.trim()||!f.password) { notify('Semua kolom wajib diisi','error'); return; }

                if (f.password.length < 6) { notify('Password minimal 6 karakter','error'); return; }
                if (f.password !== f.confirm) { notify('Konfirmasi password tidak cocok','error'); return; }
                setBusy(true);
                try {
                    await window.fa.signInAnonymously(window.auth);
                    const uid = gid();
                    await window.fs.setDoc(window.fs.doc(window.db, 'users', uid), {

                                    </div>

                                        </div>

                                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Password</label>
                                            <div className="relative">
                                                <input type={showPw?'text':'password'} value={f.password} onChange={e=>sF({...f,password:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium pr-11 placeholder:text-slate-300" placeholder="Minimal 6 karakter" />
                                                <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i className={`fas ${showPw?'fa-eye-slash':'fa-eye'} text-sm`}></i></button>
                                            </div>

                                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Konfirmasi Password</label>
                                            <input type={showPw?'text':'password'} value={f.confirm} onChange={e=>sF({...f,confirm:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="Ketik ulang password" />

        /* ═══════════════════════════════════════════════
           LOGIN
           ═══════════════════════════════════════════════ */
        const Login = ({ onLogin, notify }) => {
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            const [busy, setBusy] = useState(false);
            const [showPw, setShowPw] = useState(false);

            const go = async () => {
                if (!u.trim()||!p) { notify('Masukkan username dan password','error'); return; }
                setBusy(true);
                try {
                    await window.fa.signInAnonymously(window.auth);
                    const q = window.fs.query(window.fs.collection(window.db,'users'), window.fs.where('username','==',u.trim().toLowerCase()));
                    const snap = await window.fs.getDocs(q);
                    if (snap.empty) { notify('Username tidak ditemukan','error'); setBusy(false); return; }
                    const doc = snap.docs[0]; const d = doc.data();
                    if (!d.isActive) { notify('Akun dinonaktifkan. Hubungi admin.','error'); setBusy(false); return; }
                    if (await hashPw(p) !== d.passwordHash) { notify('Password salah','error'); setBusy(false); return; }
                    const s = { id:doc.id, username:d.username, displayName:d.displayName, role:d.role, tenantId:d.tenantId, permissions:d.permissions||[], color:d.color||'#2563eb' };
                    saveSession(s);
                    notify(`Selamat datang, ${d.displayName}!`,'success');
                    onLogin(s);
                } catch(e) { notify('Gagal login: '+e.message,'error'); }
                setBusy(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative">
                    <div className="blob blob-1 animate-float"></div>
                    <div className="blob blob-2 animate-pulse-soft"></div>
                    <div className="relative z-10 w-full max-w-sm animate-scale-in">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 rounded-2xl mx-auto mb-5 flex items-center justify-center text-white text-2xl shadow-lg" style={{background:'linear-gradient(135deg, var(--c-primary), var(--c-primary-dark))'}}>
                                <i className="fas fa-layer-group"></i>
                            </div>
                            <h1 className="text-2xl font-extrabold text-slate-800">Selamat Datang</h1>
                            <p className="text-sm text-slate-400 mt-1.5">Masuk untuk mengelola jadwal dan timesheet</p>
                        </div>
                        <div className="glass-strong rounded-3xl shadow-2xl border border-white/50 p-7">
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1.5">Username</label>
                                    <div className="relative">
                                        <i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                                        <input value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} className="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium font-mono placeholder:text-slate-300" placeholder="username" autoComplete="off" autoFocus />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1.5">Password</label>
                                    <div className="relative">
                                        <i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                                        <input type={showPw?'text':'password'} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} className="w-full pl-11 pr-11 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="••••••" />
                                        <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i className={`fas ${showPw?'fa-eye-slash':'fa-eye'} text-sm`}></i></button>
                                    </div>
                                </div>
                            </div>
                            <button onClick={go} disabled={busy} className="w-full btn-primary py-3.5 rounded-2xl font-bold text-sm mt-6 disabled:opacity-50 shadow-lg">
                                {busy?<><i className="fas fa-circle-notch fa-spin mr-2"></i>Memverifikasi...</>:<><i className="fas fa-arrow-right mr-2"></i>Masuk</>}
                            </button>
                        </div>
                        <p className="text-center text-[11px] text-slate-300 mt-6">Scheduler v2 · Multi-Tenant Platform</p>
                    </div>
                </div>
            );
        };
        const TenantForm = ({ show, onClose, editing, onSave }) => {
            const [f, sF] = useState({ appName:'', appTagline:'', themeId:1, enabledTimezones:['WIB'], defaultTimezone:'WIB' });
            useEffect(() => { if (show) sF(editing ? { appName:editing.appName||'', appTagline:editing.appTagline||'', themeId:editing.themeId||1, enabledTimezones:editing.enabledTimezones||['WIB'], defaultTimezone:editing.defaultTimezone||'WIB' } : { appName:'', appTagline:'', themeId:1, enabledTimezones:['WIB'], defaultTimezone:'WIB' }); }, [editing, show]);
            const toggleTz = (tz) => sF(prev => { const tzs=prev.enabledTimezones.includes(tz)?prev.enabledTimezones.filter(t=>t!==tz):[...prev.enabledTimezones,tz]; if(!tzs.length)return prev; return{...prev,enabledTimezones:tzs,defaultTimezone:tzs.includes(prev.defaultTimezone)?prev.defaultTimezone:tzs[0]}; });
            const th = THEMES[f.themeId]||THEMES[1];
            return (
                <Modal show={show} onClose={onClose} title={editing?'Edit Workspace':'Workspace Baru'} wide>
                    <div className="space-y-5">
                        <div><label className="block text-xs font-semibold text-slate-500 mb-1.5">Nama Aplikasi</label><input value={f.appName} onChange={e=>sF({...f,appName:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="cth: Slot Kerja Tim Riset" /></div>
                        <div><label className="block text-xs font-semibold text-slate-500 mb-1.5">Tagline <span className="text-slate-300">(opsional)</span></label><input value={f.appTagline} onChange={e=>sF({...f,appTagline:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/80 text-sm font-medium placeholder:text-slate-300" placeholder="cth: Manajemen jadwal kerja jarak jauh" /></div>
                        <div><label className="block text-xs font-semibold text-slate-500 mb-2.5">Tema Warna</label>
                            <div className="grid grid-cols-7 gap-2">{Object.values(THEMES).map(t=><button key={t.id} onClick={()=>sF({...f,themeId:t.id})} className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl border-2 transition-all relative ${f.themeId===t.id?'border-slate-700 shadow-lg scale-[1.06]':'border-transparent hover:border-slate-200'}`}><div className="w-9 h-9 rounded-xl shadow-inner" style={{background:`linear-gradient(135deg, ${t.primary}, ${t.primaryDark})`}}></div><span className="text-[9px] font-bold text-slate-400">{t.emoji}</span>{f.themeId===t.id&&<div className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-slate-700 text-white flex items-center justify-center shadow"><i className="fas fa-check text-[8px]"></i></div>}</button>)}</div>
                            <p className="text-[11px] text-slate-400 mt-2">Tema: <span className="font-bold" style={{color:th.primary}}>{th.name} {th.emoji}</span></p>
                        </div>
                        <div><label className="block text-xs font-semibold text-slate-500 mb-2.5">Zona Waktu</label>
                            <div className="space-y-2">{Object.entries(TZ_CONFIG).map(([k,tz])=><label key={k} className={`flex items-center justify-between p-3.5 rounded-xl border-2 cursor-pointer transition-all ${f.enabledTimezones.includes(k)?'border-blue-200 bg-blue-50/40':'border-slate-100 hover:border-slate-200'}`}>
                                <div className="flex items-center gap-3"><input type="checkbox" className="perm-check" checked={f.enabledTimezones.includes(k)} onChange={()=>toggleTz(k)} /><div><span className="text-sm font-bold text-slate-700">{tz.short}</span><span className="text-xs text-slate-400 ml-2">{tz.label}</span></div></div>
                                {f.enabledTimezones.includes(k)&&<button onClick={e=>{e.preventDefault();sF({...f,defaultTimezone:k})}} className={`text-[10px] font-bold px-2.5 py-1 rounded-full transition-all ${f.defaultTimezone===k?'bg-blue-500 text-white':'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>{f.defaultTimezone===k?'✓ Default':'Jadikan default'}</button>}
                            </label>)}</div>
                        </div>
                        <div className="flex gap-3 pt-2">
                            <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-500 font-semibold text-sm hover:bg-slate-50 transition-all">Batal</button>
                            <button onClick={()=>onSave(f)} disabled={!f.appName.trim()} className="flex-1 btn-primary py-2.5 rounded-xl font-bold text-sm disabled:opacity-40"><i className={`fas ${editing?'fa-save':'fa-plus'} mr-2`}></i>{editing?'Simpan':'Buat Workspace'}</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        /* ═══════════════════════════════════════════════
           USER FORM MODAL — used by superadmin & tenant admin
           mode="superadmin": can pick role admin/user, pick workspace
           mode="tenant": can pick role user/semiadmin, workspace pre-set
           ═══════════════════════════════════════════════ */
        const UserForm = ({ show, onClose, editing, onSave, tenants, notify, mode='superadmin', fixedTenantId=null }) => {
            const roles = mode==='superadmin' ? ['user','admin'] : ['user','semiadmin'];
            const init = { username:'', password:'', displayName:'', role:roles[0], tenantId:fixedTenantId||'', permissions:[...PRESETS.user], color:USER_COLORS[Math.floor(Math.random()*USER_COLORS.length)], isActive:true, hourlyRate:0, currency:'IDR' };
            const [f, sF] = useState(init);
            const [showPw, setShowPw] = useState(false);

            useEffect(() => {
                if (!show) return;
                if (editing) {
                    sF({ username:editing.username||'', password:'', displayName:editing.displayName||'', role:editing.role||roles[0], tenantId:editing.tenantId||fixedTenantId||'', permissions:editing.permissions||[], color:editing.color||'#2563eb', isActive:editing.isActive!==false, hourlyRate:editing.hourlyRate||0, currency:editing.currency||'IDR' });
                } else {
                    sF({...init, tenantId:fixedTenantId||(tenants&&tenants[0]?.id)||'', color:USER_COLORS[Math.floor(Math.random()*USER_COLORS.length)]});
                }
            }, [editing, show]);

            const toggleP = (p) => sF(prev=>({...prev, permissions:prev.permissions.includes(p)?prev.permissions.filter(x=>x!==p):[...prev.permissions,p]}));

            const todayPt = useMemo(() => getPSTDayFromEpoch(Date.now()), []);

            const shiftMap = (d) => setMapPt(p => addDays(p, d));

            useEffect(() => {
                if (form.startDate && form.startTime) {
                    const db = toDbTime(form.startTime, form.startDate, tz);
                    const pt = getPSTDayFromEpoch(getEpochFromWIB(db.date, db.time));
                    if (pt) setMapPt(pt);
                }
            }, [form.startDate, form.startTime, tz]);

            // Quota
            const MAX_M = (sysSettings?.dailyQuotaHours || 10) * 60;
            const targetPt = useMemo(() => {
                if (form.startDate && form.startTime) {
                    const db = toDbTime(form.startTime, form.startDate, tz);
                    return getPSTDayFromEpoch(getEpochFromWIB(db.date, db.time));

                const dbS = toDbTime(form.startTime, form.startDate, tz), dbE = toDbTime(form.endTime, form.endDate, tz);

                // Conflict
                let cUser=null; if(schedules.some(s=>{if(editId&&s.id===editId)return false;const eS=getEpochFromWIB(s.startDate||s.date,s.startTime);let eE=getEpochFromWIB(s.endDate||s.date,s.endTime);if(!s.endDate&&eE<=eS)eE+=86400000;if(nSE<eE&&nEE>eS){cUser=getU(s.userId).displayName;return true;}return false;})){notify(`Jadwal bertabrakan dengan ${cUser}!`,'error');return;}

                setCfm({show:true,title:'Hapus Jadwal?',msg:'Jadwal ini akan dihapus permanen.',danger:true,onOk:async()=>{setCfm({show:false});try{await window.fs.deleteDoc(window.fs.doc(window.db,`tenants/${tenant.id}/schedules`,id));notify('Jadwal dihapus','success');}catch(e){notify('Gagal: '+e.message,'error');}}});

                        {filtered.length===0&&<div className="glass-strong rounded-2xl border border-white/50 p-10 text-center"><div className="text-4xl mb-3">📭</div><p className="text-sm font-semibold text-slate-500">Tidak ada jadwal</p></div>}
                        {filtered.map((s)=>{const isMine=s.userId===session.id;const sO=toDisplayTime(s.startTime,s.startDate||s.date,tz);const eO=toDisplayTime(s.endTime,s.endDate||s.date,tz);const u=getU(s.userId);const sE=getEpochFromWIB(s.startDate||s.date,s.startTime);let eE=getEpochFromWIB(s.endDate||s.date,s.endTime);if(!s.endDate&&eE<=sE)eE+=86400000;const dm=Math.round((eE-sE)/60000);return(<div key={s.id} className={`glass-strong p-4 rounded-2xl border flex justify-between items-center card-lift ${isMine?'border-l-4':'border-white/50'}`} style={isMine?{borderLeftColor:theme.primary}:{}}><div className="flex items-center gap-3 min-w-0"><div className="w-2 h-10 rounded-full flex-shrink-0" style={{backgroundColor:u.color}}></div><div className="min-w-0"><div className="flex items-center gap-2"><span className="font-bold text-slate-700 text-sm">{u.displayName}</span>{isMine&&<span className="text-[10px] font-bold px-1.5 rounded" style={{background:theme.primary50,color:theme.primary}}>Saya</span>}</div><div className="text-xs text-slate-500 mt-1">{formatDateShort(sO.date)} · {sO.time}–{eO.time} <span className="text-[8px] bg-slate-200 px-1 rounded">{TZ_CONFIG[tz]?.short}</span></div>{dm>0&&<span className="text-[10px] text-slate-400 mt-0.5 flex items-center gap-1"><i className="far fa-clock text-[9px]"></i>{fmtDuration(dm)}</span>}</div></div>{(canEdit(s)||canDel(s))&&<div className="flex gap-1.5 flex-shrink-0 ml-2">{canEdit(s)&&<button onClick={()=>startEdit(s)} className="w-8 h-8 rounded-full bg-white border border-blue-100 text-blue-500 hover:bg-blue-50 flex items-center justify-center transition"><i className="fas fa-pen text-xs"></i></button>}{canDel(s)&&<button onClick={()=>del(s.id)} className="w-8 h-8 rounded-full bg-white border border-red-100 text-red-500 hover:bg-red-50 flex items-center justify-center transition"><i className="fas fa-trash text-xs"></i></button>}</div>}</div>);})}
                    </div>
                    <Confirm show={bookCfm.show} title="Konfirmasi Booking" msg="Pastikan data jadwal sudah benar. Lanjutkan?" onOk={bookCfm.action} onNo={()=>setBookCfm({show:false,action:null})} />
                    <Confirm show={cfm.show} title={cfm.title} msg={cfm.msg} danger={cfm.danger} onOk={cfm.onOk} onNo={()=>setCfm({show:false})} />
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           DASHBOARD VIEW — full cards from v1
           ═══════════════════════════════════════════════ */
        const DashboardView = ({ session, td, users, schedules, timesheets, tz, theme, hasPerm, sysSettings, notify, tenant }) => {
            const [showProfile, setShowProfile] = useState(false);

            // Load current user data into form

            const saveProfile = async () => {
                setProfBusy(true);
                try {
                    await window.fs.updateDoc(window.fs.doc(window.db,'users',session.id), { bankName:profForm.bankName.trim(), accountNumber:profForm.accountNumber.trim(), accountHolder:profForm.accountHolder.trim() });

            const changePassword = async () => {
                if (!pwForm.oldPw || !pwForm.newPw) { notify('Isi password lama dan baru','error'); return; }

                if (pwForm.newPw !== pwForm.confirmPw) { notify('Konfirmasi password tidak cocok','error'); return; }
                setProfBusy(true);
                try {
                    const me = users.find(u=>u.id===session.id);
                    const oldHash = await hashPw(pwForm.oldPw);
                    if (me?.passwordHash !== oldHash) { notify('Password lama salah','error'); setProfBusy(false); return; }
                    const newHash = await hashPw(pwForm.newPw);
                    if (oldHash === newHash) { notify('Password baru sama dengan yang lama','error'); setProfBusy(false); return; }
                    setCfm({show:true, title:'Ubah Password?', msg:'Password akan diperbarui. Pastikan Anda mengingat password baru.', onOk: async()=>{
                        setCfm({show:false});
                        try {

                            notify('Password berhasil diubah','success');

                        } catch(e) { notify('Gagal: '+e.message,'error'); }
                        setProfBusy(false);
                    }});
                } catch(e) { notify('Gagal','error'); setProfBusy(false); }
            };

            const me = users.find(u=>u.id===session.id);
            const pp = getPayPeriodInfo();
            const getU = (uid) => users.find(u=>u.id===uid) || {displayName:'?',color:'#94a3b8'};
            const baseUsd = (sysSettings?.baseHourlyRateUSD||15);
            const myUsd = (sysSettings?.userRates?.[session.id] && Number(sysSettings.userRates[session.id]) > 0) ? Number(sysSettings.userRates[session.id]) : baseUsd;
            const rate = myUsd * (sysSettings?.usdToIdr||16000);
            const fmtC = (n) => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n);
            const fmtShort = (ds) => {if(!ds)return'';const[,m,d]=ds.split('-');return`${parseInt(d)}/${parseInt(m)}`;};
            const currentEpoch = Date.now();
            const nowTz = new Date(currentEpoch + TZ_CONFIG[tz].offsetUTC * 3600000);
            const timeDisp = `${String(nowTz.getUTCHours()).padStart(2,'0')}:${String(nowTz.getUTCMinutes()).padStart(2,'0')}`;

            // Earnings
            const myPending = timesheets.filter(ts => ts.userId===session.id && ts.status==='pending');
            const myPendingPeriod = myPending.filter(ts => { const ptD=getPSTDay(ts.date,ts.startTime); return ptD>=pp.currentPeriodStart && ptD<=pp.currentPeriodEnd; });
            const myPendingCarry = myPending.filter(ts => { const ptD=getPSTDay(ts.date,ts.startTime); return ptD<pp.currentPeriodStart; });
            const myPendingNext = myPending.filter(ts => { const ptD=getPSTDay(ts.date,ts.startTime); return ptD>pp.currentPeriodEnd; });
            const thisPeriodHrs = myPendingPeriod.reduce((a,ts)=>a+parseInt(ts.duration||0),0)/60;
            const carryHrs = myPendingCarry.reduce((a,ts)=>a+parseInt(ts.duration||0),0)/60;
            const nextHrs = myPendingNext.reduce((a,ts)=>a+parseInt(ts.duration||0),0)/60;
            const thisPeriodAmt = thisPeriodHrs * rate;
            const carryAmt = carryHrs * rate;

            const totalAmt = thisPeriodAmt + carryAmt + nextAmt;
            const periodLabel = `${fmtShort(pp.currentPeriodStart)} – ${fmtShort(pp.currentPeriodEnd)}`;

            // Active workers
            const activeWorkers = schedules.filter(s => { const sE=getEpochFromWIB(s.startDate||s.date,s.startTime); let eE=getEpochFromWIB(s.endDate||s.date,s.endTime); if(!s.endDate&&eE<=sE)eE+=86400000; return currentEpoch>=sE && currentEpoch<=eE; }).map(s=>{const u=getU(s.userId);return{name:u.displayName,color:u.color,endTime:s.endTime,endDate:s.endDate||s.date,isActive:u.isActive};}).filter(w=>w.isActive!==false);
            // Upcoming
            const upcoming = schedules.filter(s => { let eE=getEpochFromWIB(s.endDate||s.date,s.endTime);if(!s.endDate&&eE<=getEpochFromWIB(s.startDate||s.date,s.startTime))eE+=86400000;return eE>currentEpoch; }).sort((a,b)=>getEpochFromWIB(a.startDate||a.date,a.startTime)-getEpochFromWIB(b.startDate||b.date,b.startTime)).slice(0,5);

            return (
                <div className="space-y-4 stagger animate-fade-in">

                        </div>
                        {totalAmt > 0 ? (
                            <div className="relative z-10 mt-4 rounded-2xl overflow-hidden" style={{background:'rgba(0,0,0,0.18)',border:'1px solid rgba(255,255,255,0.12)'}}>

                                    <div className="flex items-center justify-between mb-1"><span className="text-white/60 text-[10px] font-semibold">Estimasi Pendapatan</span><span className="text-[9px] text-white/40 bg-white/10 px-2 py-0.5 rounded-full">{periodLabel} PT</span></div>

                                {nextHrs > 0 && <div className="flex items-center justify-between px-4 py-2" style={{borderTop:'1px solid rgba(255,255,255,0.06)',background:'rgba(139,92,246,0.08)'}}><div className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-violet-400/75"></div><span className="text-[9px] text-violet-200/75 font-semibold">Periode berikutnya</span></div><span className="text-[11px] font-black text-violet-100/85">{fmtC(nextAmt)}</span></div>}
                            </div>
                        ) : <p className="relative z-10 text-white/30 text-sm mt-3 italic">Tidak ada laporan pending.</p>}
                        <i className="fas fa-coins absolute -right-6 -bottom-8 text-[80px] text-white opacity-5"></i>
                    </div>
                    {/* Working now */}
                    <div className="glass-strong rounded-2xl border border-white/50 p-4 card-lift">
                        <div className="flex justify-between items-start mb-3"><h3 className="font-bold text-slate-700 text-sm flex items-center gap-2"><span className="relative flex h-2.5 w-2.5"><span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-60" style={{backgroundColor:'#22c55e'}}></span><span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span></span>Sedang Bekerja</h3><span className="text-[10px] bg-slate-100 px-2 py-1 rounded text-slate-500 font-mono">{timeDisp} {TZ_CONFIG[tz]?.short}</span></div>

                            </div>
                            {/* Payment Info */}
                            <div>
                                <h4 className="text-xs font-bold text-slate-600 mb-3 flex items-center gap-2"><i className="fas fa-university" style={{color:theme.primary}}></i>Informasi Pembayaran</h4>
                                <div className="space-y-3">
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Nama Bank</label><input value={profForm.bankName} onChange={e=>setProfForm({...profForm,bankName:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm" placeholder="cth: BCA, Mandiri, GoPay" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Nomor Rekening</label><input value={profForm.accountNumber} onChange={e=>setProfForm({...profForm,accountNumber:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-mono" placeholder="cth: 1234567890" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Atas Nama</label><input value={profForm.accountHolder} onChange={e=>setProfForm({...profForm,accountHolder:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm" placeholder="cth: Budi Santoso" /></div>
                                    <button onClick={saveProfile} disabled={profBusy} className="w-full py-2.5 rounded-xl text-white font-bold text-sm transition-all disabled:opacity-40 btn-primary"><i className="fas fa-save mr-2"></i>Simpan Info Pembayaran</button>
                                </div>
                            </div>
                            <div className="border-t border-slate-100"></div>
                            {/* Password */}
                            <div>
                                <div className="flex items-center justify-between mb-3">
                                    <h4 className="text-xs font-bold text-slate-600 flex items-center gap-2"><i className="fas fa-shield-alt text-amber-500"></i>Keamanan Akun</h4>
                                    {!showPwChange&&<button onClick={()=>setShowPwChange(true)} className="text-[10px] font-bold px-3 py-1.5 rounded-lg border border-amber-200 bg-amber-50 text-amber-600 hover:bg-amber-100 transition-all"><i className="fas fa-key mr-1"></i>Ubah Password</button>}
                                </div>
                                {showPwChange&&(<div className="space-y-3 animate-fade-in">
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Password Lama</label><div className="relative"><input type={showOldPw?'text':'password'} value={pwForm.oldPw} onChange={e=>setPwForm({...pwForm,oldPw:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm pr-10" placeholder="Masukkan password saat ini" /><button type="button" onClick={()=>setShowOldPw(!showOldPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"><i className={`fas ${showOldPw?'fa-eye-slash':'fa-eye'} text-xs`}></i></button></div></div>
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Password Baru</label><div className="relative"><input type={showNewPw?'text':'password'} value={pwForm.newPw} onChange={e=>setPwForm({...pwForm,newPw:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm pr-10" placeholder="Min. 6 karakter" /><button type="button" onClick={()=>setShowNewPw(!showNewPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"><i className={`fas ${showNewPw?'fa-eye-slash':'fa-eye'} text-xs`}></i></button></div></div>
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Konfirmasi Password Baru</label><input type="password" value={pwForm.confirmPw} onChange={e=>setPwForm({...pwForm,confirmPw:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm" placeholder="Ketik ulang password baru" /></div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>{setShowPwChange(false);setPwForm({oldPw:'',newPw:'',confirmPw:''});}} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-500 font-semibold text-sm">Batal</button>
                                        <button onClick={changePassword} disabled={profBusy} className="flex-1 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm transition-all disabled:opacity-40"><i className="fas fa-key mr-1.5"></i>Ubah Password</button>

        /* ═══════════════════════════════════════════════
           TIMESHEET VIEW — with ALL v1 validations

        const TimesheetView = ({ schedules, timesheets, users, session, tenant, td, tz, theme, hasPerm, notify, sysSettings }) => {
            const [form, setForm] = useState({ scheduleId:'', date:'', startTime:'', endDate:'', endTime:'' });
            const [editId, setEditId] = useState(null);
            const [busy, setBusy] = useState(false);

            const [filterMine, setFilterMine] = useState(false);

            const canCreate = hasPerm('timesheet.create');

            const getU = (uid) => users.find(u=>u.id===uid) || {displayName:'?',color:'#94a3b8'};
            const baseRate = (sysSettings?.baseHourlyRateUSD||15);
            const rate = (sysSettings?.userRates?.[session.id] && Number(sysSettings.userRates[session.id]) > 0) ? Number(sysSettings.userRates[session.id]) : baseRate;
            const xRate = (sysSettings?.usdToIdr||16000);
            const fmtC = (n) => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n);

            const isDirty = form.scheduleId||form.date||form.startTime||form.endTime;

            const durMins = useMemo(() => {
                if (!form.date||!form.startTime||!form.endTime) return 0;
                const dbS=toDbTime(form.startTime,form.date,tz); const dbE=toDbTime(form.endTime,form.endDate||form.date,tz);
                const sE=getEpochFromWIB(dbS.date,dbS.time); let eE=getEpochFromWIB(dbE.date,dbE.time); if(eE<sE)eE+=86400000;
                return Math.max(0,Math.round((eE-sE)/60000));
            }, [form, tz]);

            // Schedule dropdown — FULL filtering logic from v1
            const mySchedules = useMemo(() => {
                return schedules.filter(s => {
                    if (s.userId !== session.id) return false;
                    const startEp = getEpochFromWIB(s.startDate||s.date, s.startTime);
                    let endEp = getEpochFromWIB(s.endDate||s.date, s.endTime);
                    if (!s.endDate && endEp <= startEp) endEp += 86400000;

                    // Check if already reported (by scheduleId match)
                    let usedTs = timesheets.find(ts => ts.userId===session.id && ts.scheduleId && ts.scheduleId===s.id);

                    if (!usedTs) {
                        // Check if PT day already paid
                        const sPtDay = getPSTDay(s.startDate||s.date, s.startTime);
                        const isDayPaid = timesheets.some(ts => ts.userId===session.id && ts.status==='paid' && getPSTDay(ts.date,ts.startTime)===sPtDay);
                        if (isDayPaid) return false;
                        // Check time overlap with existing timesheets
                        usedTs = timesheets.find(ts => {
                            if (ts.userId !== session.id) return false;
                            if (ts.scheduleId && ts.scheduleId !== s.id) return false;
                            const tsStart = getEpochFromWIB(ts.date, ts.startTime);
                            let tsEnd = tsStart;
                            if (ts.endTime) { tsEnd = getEpochFromWIB(ts.endDate||ts.date, ts.endTime); if(tsEnd<=tsStart)tsEnd+=86400000; }
                            else if (ts.duration) { tsEnd = tsStart + (ts.duration*60000); }
                            return (tsStart<=endEp && tsEnd>=startEp) || Math.abs(tsStart-startEp)<=10800000;
                        });
                    }

                    if (usedTs) return editId === usedTs.id;
                    if (endEp < Date.now() - 30*86400000) return false;
                    return true;
                }).sort((a,b) => getEpochFromWIB(b.startDate||b.date,b.startTime) - getEpochFromWIB(a.startDate||a.date,a.startTime)).slice(0,15);
            }, [schedules, timesheets, session.id, editId]);

            const filtered = useMemo(() => {
                let ls = canViewAll ? [...timesheets] : timesheets.filter(ts => ts.userId===session.id);
                ls = ls.filter(ts => showPaid ? ts.status==='paid' : ts.status==='pending');
                if (filterMine) ls = ls.filter(ts => ts.userId===session.id);
                return ls.sort((a,b) => (`${b.date}T${b.startTime}`).localeCompare(`${a.date}T${a.startTime}`));
            }, [timesheets, showPaid, filterMine, session.id, canViewAll]);

            const resetForm = () => { setForm({ scheduleId:'', date:'', startTime:'', endDate:'', endTime:'' }); setEditId(null); };

            const save = async (e) => {
                e.preventDefault();
                if (!form.scheduleId||!form.date||!form.startTime||!form.endTime) { notify('Pilih jadwal dan isi waktu aktual','error'); return; }
                const stStr=`${form.date}T${form.startTime}`,enStr=`${form.endDate||form.date}T${form.endTime}`;
                if (enStr<=stStr) { notify('Waktu selesai harus setelah mulai','error'); return; }

                // Duplicate check
                if (timesheets.some(ts => ts.userId===session.id && ts.scheduleId && ts.scheduleId===form.scheduleId && ts.id!==editId)) { notify('Jadwal ini sudah pernah dilaporkan','error'); return; }

                // Early submit check — schedule must have ended
                const selSch = schedules.find(s => s.id===form.scheduleId);
                if (selSch) {
                    const schStart = getEpochFromWIB(selSch.startDate||selSch.date, selSch.startTime);
                    let schEnd = getEpochFromWIB(selSch.endDate||selSch.date, selSch.endTime);
                    if (schEnd <= schStart) schEnd += 86400000;
                    if (Date.now() < (schEnd - 120000)) { notify('Jadwal belum selesai. Tunggu hingga 2 menit sebelum selesai.','error'); return; }
                }

                // Overlap check with existing timesheets
                const dbS=toDbTime(form.startTime,form.date,tz), dbE=toDbTime(form.endTime,form.endDate||form.date,tz);
                const nSE=getEpochFromWIB(dbS.date,dbS.time); let nEE=getEpochFromWIB(dbE.date,dbE.time); if(nEE<=nSE)nEE+=86400000;
                const hasOverlap = timesheets.some(ts => {
                    if (ts.userId!==session.id) return false;
                    if (editId && ts.id===editId) return false;
                    const exS=getEpochFromWIB(ts.date,ts.startTime); let exE;
                    if(ts.endTime){exE=getEpochFromWIB(ts.endDate||ts.date,ts.endTime);if(exE<=exS)exE+=86400000;} else if(ts.duration){exE=exS+ts.duration*60000;} else return false;
                    return nSE<exE && nEE>exS;
                });
                if (hasOverlap) { notify('Waktu tumpang tindih dengan laporan lain','error'); return; }
                if (durMins <= 0) { notify('Durasi harus lebih dari 0','error'); return; }

                setTsCfm({show:true, action: async () => {
                    setTsCfm({show:false,action:null}); setBusy(true);
                    try {
                        const usd = ((durMins/60)*rate).toFixed(2);
                        const idr = Math.round((durMins/60)*rate*xRate);
                        const payload = { userId:session.id, scheduleId:form.scheduleId, date:dbS.date, startTime:dbS.time, endDate:dbE.date, endTime:dbE.time, duration:durMins, paymentUSD:usd, paymentIDR:idr, status:editId?(timesheets.find(t=>t.id===editId)?.status||'pending'):'pending', updatedAt:new Date().toISOString() };
                        const col=`tenants/${tenant.id}/timesheets`;
                        if(editId){await window.fs.updateDoc(window.fs.doc(window.db,col,editId),payload);notify('Laporan diperbarui','success');}
                        else{payload.createdAt=new Date().toISOString();await window.fs.addDoc(window.fs.collection(window.db,col),payload);notify('Laporan dikirim','success');}
                        resetForm();
                    }catch(e){notify('Gagal: '+e.message,'error');}setBusy(false);
                }});
            };

            const startEdit = (ts) => { const sO=toDisplayTime(ts.startTime,ts.date,tz); let eDate=ts.endDate||ts.date,eTime=ts.endTime; if(!eTime&&ts.duration){const ep=getEpochFromWIB(ts.date,ts.startTime)+ts.duration*60000;const d=new Date(ep+TZ_CONFIG[tz].offsetUTC*3600000);eDate=`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;eTime=`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;} else if(eTime){const uE=toDisplayTime(eTime,eDate,tz);eDate=uE.date;eTime=uE.time;} setForm({scheduleId:ts.scheduleId||'',date:sO.date,startTime:sO.time,endDate:eDate,endTime:eTime||''});setEditId(ts.id);window.scrollTo({top:0,behavior:'smooth'}); };
            const del = (id) => { setCfm({show:true,title:'Hapus Laporan?',msg:'Laporan ini akan dihapus permanen.',danger:true,onOk:async()=>{setCfm({show:false});try{await window.fs.deleteDoc(window.fs.doc(window.db,`tenants/${tenant.id}/timesheets`,id));notify('Laporan dihapus','success');}catch(e){notify('Gagal','error');}}}); };

            const pp = getPayPeriodInfo();
            const fmtShort = (ds) => {if(!ds)return'';const[,m,d]=ds.split('-');return`${parseInt(d)}/${parseInt(m)}`;};

            return (
                <div className="space-y-4 animate-fade-in">
                    {canCreate && (<div className={`glass-strong rounded-2xl border-t-4 overflow-hidden ${editId?'border-orange-400':''}`} style={editId?{}:{borderTopColor:'#22c55e'}}>
                        <div className="px-5 pt-4 pb-3 border-b border-slate-100/80 flex justify-between items-center"><h3 className="font-bold text-slate-800 text-sm flex items-center gap-2"><span className={`w-7 h-7 rounded-lg flex items-center justify-center ${editId?'bg-orange-100':'bg-green-100'}`}><i className={`fas ${editId?'fa-pen':'fa-file-alt'} text-xs ${editId?'text-orange-600':'text-green-600'}`}></i></span>{editId?'Edit Laporan':'Kirim Laporan Kerja'}</h3>{(editId||isDirty)&&<button onClick={resetForm} className={`text-[10px] font-bold px-2.5 py-1 rounded-lg border flex items-center gap-1.5 ${editId?'text-red-500 bg-red-50 border-red-100':'text-slate-500 bg-slate-50 border-slate-200'}`}><i className={`fas ${editId?'fa-times':'fa-undo'} text-[9px]`}></i>{editId?'Batal':'Reset'}</button>}</div>
                        <form onSubmit={save} className="p-5 space-y-4" noValidate>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5 mb-2"><i className="fas fa-calendar-check text-blue-500 text-sm"></i>Pilih Jadwal</label>
                            <div className="relative"><select value={form.scheduleId} onChange={e=>{const sid=e.target.value;if(!sid){resetForm();return;}const s=schedules.find(x=>x.id===sid);if(s){const uS=toDisplayTime(s.startTime,s.startDate||s.date,tz);const uE=toDisplayTime(s.endTime,s.endDate||s.date,tz);setForm({scheduleId:sid,date:uS.date,startTime:uS.time,endDate:uE.date,endTime:uE.time});}}} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-medium appearance-none pr-8" required><option value="" disabled>-- Pilih jadwal --</option>{mySchedules.map(s=>{const sO=toDisplayTime(s.startTime,s.startDate||s.date,tz);const eO=toDisplayTime(s.endTime,s.endDate||s.date,tz);return<option key={s.id} value={s.id}>{formatDateShort(sO.date)} · {sO.time}–{eO.time}</option>;})}</select><div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none"><i className="fas fa-chevron-down text-slate-400 text-xs"></i></div></div></div>
                            <div className="grid grid-cols-2 gap-3 p-3 bg-slate-50/60 rounded-xl border border-slate-100"><div className="col-span-2"><label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5"><i className="fas fa-play-circle text-green-500 text-sm"></i>Mulai Aktual ({TZ_CONFIG[tz]?.short})</label></div><input type="date" required value={form.date} onChange={e=>{if(!form.endDate)setForm({...form,date:e.target.value,endDate:e.target.value});else setForm({...form,date:e.target.value});}} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm" /><input type="time" required value={form.startTime} onChange={e=>setForm({...form,startTime:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-mono" /></div>
                            <div className="grid grid-cols-2 gap-3 p-3 bg-slate-50/60 rounded-xl border border-slate-100"><div className="col-span-2"><label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5"><i className="fas fa-stop-circle text-red-500 text-sm"></i>Selesai Aktual ({TZ_CONFIG[tz]?.short})</label></div><input type="date" required value={form.endDate||form.date} onChange={e=>setForm({...form,endDate:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm" /><input type="time" required value={form.endTime} onChange={e=>setForm({...form,endTime:e.target.value})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-mono" /></div>
                            {durMins>0&&<div className="flex justify-between items-center text-xs bg-green-50 text-green-700 p-3 rounded-xl border border-green-100"><span><i className="fas fa-clock mr-1"></i>Durasi: {fmtDuration(durMins)}</span><span className="font-bold">{fmtC((durMins/60)*rate*xRate)}</span></div>}
                            <button disabled={busy||durMins===0} className={`w-full py-3 rounded-xl text-white font-bold text-sm shadow-md transition-all active:scale-95 disabled:opacity-60 flex items-center justify-center gap-2 ${editId?'bg-orange-500 hover:bg-orange-600':'bg-green-600 hover:bg-green-700'}`}>{busy?<i className="fas fa-spinner fa-spin"></i>:editId?<><i className="fas fa-save text-xs"></i>Simpan</>:<><i className="fas fa-paper-plane text-xs"></i>Kirim Laporan</>}</button>
                        </form>
                    </div>)}

                    {/* ═══ PETA VISUAL: JADWAL vs AKTUAL ═══ */}
                    {(()=>{
                        const todPt=getPSTDayFromEpoch(Date.now());
                        const daySch=schedules.filter(s=>getPSTDay(s.startDate||s.date,s.startTime)===todPt);
                        const dayTs=timesheets.filter(ts=>getPSTDay(ts.date,ts.startTime)===todPt);
                        if(daySch.length===0&&dayTs.length===0)return null;
                        const toBlock=(item,isTs)=>{
                            const sO=toDisplayTime(item.startTime,item.startDate||item.date,tz);
                            let eO;
                            if(isTs&&!item.endTime&&item.duration){const ep=getEpochFromWIB(item.date,item.startTime)+item.duration*60000;const d=new Date(ep+TZ_CONFIG[tz].offsetUTC*3600000);eO={time:`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`};}
                            else{eO=toDisplayTime(item.endTime||item.startTime,item.endDate||item.startDate||item.date,tz);}
                            const sM=parseInt(sO.time.split(':')[0])*60+parseInt(sO.time.split(':')[1]);
                            const eM=parseInt(eO.time.split(':')[0])*60+parseInt(eO.time.split(':')[1]);
                            const w=eM>sM?(eM-sM):0;
                            const dm=isTs?(parseInt(item.duration)||0):w;
                            return{userId:item.userId,sM,w,sO,eO,dm};
                        };
                        const schBlocks=daySch.map(s=>({...toBlock(s,false),id:s.id}));
                        const tsBlocks=dayTs.map(t=>({...toBlock(t,true),id:t.id}));
                        const getUx=(uid)=>users.find(u=>u.id===uid)||{displayName:'?',color:'#94a3b8'};
                        const totalSchM=daySch.reduce((a,s)=>{const sE=getEpochFromWIB(s.startDate||s.date,s.startTime);let eE=getEpochFromWIB(s.endDate||s.date,s.endTime);if(!s.endDate&&eE<=sE)eE+=86400000;return a+Math.round((eE-sE)/60000);},0);
                        const totalTsM=dayTs.reduce((a,t)=>a+parseInt(t.duration||0),0);
                        // Now line
                        const noL=new Date(Date.now()+TZ_CONFIG[tz].offsetUTC*3600000);
                        const nowMin=noL.getUTCHours()*60+noL.getUTCMinutes();
                        const nowPct=nowMin/1440*100;
                        const nowStr=`${String(noL.getUTCHours()).padStart(2,'0')}:${String(noL.getUTCMinutes()).padStart(2,'0')}`;
                        const isToday=getPSTDayFromEpoch(Date.now())===todPt;

                        const NowLine=()=>isToday?(<>
                            <div className="absolute top-0 bottom-0 z-20 pointer-events-none" style={{left:`${nowPct}%`}}>
                                <div className="absolute top-0 bottom-0 w-0.5 bg-red-500" style={{animation:'pulseSoft 2s ease-in-out infinite'}}></div>
                                <div className="absolute -top-0.5 w-2 h-2 bg-red-500 rounded-full" style={{left:'50%',transform:'translateX(-50%)'}}></div>
                            </div>
                            <div className="absolute top-0 bottom-0 z-30 group cursor-default" style={{left:`${nowPct}%`,width:'14px',transform:'translateX(-7px)'}}>
                                <div className={`hidden group-hover:block absolute ${nowPct>70?'right-0':'left-0'} -top-1 bg-red-600 text-white text-[9px] font-bold px-2 py-0.5 rounded-lg shadow-lg whitespace-nowrap z-50`}>{nowStr} {TZ_CONFIG[tz]?.short}</div>
                            </div>
                        </>):null;

                        const BlockTooltip=({b,isGreen})=>{const ux=getUx(b.userId);const pctL=b.sM/1440*100;return(
                            <div className="absolute top-1 bottom-1 rounded-md flex items-center justify-center overflow-visible group cursor-default z-10" style={{left:`${pctL}%`,width:`${b.w/1440*100}%`,background:ux.color,opacity:0.85}}>
                                <span className="text-[7px] font-bold text-white truncate px-1">{ux.displayName?.split(' ')[0]}</span>
                                <div className={`hidden group-hover:flex absolute ${pctL>50?'right-0':'left-0'} bottom-full mb-1 bg-slate-800 text-white text-[10px] p-2.5 rounded-xl shadow-xl whitespace-nowrap flex-col gap-1 z-50 border border-slate-700 pointer-events-none`}>
                                    <div className="flex items-center gap-1.5 border-b border-slate-600 pb-1 mb-0.5"><div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:ux.color}}></div><span className="font-bold">{ux.displayName}</span></div>
                                    <span className="text-slate-300 font-mono text-[9px]"><i className="far fa-clock mr-1 text-[8px]"></i>{b.sO.time} – {b.eO.time}</span>
                                    <span className="text-slate-300 text-[9px]"><i className="fas fa-hourglass-half mr-1 text-[8px]"></i>Durasi: {fmtDuration(b.dm)}</span>
                                </div>
                            </div>);};

                        return(
                        <div className="glass-strong rounded-2xl border border-white/50 overflow-hidden">
                            <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
                                <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2"><i className="fas fa-chart-gantt text-sm" style={{color:theme.primary}}></i>Peta Jadwal vs Aktual</h3>
                                <span className="text-[9px] font-mono bg-slate-100 px-2 py-0.5 rounded-full text-slate-500 border border-slate-200">{formatDateShort(todPt)} PT</span>
                            </div>
                            <div className="px-4 py-3 space-y-3">
                                {/* Summary */}
                                <div className="flex gap-3">
                                    <div className="flex-1 flex items-center gap-2 bg-blue-50 rounded-xl p-2.5 border border-blue-100"><div className="w-3 h-3 rounded-sm bg-blue-500 flex-shrink-0"></div><div><p className="text-[9px] text-blue-500 font-bold uppercase">Jadwal</p><p className="text-xs font-black text-blue-700">{fmtDuration(totalSchM)}</p></div></div>
                                    <div className="flex-1 flex items-center gap-2 bg-emerald-50 rounded-xl p-2.5 border border-emerald-100"><div className="w-3 h-3 rounded-sm bg-emerald-500 flex-shrink-0"></div><div><p className="text-[9px] text-emerald-500 font-bold uppercase">Aktual</p><p className="text-xs font-black text-emerald-700">{fmtDuration(totalTsM)}</p></div></div>
                                    <div className="flex-1 flex items-center gap-2 bg-slate-50 rounded-xl p-2.5 border border-slate-100"><div className="w-3 h-3 rounded-sm flex-shrink-0" style={{background:totalTsM>=totalSchM?'#22c55e':'#f59e0b'}}></div><div><p className="text-[9px] text-slate-500 font-bold uppercase">Selisih</p><p className={`text-xs font-black ${totalTsM>=totalSchM?'text-emerald-600':'text-amber-600'}`}>{totalTsM>=totalSchM?'+':'-'}{fmtDuration(Math.abs(totalTsM-totalSchM))}</p></div></div>
                                </div>
                                {/* Dual timeline */}
                                <div className="space-y-1.5">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Jadwal (Rencana)</p>
                                    <div className="relative w-full h-10 bg-blue-50 border border-blue-100 rounded-lg overflow-visible">
                                        <div className="absolute inset-0 flex justify-between pointer-events-none rounded-lg overflow-hidden">{[0,6,12,18,24].map(h=><div key={h} className="border-l border-blue-200/40 h-full w-0"><span className="text-[6px] text-blue-300 ml-0.5 leading-none mt-0.5 block">{String(h).padStart(2,'0')}</span></div>)}</div>
                                        {schBlocks.filter(b=>b.w>0).map((b,i)=><BlockTooltip key={i} b={b} />)}
                                        <NowLine />
                                    </div>
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mt-2">Aktual (Dilaporkan)</p>
                                    <div className="relative w-full h-10 bg-emerald-50 border border-emerald-100 rounded-lg overflow-visible">
                                        <div className="absolute inset-0 flex justify-between pointer-events-none rounded-lg overflow-hidden">{[0,6,12,18,24].map(h=><div key={h} className="border-l border-emerald-200/40 h-full w-0"><span className="text-[6px] text-emerald-300 ml-0.5 leading-none mt-0.5 block">{String(h).padStart(2,'0')}</span></div>)}</div>
                                        {tsBlocks.filter(b=>b.w>0).map((b,i)=><BlockTooltip key={i} b={b} isGreen />)}
                                        {tsBlocks.filter(b=>b.w===0&&b.dm>0).length>0&&<p className="absolute inset-0 flex items-center justify-center text-[8px] text-emerald-400 italic pointer-events-none">Laporan tanpa rentang waktu</p>}
                                        <NowLine />
                                    </div>
                                </div>
                            </div>
                        </div>);
                    })()}

                    {/* Pay period */}
                    <div className="glass-strong rounded-2xl border border-white/50 p-4"><div className="flex items-center gap-0 bg-white border border-slate-200 rounded-xl overflow-hidden"><div className="flex-1 px-3 py-2.5 border-r border-slate-100"><p className="text-[9px] text-slate-400 font-semibold uppercase">Periode</p><p className="text-sm font-black text-slate-800 mt-0.5">{fmtShort(pp.currentPeriodStart)}–{fmtShort(pp.currentPeriodEnd)}</p><p className="text-[9px] text-slate-400 mt-0.5">PT</p></div><div className="px-3 py-2.5 text-center flex-shrink-0"><p className="text-[9px] font-semibold uppercase" style={{color:theme.primary}}>Dibayar</p><p className="text-sm font-black mt-0.5" style={{color:theme.primaryDark}}>{fmtShort(pp.upcomingPayday)}</p><p className="text-[9px] text-slate-400 mt-0.5">Rabu</p></div></div></div>
                    {/* List */}
                    <div className="space-y-3 pb-20">
                        <div className="glass-strong rounded-2xl border border-white/50 p-3 flex gap-2">
                            <button onClick={()=>setShowPaid(false)} className={`flex-1 text-[10px] py-1.5 rounded-lg border font-semibold transition ${!showPaid?'text-white':'bg-white text-slate-500 border-slate-200'}`} style={!showPaid?{background:'#f59e0b',borderColor:'#f59e0b'}:{}}>Pending</button>
                            <button onClick={()=>setShowPaid(true)} className={`flex-1 text-[10px] py-1.5 rounded-lg border font-semibold transition ${showPaid?'text-white':'bg-white text-slate-500 border-slate-200'}`} style={showPaid?{background:'#22c55e',borderColor:'#22c55e'}:{}}>Dibayar</button>
                            {canViewAll&&<button onClick={()=>setFilterMine(!filterMine)} className={`flex-1 text-[10px] py-1.5 rounded-lg border font-semibold transition ${filterMine?'text-white':'bg-white text-slate-500 border-slate-200'}`} style={filterMine?{background:theme.primary,borderColor:theme.primary}:{}}>{filterMine?'Saya':'Semua'}</button>}
                        </div>

                const dayTs=timesheets.filter(ts=>ts.userId===session.id&&getPSTDay(ts.date,ts.startTime)===pstD);const unplanned=[];
                dayTs.forEach(ts=>{let best=ts.scheduleId?daySch.find(s=>s.id===ts.scheduleId):null;if(!best){daySch.forEach(s=>{const diff=Math.abs(getEpochFromWIB(ts.date,ts.startTime)-getEpochFromWIB(pstD,s.start.replace(':','')))/60000;if(diff<180&&(!best))best=s;});}if(best)best.actualMins+=parseInt(ts.duration||0);else unplanned.push(ts);});

            const rcptInRange = (paidAt)=>{if(!paidAt)return false;const d=paidAt.slice(0,10);if(rcptPreset==='all')return true;if(rcptPreset==='30d')return d>=rcptAddDays(todayPt,-30);if(rcptPreset==='90d')return d>=rcptAddDays(todayPt,-90);if(rcptPreset==='thisY')return d.slice(0,4)===todayPt.slice(0,4);if(rcptPreset==='custom'){if(rcptFrom&&d<rcptFrom)return false;if(rcptTo&&d>rcptTo)return false;return true;}return true;};
