        /* --- CRYPTOGRAPHY --- */
        const hashPassword = async (text) => {
            if (!text) return text;
            const msgUint8 = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        /* --- HELPER FUNCTIONS --- */
        const formatDate = (dateString, lang = 'id') => {
            if (!dateString) return '';
            let dateObj = dateString.includes('T') ? new Date(dateString) : new Date(dateString.split('-')[0], dateString.split('-')[1]-1, dateString.split('-')[2]);
            return dateObj.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { weekday:'short', day:'numeric', month:'short' });
        };
        const formatFullDate = (dateString, lang = 'id') => {
            if (!dateString) return '';
            let dateObj = dateString.includes('T') ? new Date(dateString) : new Date(dateString.split('-')[0], dateString.split('-')[1]-1, dateString.split('-')[2]);
            return dateObj.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { day:'numeric', month:'long', year:'numeric' });
        };
        const getEpochFromWIB = (dateStr, timeStr) => {
            if (!dateStr || !timeStr) return 0;
            const [y, m, d] = dateStr.split('-').map(Number);
            const [hr, min] = timeStr.split(':').map(Number);
            return Date.UTC(y, m - 1, d, hr - TZ_CONFIG['WIB'].offsetUTC, min, 0);
        };
        const getDbTime = (timeStr, dateStr, tzCode) => {
            if (!timeStr || !dateStr) return { date: dateStr, time: timeStr };
            if (tzCode === 'WIB') return { date: dateStr, time: timeStr };
            const diffHours = TZ_CONFIG['WIB'].offsetUTC - TZ_CONFIG[tzCode].offsetUTC;
            const d = new Date(`${dateStr}T${timeStr}:00Z`);
            d.setUTCHours(d.getUTCHours() + diffHours);
            return { date: `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`, time: `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}` };
        };
        const getDisplayTime = (timeStr, dateStr, tzCode) => {
            if (!timeStr || !dateStr) return { date: dateStr, time: timeStr, originalObj: new Date() };
            const epoch = getEpochFromWIB(dateStr, timeStr);
            const d = new Date(epoch + TZ_CONFIG[tzCode].offsetUTC * 3600000);
            return { date: `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`, time: `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`, originalObj: new Date(epoch) };
        };
        const getPSTDayFromEpoch = (epoch) => {
            const d = new Date(epoch + TZ_CONFIG['PST'].offsetUTC * 3600000);
            return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        };
        const getPSTDay = (dbDateStr, dbTimeStr) => {
            if (!dbDateStr || !dbTimeStr) return null;
            return getPSTDayFromEpoch(getEpochFromWIB(dbDateStr, dbTimeStr));
        };
        const formatCurrency = (amount, lang = 'id') => {
            const num = parseFloat(amount) || 0;
            if (lang === 'id') return new Intl.NumberFormat('id-ID', { style:'currency', currency:'IDR', maximumFractionDigits:0 }).format(num);
            return new Intl.NumberFormat('en-US', { style:'currency', currency:'USD' }).format(num);
        };
        const showToastError = (showNotify, message) => { showNotify(message, "error", 4000); };

        const Spinner = () => <i className="fas fa-circle-notch fa-spin text-white"></i>;

            let containerClass = `fixed top-4 right-4 left-4 md:left-auto z-[100] p-4 rounded-2xl shadow-2xl text-white flex justify-between items-center animate-slide-up border border-white/20 backdrop-blur-md ${type === 'error' ? 'bg-rose-500/90' : 'bg-primary-600/90'}`;
            return (
                <div className={containerClass}>
                    <div className="flex items-center gap-3">
                        <i className={`fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} text-lg`}></i>
                        <span className="text-sm font-bold tracking-wide drop-shadow-md">{msg}</span>
                    </div>
                    <button onClick={onClose} className="p-1 hover:bg-white/20 rounded-full transition-colors ml-4">
                        <i className="fas fa-times opacity-90 hover:opacity-100"></i>
                    </button>
                </div>
            );
        };

        const ConfirmationModal = ({ isOpen, message, onConfirm, onCancel, t }) => {

            const totalMinutesTeam = timesheets.reduce((acc, ts) => acc + parseInt(ts.duration || 0), 0);
            const rate = RATES[lang];
            const totalEarnedTeam = (totalMinutesTeam / 60) * rate;
            const userStats = {};

            const leaderboard = Object.keys(userStats).map(uid => ({ uid, ...userStats[uid], name:users.find(u => String(u.id) === String(uid))?.name || t.common.unknown, color:users.find(u => String(u.id) === String(uid))?.color || '#cbd5e1' })).sort((a,b) => b.minutes - a.minutes).slice(0, 5);

                const dates = [];

                for(let i=0; i<7; i++) { const tempD = new Date(Date.UTC(y, m-1, d-i)); dates.push(`${tempD.getUTCFullYear()}-${String(tempD.getUTCMonth()+1).padStart(2,'0')}-${String(tempD.getUTCDate()).padStart(2,'0')}`); }

            };
            const rangeDays = getLast7DaysPST();

            const paidGroups = {};
            myPaidSheets.forEach(ts => { const dateKey = ts.paidAt ? ts.paidAt.split('T')[0] : 'Unknown'; if(!paidGroups[dateKey]) paidGroups[dateKey] = { totalMinutes:0, dates:[] }; paidGroups[dateKey].totalMinutes += parseInt(ts.duration || 0); paidGroups[dateKey].dates.push(getPSTDay(ts.date, ts.startTime) || ts.date); });
            const sortedPaidHistory = Object.keys(paidGroups).sort((a,b) => new Date(b) - new Date(a));

                    return { id:s.id, start:startConv.time, end:endConv.time, origStart:startConv.originalObj, planMins:(endEpoch - startEpoch)/60000, actualMins:0, matched:[] };

                    else if (mode === 'change') { if (user && (user.password === password || user.password === hashed)) { showNotify(t.auth.errorSame, "error"); return; } setPasswordModal(prev => ({ ...prev, show:false })); triggerConfirm(t.auth.confirmChange, async () => { setLoading(true); try { await window.fs.updateDoc(window.fs.doc(window.db, 'users', currentUser), { password:hashed }); showNotify(t.auth.successChange, 'success'); } catch(e) { showNotify(t.auth.errorUpdatePass, "error"); } finally { setLoading(false); } }); }

                const currentEpochNow = Date.now();
                const dNowComp = new Date(currentEpochNow + TZ_CONFIG[timezone].offsetUTC * 3600000);
                const currentTimeTzStr = `${dNowComp.getUTCFullYear()}-${String(dNowComp.getUTCMonth()+1).padStart(2,'0')}-${String(dNowComp.getUTCDate()).padStart(2,'0')}T${String(dNowComp.getUTCHours()).padStart(2,'0')}:${String(dNowComp.getUTCMinutes()).padStart(2,'0')}`;
                if (!editScheduleId && startStr < currentTimeTzStr) { if ((new Date(currentTimeTzStr) - new Date(startStr)) > 60000) return showNotify(t.schedule.pastError, "error"); }
                let conflictUser = null;
                const isConflict = schedules.some(s => { if (editScheduleId && s.id === editScheduleId) return false; const existStartEpoch = getEpochFromWIB(s.startDate || s.date, s.startTime); let existEndEpoch = getEpochFromWIB(s.endDate || s.date, s.endTime); if (!s.endDate && existEndEpoch <= existStartEpoch) existEndEpoch += 86400000; if (newStartEpoch < existEndEpoch && newEndEpoch > existStartEpoch) { conflictUser = getUserName(s.userId); return true; } return false; });
                if (isConflict) return showNotify(`${t.schedule.conflict} ${conflictUser}!`, "error");
                triggerConfirm(t.schedule.confirmBooking, async () => { setLoading(true); try { const payload = { userId:currentUser, startDate:dbStart.date, startTime:dbStart.time, endDate:dbEnd.date, endTime:dbEnd.time, updatedAt:new Date().toISOString() }; if (editScheduleId) { await window.fs.updateDoc(window.fs.doc(window.db, 'schedules', editScheduleId), payload); } else { await window.fs.addDoc(window.fs.collection(window.db, 'schedules'), payload); } showNotify(t.schedule.success); setScheduleForm({ startDate:'', startTime:'14:00', endDate:'', endTime:'15:00' }); setEditScheduleId(null); } catch(err) { showNotify(err.message || t.common.error, "error"); } finally { setLoading(false); } });
            };
            const deleteSchedule = (id) => { if (timesheets.some(ts => ts.scheduleId === id)) return showNotify(t.schedule.deleteLinkedError, "error", 5000); triggerConfirm(t.common.delete + "?", async () => { await window.fs.deleteDoc(window.fs.doc(window.db, 'schedules', id)); }); };
            const editSchedule = (item) => { const uiStart = getDisplayTime(item.startTime, item.startDate || item.date, timezone); const uiEnd = getDisplayTime(item.endTime, item.endDate || item.date, timezone); setScheduleForm({startDate:uiStart.date, startTime:uiStart.time, endDate:uiEnd.date, endTime:uiEnd.time}); setEditScheduleId(item.id); window.scrollTo({top:0,behavior:'smooth'}); };
            const saveTimesheet = async (e) => {
                e.preventDefault();
                if (!currentUser) return showNotify(t.timesheet.selectUser, "error");
                if (!timesheetForm.scheduleId || !timesheetForm.date || !timesheetForm.startTime || !timesheetForm.endDate || !timesheetForm.endTime) return showNotify(t.common.requiredField, "error");
                const startStr = `${timesheetForm.date}T${timesheetForm.startTime}`;
                const endStr = `${timesheetForm.endDate || timesheetForm.date}T${timesheetForm.endTime}`;
                if (endStr <= startStr) return showNotify(t.timesheet.timeError, "error");
                if (timesheetForm.scheduleId) {
                    if (timesheets.some(ts => String(ts.userId) === String(currentUser) && ts.scheduleId && String(ts.scheduleId) === String(timesheetForm.scheduleId) && ts.id !== editTimesheetId)) return showNotify(t.timesheet.duplicateError, "error");
                    const selectedSchedule = schedules.find(s => String(s.id) === String(timesheetForm.scheduleId));
                    if (selectedSchedule) { const schedStartEpoch = getEpochFromWIB(selectedSchedule.startDate || selectedSchedule.date, selectedSchedule.startTime); let schedEndEpoch = getEpochFromWIB(selectedSchedule.endDate || selectedSchedule.date, selectedSchedule.endTime); if (schedEndEpoch <= schedStartEpoch) schedEndEpoch += 86400000; if (Date.now() < (schedEndEpoch - 120000)) return showNotify(t.timesheet.earlySubmitError, "error"); }
                }
                const dbStart = getDbTime(timesheetForm.startTime, timesheetForm.date, timezone);
                const dbEnd = getDbTime(timesheetForm.endTime, timesheetForm.endDate || timesheetForm.date, timezone);
                const newStartEpoch = getEpochFromWIB(dbStart.date, dbStart.time);
                let newEndEpoch = getEpochFromWIB(dbEnd.date, dbEnd.time);
                if (newEndEpoch <= newStartEpoch) newEndEpoch += 86400000;
                const isOverlap = timesheets.some(ts => { if (String(ts.userId) !== String(currentUser)) return false; if (editTimesheetId && ts.id === editTimesheetId) return false; const existStartEpoch = getEpochFromWIB(ts.date, ts.startTime); let existEndEpoch; if (ts.endTime) { existEndEpoch = getEpochFromWIB(ts.endDate || ts.date, ts.endTime); if (existEndEpoch <= existStartEpoch) existEndEpoch += 86400000; } else if (ts.duration) { existEndEpoch = existStartEpoch + (ts.duration * 60000); } else return false; return (newStartEpoch < existEndEpoch && newEndEpoch > existStartEpoch); });
                if (isOverlap) return showNotify(t.timesheet.overlapError, "error");
                triggerConfirm(t.timesheet.confirmSubmit, async () => { setLoading(true); try { const d1 = new Date(`${dbStart.date}T${dbStart.time}:00Z`); let d2 = new Date(`${dbEnd.date}T${dbEnd.time}:00Z`); if (d2 < d1) d2.setUTCDate(d2.getUTCDate()+1); const dur = Math.max(0, Math.round((d2 - d1) / 60000)); if (dur <= 0) { setLoading(false); return showNotify(t.timesheet.timeError, "error"); } const idr = Math.round((dur/60)*RATES.id); const usd = ((dur/60)*RATES.en).toFixed(2); const payload = { userId:currentUser, scheduleId:timesheetForm.scheduleId||'', date:dbStart.date, startTime:dbStart.time, endDate:dbEnd.date, endTime:dbEnd.time, duration:dur, paymentUSD:usd, paymentIDR:idr, status:'pending', updatedAt:new Date().toISOString() }; if (editTimesheetId) { await window.fs.updateDoc(window.fs.doc(window.db, 'timesheets', editTimesheetId), payload); } else { payload.createdAt = new Date().toISOString(); await window.fs.addDoc(window.fs.collection(window.db, 'timesheets'), payload); } showNotify(t.common.saved); setTimesheetForm({ scheduleId:'', date:'', startTime:'', endDate:'', endTime:'' }); setEditTimesheetId(null); } catch(e) { showNotify(t.common.error, "error"); } finally { setLoading(false); } });
            };
            const deleteTimesheet = (id) => { triggerConfirm(t.common.delete + "?", async () => { await window.fs.deleteDoc(window.fs.doc(window.db, 'timesheets', id)); }); };
            const editTimesheet = (item) => { const uiStart = getDisplayTime(item.startTime, item.date, timezone); let finalEndDate = item.endDate || item.date; let finalEndTime = item.endTime; if (!finalEndTime && item.duration) { const startEpoch = getEpochFromWIB(item.date, item.startTime); const endEpoch = startEpoch + (item.duration * 60000); const d = new Date(endEpoch); const targetZone = TZ_CONFIG[timezone].iana || 'Asia/Jakarta'; const formatterDate = new Intl.DateTimeFormat('en-CA', { timeZone:targetZone, year:'numeric', month:'2-digit', day:'2-digit' }); const formatterTime = new Intl.DateTimeFormat('en-GB', { timeZone:targetZone, hour:'2-digit', minute:'2-digit', hour12:false }); finalEndDate = formatterDate.format(d); finalEndTime = formatterTime.format(d); } else if (finalEndTime) { const uiEnd = getDisplayTime(finalEndTime, finalEndDate, timezone); finalEndDate = uiEnd.date; finalEndTime = uiEnd.time; } setTimesheetForm({ scheduleId:item.scheduleId||'', date:uiStart.date, startTime:uiStart.time, endDate:finalEndDate, endTime:finalEndTime||'' }); setEditTimesheetId(item.id); window.scrollTo({top:0,behavior:'smooth'}); };

            const isAdmin = String(currentUser) === ADMIN_ID;
            const activeUser = users.find(u => String(u.id) === String(currentUser));
            const hasPaymentInfo = activeUser && activeUser.bankName && activeUser.accountNumber;

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col font-sans text-slate-800 pb-16">
                    <style>{`
                        :root {
                            --tw-color-primary-50: ${currentThemeData.primary[50]};
                            --tw-color-primary-100: ${currentThemeData.primary[100]};
                            --tw-color-primary-200: ${currentThemeData.primary[200]};
                            --tw-color-primary-300: ${currentThemeData.primary[300]};
                            --tw-color-primary-400: ${currentThemeData.primary[400]};
                            --tw-color-primary-500: ${currentThemeData.primary[500]};
                            --tw-color-primary-600: ${currentThemeData.primary[600]};
                            --tw-color-primary-700: ${currentThemeData.primary[700]};
                            --tw-color-primary-800: ${currentThemeData.primary[800]};
                            --tw-color-primary-900: ${currentThemeData.primary[900]};
                            --tw-color-accent-50: ${currentThemeData.accent[50]};
                            --tw-color-accent-100: ${currentThemeData.accent[100]};
                            --tw-color-accent-200: ${currentThemeData.accent[200]};
                            --tw-color-accent-300: ${currentThemeData.accent[300]};
                            --tw-color-accent-400: ${currentThemeData.accent[400]};
                            --tw-color-accent-500: ${currentThemeData.accent[500]};
                            --tw-color-accent-600: ${currentThemeData.accent[600]};
                            --tw-color-accent-700: ${currentThemeData.accent[700]};
                            --tw-color-accent-800: ${currentThemeData.accent[800]};
                            --tw-color-accent-900: ${currentThemeData.accent[900]};
                        }
                    `}</style>

                    {notify && <Notification msg={notify.msg} type={notify.type} onClose={() => setNotify(null)} />}
                    {showProfileModal && <ProfileModal user={activeUser} onClose={() => setShowProfileModal(false)} onSave={saveUserProfile} loading={loading} lang={lang} t={t} onChangePassword={() => { setShowProfileModal(false); setPasswordModal({show:true, mode:'change', userId:currentUser}); }} showNotify={showNotify} />}
                    {showUserModal && <UserModal user={editingUser} onClose={() => {setShowUserModal(false); setEditingUser(null);}} onSave={handleSaveUser} loading={loading} t={t} showNotify={showNotify} />}
                    {passwordModal.show && <PasswordModal mode={passwordModal.mode} userName={users.find(u => String(u.id) === String(passwordModal.userId))?.name} onSubmit={handlePasswordSubmit} onClose={() => setPasswordModal({ ...passwordModal, show:false })} loading={loading} t={t} showNotify={showNotify} />}
                    {confirmModal.show && <ConfirmationModal isOpen={confirmModal.show} message={confirmModal.message} onConfirm={executeConfirm} onCancel={() => setConfirmModal({ ...confirmModal, show:false })} t={t} />}

                    <header className="glass-panel sticky top-0 z-40 shadow-sm border-b border-white/40">
                        <div className="px-5 pt-4 pb-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-tr from-primary-500 to-accent-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary-200"><i className="fas fa-calendar-check text-lg"></i></div>
                                <div><h1 className="font-extrabold text-xl text-slate-800 tracking-tight">Slot Kerja</h1><p className="text-[10px] text-primary-600 font-extrabold tracking-widest uppercase">Iyap Team</p></div>
                            </div>
                            <div className="relative group flex items-center gap-2">
                                {currentUser && (<button onClick={handleLogout} title={t.common.logout} className="text-slate-400 hover:text-rose-500 transition-colors p-2 rounded-full hover:bg-rose-50"><i className="fas fa-sign-out-alt text-base"></i></button>)}
                                <div className="flex items-center gap-2.5 bg-white/80 backdrop-blur-md border border-slate-200 rounded-full pl-1.5 pr-4 py-1.5 shadow-sm group-hover:border-primary-300 group-hover:shadow-md transition-all cursor-pointer">
                                    <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-[11px] font-extrabold shadow-inner" style={{backgroundColor:activeUser ? activeUser.color : '#94a3b8'}}>{activeUser ? activeUser.name.substring(0,1).toUpperCase() : <i className="fas fa-user"></i>}</div>
                                    <span className="text-xs font-bold text-slate-700 max-w-[80px] truncate">{activeUser ? activeUser.name : t.timesheet.selectUser}</span>
                                    <i className="fas fa-chevron-down text-[10px] text-primary-500 ml-1"></i>
                                    <select className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value={currentUser || passwordModal.userId || ''} onChange={handleUserChange}>
                                        <option value="" disabled>{t.timesheet.selectUser}</option>
                                        {users.filter(u => !u.hidden).map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div className="px-5 pb-4 flex flex-col gap-2">
                            <div className="flex gap-2.5 mt-1">
                                <button onClick={() => setLang(l => l === 'id' ? 'en' : 'id')} className="flex items-center gap-2 px-3 py-2 bg-white/80 backdrop-blur-sm hover:bg-primary-50 border border-slate-200 hover:border-primary-200 rounded-xl transition-all active:scale-95 shadow-sm">
                                    <div className="w-5 h-5 rounded-full bg-primary-100 flex items-center justify-center text-[9px] font-extrabold text-primary-700">{lang === 'id' ? 'ID' : 'EN'}</div>
                                    <span className="text-[10px] font-bold text-slate-700 hidden sm:inline-block">{lang === 'id' ? 'Bahasa' : 'English'}</span>
                                </button>
                                <div className="relative flex-1">
                                    <div className="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none"><i className="far fa-clock text-primary-500 text-sm"></i></div>
                                    <select className="appearance-none w-full bg-white/80 backdrop-blur-sm hover:bg-primary-50 border border-slate-200 hover:border-primary-200 rounded-xl pl-10 pr-9 py-2.5 text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-primary-200 transition-all cursor-pointer shadow-sm" value={timezone} onChange={e => setTimezone(e.target.value)}>
                                        {Object.keys(TZ_CONFIG).map(k => <option key={k} value={k}>{TZ_CONFIG[k].label}</option>)}
                                    </select>
                                    <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none"><i className="fas fa-chevron-down text-[11px] text-primary-500"></i></div>
                                </div>
                                <div className="flex items-center justify-center bg-white/80 backdrop-blur-sm border border-slate-200 px-3 rounded-xl shadow-sm hover:bg-primary-50 transition-colors"><InfoTooltip text={t.tooltips.tzInfo} align="right" /></div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 sm:p-6 relative z-10">
                        {loading && !users.length ? (
                            <div className="flex flex-col items-center justify-center h-[60vh] text-primary-500 animate-pulse">
                                <div className="w-16 h-16 bg-white rounded-2xl shadow-xl flex items-center justify-center mb-4"><i className="fas fa-circle-notch fa-spin text-3xl"></i></div>
                                <p className="font-bold text-slate-500 tracking-widest uppercase text-xs">{t.common.loading}</p>
                            </div>
                        ) : (
                            <>
                                {view === 'dashboard' && <DashboardView currentUser={currentUser} getUserName={getUserName} timesheets={timesheets} schedules={schedules} users={users} getUserColor={getUserColor} onEditProfile={() => { if(!currentUser) return showNotify(t.timesheet.selectUser, "error"); setShowProfileModal(true); }} setView={setView} t={t} formatCurrency={formatCurrency} lang={lang} timezone={timezone} />}
                                {view === 'schedule' && <ScheduleManager editScheduleId={editScheduleId} setEditScheduleId={setEditScheduleId} scheduleForm={scheduleForm} setScheduleForm={setScheduleForm} saveSchedule={saveSchedule} loading={loading} schedules={schedules} currentUser={currentUser} getUserColor={getUserColor} getUserName={getUserName} deleteSchedule={deleteSchedule} editSchedule={editSchedule} isAdmin={isAdmin} lang={lang} t={t} timezone={timezone} sysSettings={sysSettings} showNotify={showNotify} />}
                                {view === 'timesheet' && <ReportManager saveTimesheet={saveTimesheet} timesheetForm={timesheetForm} setTimesheetForm={setTimesheetForm} loading={loading} timesheets={timesheets} schedules={schedules} getUserName={getUserName} currentUser={currentUser} deleteTimesheet={deleteTimesheet} editTimesheetId={editTimesheetId} setEditTimesheetId={setEditTimesheetId} editTimesheet={editTimesheet} hasPaymentInfo={hasPaymentInfo} onOpenProfile={() => setShowProfileModal(true)} isAdmin={isAdmin} lang={lang} t={t} formatCurrency={formatCurrency} timezone={timezone} showNotify={showNotify} />}
                                {view === 'analytics' && <AnalyticsView timesheets={timesheets} schedules={schedules} users={users} currentUser={currentUser} isAdmin={isAdmin} loading={loading} lang={lang} t={t} formatCurrency={formatCurrency} timezone={timezone} />}
                                {view === 'admin' && isAdmin && <AdminPanel timesheets={timesheets} users={users} schedules={schedules} loading={loading} setLoading={setLoading} showNotify={showNotify} t={t} lang={lang} formatCurrency={formatCurrency} onAddUser={() => { setEditingUser(null); setShowUserModal(true); }} onEditUser={(u) => { setEditingUser(u); setShowUserModal(true); }} onDeleteUser={handleDeleteUser} onConfirmAction={triggerConfirm} sysSettings={sysSettings} updateSettings={updateSysSettings} getUserColor={getUserColor} timezone={timezone} />}
                            </>
                        )}
                    </main>

                    <nav className="glass-panel fixed bottom-0 left-0 right-0 py-3 z-40 max-w-md mx-auto shadow-[0_-10px_40px_rgba(0,0,0,0.05)] rounded-t-[2rem] border-x border-white/40">
                        <div className={`grid ${isAdmin ? 'grid-cols-5' : 'grid-cols-4'} gap-2 px-4`}>
                            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all duration-300 ${view==='dashboard'?'text-primary-600 bg-primary-50 shadow-sm -translate-y-1':'text-slate-400 hover:bg-slate-50 hover:text-primary-500'}`}><i className={`fas fa-home text-xl mb-1.5 ${view==='dashboard'?'scale-110 drop-shadow-sm':''} transition-transform`}></i><span className="text-[9px] font-extrabold tracking-wide">{t.nav.home}</span></button>
                            <button onClick={() => setView('schedule')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all duration-300 ${view==='schedule'?'text-primary-600 bg-primary-50 shadow-sm -translate-y-1':'text-slate-400 hover:bg-slate-50 hover:text-primary-500'}`}><i className={`fas fa-calendar-alt text-xl mb-1.5 ${view==='schedule'?'scale-110 drop-shadow-sm':''} transition-transform`}></i><span className="text-[9px] font-extrabold tracking-wide">{t.nav.schedule}</span></button>
                            <button onClick={() => setView('timesheet')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all duration-300 ${view==='timesheet'?'text-primary-600 bg-primary-50 shadow-sm -translate-y-1':'text-slate-400 hover:bg-slate-50 hover:text-primary-500'}`}><i className={`fas fa-file-invoice-dollar text-xl mb-1.5 ${view==='timesheet'?'scale-110 drop-shadow-sm':''} transition-transform`}></i><span className="text-[9px] font-extrabold tracking-wide">{t.nav.timesheet}</span></button>
                            <button onClick={() => setView('analytics')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all duration-300 ${view==='analytics'?'text-primary-600 bg-primary-50 shadow-sm -translate-y-1':'text-slate-400 hover:bg-slate-50 hover:text-primary-500'}`}><i className={`fas fa-chart-pie text-xl mb-1.5 ${view==='analytics'?'scale-110 drop-shadow-sm':''} transition-transform`}></i><span className="text-[9px] font-extrabold tracking-wide">{t.nav.analytics}</span></button>
                            {isAdmin && (<button onClick={() => setView('admin')} className={`flex flex-col items-center p-2.5 rounded-2xl transition-all duration-300 ${view==='admin'?'text-slate-800 bg-slate-100 shadow-sm -translate-y-1':'text-slate-400 hover:bg-slate-50 hover:text-slate-700'}`}><i className={`fas fa-user-shield text-xl mb-1.5 ${view==='admin'?'scale-110 drop-shadow-sm':''} transition-transform`}></i><span className="text-[9px] font-extrabold tracking-wide">{t.nav.admin}</span></button>)}
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
