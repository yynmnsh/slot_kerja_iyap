            const [busy, setBusy] = useState(false);
            const [actLog, setActLog] = useState([]);
            const [showUF, setShowUF] = useState(false);
            const [editU, setEditU] = useState(null);

            const isAdm = session.role==='admin' || session.role==='superadmin';
            const getU = (uid) => users.find(u=>u.id===uid) || {displayName:'?',color:'#94a3b8'};
            const xRate = (sysSettings?.usdToIdr||16000);
            const fmtC = (n) => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n);
            const getAmt = (ts) => (parseFloat(ts.paymentUSD)||0) * xRate;

            useEffect(()=>{if(!isEditSt)setSF({dailyQuotaHours:sysSettings?.dailyQuotaHours||10,baseHourlyRateUSD:sysSettings?.baseHourlyRateUSD||15,usdToIdr:sysSettings?.usdToIdr||16000,userRates:sysSettings?.userRates||{}});},[sysSettings]);
            useEffect(()=>{if(!tenant?.id)return;const unsub=window.fs.onSnapshot(window.fs.collection(window.db,`tenants/${tenant.id}/activityLog`),snap=>{const e=snap.docs.map(d=>({id:d.id,...d.data()}));e.sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));setActLog(e.slice(0,100));});return()=>unsub();},[tenant?.id]);
            const logAct=async(action,detail,userId)=>{try{await window.fs.addDoc(window.fs.collection(window.db,`tenants/${tenant.id}/activityLog`),{ts:new Date().toISOString(),action,detail,userId});}catch(e){}};

            // User CRUD
            const saveUser=async(data)=>{try{if(editU){const ud={...data};if(!ud.passwordHash)delete ud.passwordHash;await window.fs.updateDoc(window.fs.doc(window.db,'users',editU.id),ud);logAct('user_edit',data.displayName,session.id);notify('Pengguna diperbarui','success');}else{const q=window.fs.query(window.fs.collection(window.db,'users'),window.fs.where('username','==',data.username));const snap=await window.fs.getDocs(q);if(!snap.empty){notify('Username sudah digunakan','error');return;}await window.fs.setDoc(window.fs.doc(window.db,'users',gid()),{...data,createdAt:new Date().toISOString()});logAct('user_add',data.displayName,session.id);notify('Pengguna dibuat','success');}setShowUF(false);setEditU(null);}catch(e){notify('Gagal: '+e.message,'error');}};
            const delUser=(uid)=>{const u=getU(uid);setCfm({show:true,title:'Hapus Pengguna?',msg:`"${u.displayName}" akan dihapus.`,danger:true,onOk:async()=>{setCfm({show:false});try{await window.fs.deleteDoc(window.fs.doc(window.db,'users',uid));logAct('user_delete',u.displayName,session.id);notify('Dihapus','success');}catch(e){notify('Gagal','error');}}});};

            // Payment
            const pendSh=timesheets.filter(t=>t.status==='pending');const paidSh=timesheets.filter(t=>t.status==='paid');
            const totalPendAmt=pendSh.reduce((a,t)=>a+getAmt(t),0);const totalPendMins=pendSh.reduce((a,t)=>a+parseInt(t.duration||0),0);
            const pendByUser=useMemo(()=>{const m={};pendSh.forEach(ts=>{if(!m[ts.userId])m[ts.userId]={sheets:[],total:0,mins:0};m[ts.userId].sheets.push(ts);m[ts.userId].total+=getAmt(ts);m[ts.userId].mins+=parseInt(ts.duration||0);});return Object.entries(m).map(([uid,d])=>({uid,...d}));},[pendSh,sysSettings]);

            const allSelSheets=pendSh.filter(s=>{const sel=selectedSheets[s.userId];return sel&&sel.has(s.id);});
            const selTotal=allSelSheets.reduce((a,s)=>a+getAmt(s),0);const selMins=allSelSheets.reduce((a,s)=>a+parseInt(s.duration||0),0);const hasSel=allSelSheets.length>0;
            const toggleSheet=(uid,sid)=>setSelSh(p=>{const s=new Set(p[uid]||[]);s.has(sid)?s.delete(sid):s.add(sid);return{...p,[uid]:s};});
            const toggleAllUser=(uid,sheets)=>setSelSh(p=>{const s=p[uid]||new Set();const all=sheets.every(x=>s.has(x.id));return{...p,[uid]:all?new Set():new Set(sheets.map(x=>x.id))};});

            const markPaid=(ids)=>{setCfm({show:true,title:'Tandai Dibayar?',msg:`${ids.length} laporan akan ditandai dibayar.`,onOk:async()=>{setCfm({show:false});setBusy(true);try{const b=window.fs.writeBatch(window.db);ids.forEach(id=>b.update(window.fs.doc(window.db,`tenants/${tenant.id}/timesheets`,id),{status:'paid',paidAt:new Date().toISOString()}));await b.commit();logAct('payment_marked_paid',`${ids.length} laporan`,session.id);notify(`${ids.length} ditandai dibayar`,'success');setSelSh({});}catch(e){notify('Gagal','error');}setBusy(false);}});};
            const markUnpaid=(id)=>{const ts=timesheets.find(t=>t.id===id);const u=ts?getU(ts.userId).displayName:'';setCfm({show:true,title:'Kembalikan ke Pending?',msg:`Laporan ${u} akan dikembalikan ke status pending.`,onOk:async()=>{setCfm({show:false});setBusy(true);try{await window.fs.updateDoc(window.fs.doc(window.db,`tenants/${tenant.id}/timesheets`,id),{status:'pending',paidAt:null});logAct('payment_reverted',u,session.id);notify('Dikembalikan ke pending','success');}catch(e){notify('Gagal','error');}setBusy(false);}});};
            const deleteTs=(id)=>{const ts=timesheets.find(t=>t.id===id);const u=ts?getU(ts.userId).displayName:'';setCfm({show:true,title:'Hapus Laporan?',msg:`Laporan ${u} akan dihapus permanen.`,danger:true,onOk:async()=>{setCfm({show:false});try{await window.fs.deleteDoc(window.fs.doc(window.db,`tenants/${tenant.id}/timesheets`,id));logAct('timesheet_delete',u,session.id);notify('Laporan dihapus','success');}catch(e){notify('Gagal','error');}}});};

            // History batches
            const batches=useMemo(()=>{const m={};paidSh.forEach(ts=>{const k=ts.paidAt?ts.paidAt.slice(0,10):(ts.date||'x');if(!m[k])m[k]={sheets:[],total:0,mins:0};m[k].sheets.push(ts);m[k].total+=getAmt(ts);m[k].mins+=parseInt(ts.duration||0);});Object.values(m).forEach(b=>{const dates=b.sheets.map(s=>s.date).sort();b.dateMin=dates[0];b.dateMax=dates[dates.length-1];b.byUser={};b.sheets.forEach(s=>{if(!b.byUser[s.userId])b.byUser[s.userId]={total:0,mins:0,sheets:[]};b.byUser[s.userId].total+=getAmt(s);b.byUser[s.userId].mins+=parseInt(s.duration||0);b.byUser[s.userId].sheets.push(s);});});return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));},[paidSh,sysSettings]);

            // CSV
            const dlCSV=(name,rows)=>{const bom='\uFEFF';const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();};
            const exportSch=()=>{dlCSV(`jadwal_${getToday()}.csv`,[['ID','User','Tgl Mulai','Mulai','Tgl Selesai','Selesai','Updated'],...schedules.map(s=>[s.id,getU(s.userId).displayName,s.startDate||s.date,s.startTime,s.endDate||s.date,s.endTime,s.updatedAt||''])]);notify('CSV diunduh','success');};
            const exportTs=()=>{dlCSV(`laporan_${getToday()}.csv`,[['ID','User','Tanggal','Mulai','Selesai','Durasi','USD','IDR','Status','Dibayar'],...timesheets.map(ts=>[ts.id,getU(ts.userId).displayName,ts.date,ts.startTime,ts.endTime||'',ts.duration||0,ts.paymentUSD||0,ts.paymentIDR||0,ts.status,ts.paidAt||''])]);notify('CSV diunduh','success');};
            const saveSt=async()=>{setBusy(true);try{const cleanRates={};if(settingsForm.userRates){Object.entries(settingsForm.userRates).forEach(([uid,val])=>{const n=parseFloat(val);if(n>0)cleanRates[uid]=n;});}const payload={...settingsForm,userRates:cleanRates};await window.fs.updateDoc(window.fs.doc(window.db,'tenants',tenant.id),{settings:payload});logAct('settings_update',`kuota=${settingsForm.dailyQuotaHours}j rate=$${settingsForm.baseHourlyRateUSD}`,session.id);notify('Pengaturan disimpan','success');setIsEditSt(false);}catch(e){notify('Gagal: '+e.message,'error');}setBusy(false);};

            const RoleBadge=({role})=>{const m={admin:{bg:'bg-purple-100',tx:'text-purple-700',l:'Admin'},semiadmin:{bg:'bg-blue-100',tx:'text-blue-700',l:'Semi-Admin'},user:{bg:'bg-slate-100',tx:'text-slate-600',l:'User'}};const s=m[role]||m.user;return<span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${s.bg} ${s.tx}`}>{s.l}</span>;};
            const tabs=[{id:'pending',l:'Pending',icon:'fa-money-bill-wave'},{id:'history',l:'Riwayat',icon:'fa-receipt'},{id:'users',l:'Pengguna',icon:'fa-users'},{id:'log',l:'Log',icon:'fa-history'},{id:'export',l:'CSV',icon:'fa-download'},{id:'settings',l:'',icon:'fa-cog'}];

            return (
                <div className="space-y-4 animate-fade-in pb-20">
                    <div className="glass-strong rounded-2xl border border-white/50 p-1.5 flex gap-1 overflow-x-auto">{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 py-2 text-[10px] font-bold rounded-xl transition whitespace-nowrap px-2 flex items-center justify-center gap-1 ${tab===t.id?'text-white shadow-sm':'text-slate-400'}`} style={tab===t.id?{background:`linear-gradient(135deg, ${theme.primary}, ${theme.primaryDark})`}:{}}><i className={`fas ${t.icon} text-[9px]`}></i>{t.l&&<span>{t.l}</span>}</button>)}</div>

                    {/* PENDING */}
                    {tab==='pending'&&(<div className="space-y-3">
                        <div className="rounded-2xl overflow-hidden shadow-xl" style={{background:'linear-gradient(135deg, #1e293b, #0f172a)'}}>
                            <div className="grid grid-cols-2 divide-x divide-white/10"><div className="p-4"><p className="text-[10px] font-bold text-green-300 uppercase mb-1"><i className="fas fa-check-circle mr-1"></i>Siap Dibayar</p><p className={`text-xl font-black ${hasSel?'text-green-300':'text-slate-500'}`}>{fmtC(selTotal)}</p><p className="text-[10px] text-slate-400 mt-0.5">{allSelSheets.length} laporan · {fmtDuration(selMins)}</p></div><div className="p-4"><p className="text-[10px] font-bold text-slate-400 uppercase mb-1"><i className="fas fa-clock mr-1"></i>Masih Pending</p><p className="text-xl font-black text-slate-300">{fmtC(totalPendAmt-selTotal)}</p><p className="text-[10px] text-slate-500 mt-0.5">{pendSh.length-allSelSheets.length} laporan</p></div></div>
                            {hasSel&&<div className="px-4 pb-4 pt-3 border-t border-white/10"><button onClick={()=>markPaid(allSelSheets.map(s=>s.id))} disabled={busy} className="w-full bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50">{busy?<i className="fas fa-spinner fa-spin"></i>:<i className="fas fa-check-circle"></i>}Tandai Dibayar <span className="bg-white/20 px-2 py-0.5 rounded-lg text-[11px]">{allSelSheets.length} · {fmtC(selTotal)}</span></button></div>}
                            {!hasSel&&pendSh.length>0&&<div className="px-4 pb-3 pt-1"><p className="text-center text-[11px] text-slate-500 italic"><i className="fas fa-hand-point-down mr-1"></i>Pilih laporan di bawah</p></div>}
                        </div>
                        {pendSh.length===0?<div className="glass-strong rounded-2xl border border-white/50 p-10 text-center"><i className="fas fa-check-circle text-3xl text-slate-200 mb-3 block"></i><p className="text-slate-400 text-sm">Tidak ada tagihan pending</p></div>:
                        pendByUser.map(grp=>{const u=getU(grp.uid);const uSel=selectedSheets[grp.uid]||new Set();const allSel=grp.sheets.every(s=>uSel.has(s.id));const someSel=grp.sheets.some(s=>uSel.has(s.id));const isExp=expandedUsers[grp.uid]!==false;const selCount=[...uSel].filter(id=>grp.sheets.some(s=>s.id===id)).length;const selAmt=grp.sheets.filter(s=>uSel.has(s.id)).reduce((a,s)=>a+getAmt(s),0);const selMinsU=grp.sheets.filter(s=>uSel.has(s.id)).reduce((a,s)=>a+parseInt(s.duration||0),0);return(
                            <div key={grp.uid} className="glass-strong rounded-2xl border overflow-hidden" style={{borderColor:someSel?u.color+'55':'rgba(148,163,184,0.2)'}}>
                                <div className="flex items-center gap-3 px-3 py-3" style={{backgroundColor:someSel?u.color+'12':'transparent'}}>
                                    <div onClick={()=>toggleAllUser(grp.uid,grp.sheets)} className="flex-shrink-0 cursor-pointer p-1 -ml-1 active:scale-90"><div className="w-6 h-6 rounded-lg border-2 flex items-center justify-center" style={{borderColor:allSel||someSel?u.color:'#cbd5e1',backgroundColor:allSel?u.color:someSel?u.color+'22':'white'}}>{allSel&&<i className="fas fa-check text-white text-[10px]"></i>}{someSel&&!allSel&&<i className="fas fa-minus text-[10px]" style={{color:u.color}}></i>}</div></div>
                                    <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white font-black text-xs flex-shrink-0 shadow-sm" style={{backgroundColor:u.color}}>{(u.displayName||'?').substring(0,2).toUpperCase()}</div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 flex-wrap"><p className="font-black text-slate-800 text-sm">{u.displayName}</p></div>
                                        <p className="text-[10px] text-slate-400 mt-0.5">Total: {grp.sheets.length} lap · {fmtDuration(grp.mins)} · {fmtC(grp.total)}</p>
                                        {someSel&&<p className="text-[10px] font-bold mt-0.5" style={{color:u.color}}><i className="fas fa-check-circle mr-0.5 text-[8px]"></i>Dipilih: {selCount}/{grp.sheets.length} lap · {fmtDuration(selMinsU)} · {fmtC(selAmt)}</p>}
                                    </div>
                                    <button onClick={()=>setExpU(p=>({...p,[grp.uid]:!isExp}))} className="text-slate-300 p-1"><i className={`fas fa-chevron-${isExp?'up':'down'} text-xs`}></i></button>
                                </div>
                                {isExp&&<div className="border-t border-slate-100/80 divide-y divide-slate-50">{grp.sheets.sort((a,b)=>`${b.date}T${b.startTime}`.localeCompare(`${a.date}T${a.startTime}`)).map(ts=>{const isSel=uSel.has(ts.id);const sO=toDisplayTime(ts.startTime,ts.date,tz);const eO=ts.endTime?toDisplayTime(ts.endTime,ts.endDate||ts.date,tz):{time:'...'};return(
                                    <div key={ts.id} onClick={()=>toggleSheet(grp.uid,ts.id)} className={`flex items-center gap-3 px-4 py-2.5 cursor-pointer transition-colors ${isSel?'bg-blue-50/50':'hover:bg-slate-50'}`}>
                                        <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 ${isSel?'border-blue-500 bg-blue-500':'border-slate-300'}`}>{isSel&&<i className="fas fa-check text-white text-[8px]"></i>}</div>
                                        <div className="flex-1"><p className="text-[10px] font-bold text-slate-600">{formatDateShort(sO.date)}</p><p className="text-[9px] text-slate-400 font-mono">{sO.time}–{eO.time} · {fmtDuration(parseInt(ts.duration||0))}</p></div>
                                        <p className="text-xs font-black flex-shrink-0" style={{color:theme.primary}}>{fmtC(getAmt(ts))}</p>
                                    </div>);})}</div>}
                            </div>);})}
                    </div>)}

                    {/* HISTORY — with visible revert & delete buttons */}
                    {tab==='history'&&(<div className="space-y-3">
                        {batches.length===0?<div className="glass-strong rounded-2xl border border-white/50 p-10 text-center"><i className="fas fa-history text-3xl text-slate-200 mb-3 block"></i><p className="text-slate-400 text-sm">Belum ada riwayat</p></div>:
                        batches.map(([bk,batch])=>{const isBExp=expandedUsers['b_'+bk];return(
                            <div key={bk} className="glass-strong rounded-2xl border border-white/50 overflow-hidden card-lift">
                                <div onClick={()=>setExpU(p=>({...p,['b_'+bk]:!isBExp}))} className="flex items-start gap-3 px-4 py-3 cursor-pointer hover:bg-slate-50/50 transition-colors">
                                    <div className="w-9 h-9 rounded-xl bg-emerald-100 flex-shrink-0 flex flex-col items-center justify-center"><span className="text-[8px] font-bold text-emerald-500 uppercase">{new Date(bk+'T00:00:00').toLocaleDateString('id-ID',{month:'short'})}</span><span className="text-sm font-black text-emerald-700">{bk.slice(8)}</span></div>
                                    <div className="flex-1 min-w-0"><p className="text-xs font-black text-slate-700">Dibayar {formatDateShort(bk)}</p><p className="text-[10px] text-slate-400 mt-0.5">{Object.keys(batch.byUser).length} orang · {batch.sheets.length} lap · {fmtDuration(batch.mins)}</p></div>
                                    <div className="flex items-center gap-2 flex-shrink-0"><p className="font-black text-emerald-600">{fmtC(batch.total)}</p><i className={`fas fa-chevron-${isBExp?'up':'down'} text-slate-300 text-xs`}></i></div>
                                </div>
                                {isBExp&&<div className="border-t border-slate-100">{Object.entries(batch.byUser).sort((a,b)=>b[1].total-a[1].total).map(([uid,ud])=>{const u=getU(uid);const uKey='bu_'+bk+'_'+uid;const uExp=expandedUsers[uKey];return(
                                    <div key={uid} className="border-b border-slate-50 last:border-0">
                                        <div onClick={()=>setExpU(p=>({...p,[uKey]:!uExp}))} className="flex items-center gap-3 px-4 py-2.5 cursor-pointer hover:bg-slate-50">
                                            <div className="w-7 h-7 rounded-xl flex items-center justify-center text-white font-black text-[10px] flex-shrink-0" style={{backgroundColor:u.color}}>{(u.displayName||'?').slice(0,2).toUpperCase()}</div>
                                            <div className="flex-1"><span className="text-xs font-bold text-slate-700">{u.displayName}</span><p className="text-[9px] text-slate-400">{ud.sheets.length} lap · {fmtDuration(ud.mins)}</p></div>
                                            <span className="text-xs font-black flex-shrink-0" style={{color:u.color}}>{fmtC(ud.total)}</span><i className={`fas fa-chevron-${uExp?'up':'down'} text-slate-300 text-[9px] ml-1`}></i>
                                        </div>
                                        {uExp&&<div className="bg-slate-50/50">{ud.sheets.sort((a,b)=>b.date.localeCompare(a.date)).map(ts=>{const sO=toDisplayTime(ts.startTime,ts.date,tz);const eO=ts.endTime?toDisplayTime(ts.endTime,ts.endDate||ts.date,tz):{time:'...'};return(
                                            <div key={ts.id} className="flex items-center gap-3 px-4 py-2.5 border-t border-slate-100 hover:bg-white transition-colors">
                                                <div className="w-1 h-8 rounded-full flex-shrink-0" style={{backgroundColor:u.color+'55'}}></div>
                                                <div className="flex-1"><p className="text-[10px] font-bold text-slate-600">{formatDateShort(ts.date)}</p><p className="text-[9px] text-slate-400 font-mono">{sO.time}–{eO.time} · {fmtDuration(parseInt(ts.duration||0))}</p></div>
                                                <p className="text-xs font-black text-emerald-600 flex-shrink-0 mr-2">{fmtC(getAmt(ts))}</p>
                                                {/* Admin: Revert + Delete — always visible */}
                                                <button onClick={e=>{e.stopPropagation();markUnpaid(ts.id);}} className="w-7 h-7 rounded-lg border border-orange-200 bg-orange-50 hover:bg-orange-100 flex items-center justify-center text-orange-500 transition flex-shrink-0" title="Kembalikan ke Pending"><i className="fas fa-undo text-[9px]"></i></button>
                                                <button onClick={e=>{e.stopPropagation();deleteTs(ts.id);}} className="w-7 h-7 rounded-lg border border-red-200 bg-red-50 hover:bg-red-100 flex items-center justify-center text-red-500 transition flex-shrink-0" title="Hapus Laporan"><i className="fas fa-trash text-[9px]"></i></button>
                                            </div>);})}</div>}
                                    </div>);})}
                                </div>}
                            </div>);})}
                    </div>)}

                    {/* USERS */}
                    {tab==='users'&&(<div className="space-y-3">
                        <div className="flex items-center justify-between"><h3 className="text-sm font-bold text-slate-800">Pengguna ({users.length})</h3>{isAdm&&<button onClick={()=>{setEditU(null);setShowUF(true)}} className="btn-primary px-3.5 py-2 rounded-xl text-xs font-bold"><i className="fas fa-plus mr-1.5"></i>Tambah</button>}</div>
                        <div className="glass-strong rounded-2xl border border-white/50 overflow-hidden"><div className="divide-y divide-slate-100/80">{users.map(u=>(
                            <div key={u.id} className="px-5 py-3.5 flex items-center justify-between hover:bg-slate-50/50 transition-colors">
                                <div className="flex items-center gap-3 min-w-0"><div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:u.color||'#94a3b8'}}>{(u.displayName||'?')[0].toUpperCase()}</div>
                                <div className="min-w-0"><div className="flex items-center gap-2 flex-wrap"><span className="font-semibold text-sm text-slate-800">{u.displayName}</span><RoleBadge role={u.role} />{!u.isActive&&<span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-600">Nonaktif</span>}</div><span className="text-[11px] text-slate-400 font-mono">@{u.username}</span></div></div>
                                {isAdm&&u.role!=='admin'&&u.id!==session.id&&<div className="flex items-center gap-1 flex-shrink-0 ml-2"><button onClick={()=>{setEditU(u);setShowUF(true)}} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-100 text-slate-400 hover:text-slate-600"><i className="fas fa-pen text-xs"></i></button><button onClick={()=>delUser(u.id)} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-red-50 text-slate-400 hover:text-red-500"><i className="fas fa-trash-alt text-xs"></i></button></div>}
                            </div>))}</div></div>
                    </div>)}

                    {/* LOG */}
                    {tab==='log'&&(<div className="glass-strong rounded-2xl border border-white/50 overflow-hidden">
                        <div className="px-4 py-3 flex items-center justify-between" style={{background:'linear-gradient(135deg, #f59e0b, #ea580c)'}}><div className="flex items-center gap-2"><i className="fas fa-history text-white text-sm"></i><span className="text-white font-bold text-sm">Log Aktivitas</span></div><span className="text-amber-100 text-[10px]">{actLog.length} entri</span></div>
                        {actLog.length===0?<div className="p-8 text-center"><p className="text-slate-400 text-sm">Belum ada</p></div>:
                        <div className="divide-y divide-slate-50 max-h-[60vh] overflow-y-auto">{actLog.map((e)=>{const u=getU(e.userId);const meta={schedule_create:{icon:'fa-calendar-plus',color:'text-blue-500',l:'Buat Jadwal'},schedule_edit:{icon:'fa-pen',color:'text-orange-500',l:'Edit Jadwal'},schedule_delete:{icon:'fa-trash',color:'text-red-500',l:'Hapus Jadwal'},timesheet_create:{icon:'fa-file-invoice-dollar',color:'text-green-500',l:'Input Laporan'},timesheet_delete:{icon:'fa-trash',color:'text-red-500',l:'Hapus Laporan'},payment_marked_paid:{icon:'fa-check-circle',color:'text-emerald-500',l:'Tandai Lunas'},payment_reverted:{icon:'fa-undo',color:'text-amber-500',l:'Batalkan Lunas'},user_add:{icon:'fa-user-plus',color:'text-blue-500',l:'Tambah User'},user_edit:{icon:'fa-user-edit',color:'text-orange-500',l:'Edit User'},user_delete:{icon:'fa-user-times',color:'text-red-500',l:'Hapus User'},settings_update:{icon:'fa-cog',color:'text-slate-500',l:'Ubah Setting'}}[e.action]||{icon:'fa-circle',color:'text-slate-400',l:e.action};const d=new Date(e.ts);const lo=new Date(d.getTime()+(TZ_CONFIG[tz]?.offsetUTC||0)*3600000);const ts2=`${String(lo.getUTCHours()).padStart(2,'0')}:${String(lo.getUTCMinutes()).padStart(2,'0')}`;const ds=`${lo.getUTCDate()} ${['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'][lo.getUTCMonth()]}`;return(
                            <div key={e.id} className="flex items-start gap-3 px-4 py-3 hover:bg-slate-50"><div className="w-7 h-7 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5" style={{backgroundColor:(u.color||'#94a3b8')+'20'}}><i className={`fas ${meta.icon} text-[10px] ${meta.color}`}></i></div><div className="flex-1 min-w-0"><div className="flex items-center gap-2 flex-wrap"><span className="text-xs font-bold text-slate-700">{u.displayName}</span><span className="text-[10px] font-semibold px-1.5 py-0.5 rounded-full" style={{backgroundColor:(u.color||'#94a3b8')+'15',color:u.color||'#94a3b8'}}>{meta.l}</span></div><p className="text-[10px] text-slate-400 font-mono mt-0.5 truncate">{e.detail}</p></div><div className="text-right flex-shrink-0"><p className="text-[10px] font-bold text-slate-500">{ts2}</p><p className="text-[9px] text-slate-400">{ds}</p></div></div>);})}</div>}
                    </div>)}

                    {/* CSV */}
                    {tab==='export'&&(<div className="glass-strong rounded-2xl border border-white/50 overflow-hidden">
                        <div className="px-4 py-3" style={{background:'linear-gradient(135deg, #0d9488, #0891b2)'}}><span className="text-white font-bold text-sm"><i className="fas fa-file-csv mr-2"></i>Ekspor Data</span></div>
                        <div className="p-4 space-y-3"><p className="text-[11px] text-slate-400">Unduh sebagai CSV.</p>
                            {[{l:'Jadwal',icon:'fa-calendar-alt',c:'bg-blue-50 border-blue-200 text-blue-700',n:schedules.length,fn:exportSch},{l:'Laporan',icon:'fa-file-invoice-dollar',c:'bg-green-50 border-green-200 text-green-700',n:timesheets.length,fn:exportTs}].map(x=><button key={x.l} onClick={x.fn} className={`w-full flex items-center gap-3 p-3.5 rounded-xl border ${x.c} transition-all active:scale-95`}><div className="w-8 h-8 rounded-lg bg-white/60 flex items-center justify-center flex-shrink-0"><i className={`fas ${x.icon}`}></i></div><div className="flex-1 text-left"><p className="text-xs font-bold">{x.l}</p><p className="text-[10px] opacity-70">{x.n} baris</p></div><i className="fas fa-download text-xs opacity-60"></i></button>)}
                        </div>
                    </div>)}

                    {/* SETTINGS */}
                    {tab==='settings'&&(<div className="space-y-4">
                        <div className="glass-strong rounded-2xl border border-white/50 p-5 space-y-4">
                            <h3 className="text-sm font-bold text-slate-800"><i className="fas fa-sliders-h mr-2" style={{color:theme.primary}}></i>Pengaturan Umum</h3>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Kuota Harian Tim (Jam)</label><input type="number" value={settingsForm.dailyQuotaHours||''} onFocus={()=>setIsEditSt(true)} onChange={e=>setSF({...settingsForm,dailyQuotaHours:parseFloat(e.target.value)||0})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-bold" min="1" max="24" /></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Tarif Default per Jam (USD)</label><input type="number" value={settingsForm.baseHourlyRateUSD||''} onFocus={()=>setIsEditSt(true)} onChange={e=>setSF({...settingsForm,baseHourlyRateUSD:parseFloat(e.target.value)||0})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-bold" min="0" step="0.5" /><p className="text-[9px] text-slate-400 mt-1">Berlaku untuk semua pengguna kecuali yang di-override di bawah.</p></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Kurs USD → IDR</label><input type="number" value={settingsForm.usdToIdr||''} onFocus={()=>setIsEditSt(true)} onChange={e=>setSF({...settingsForm,usdToIdr:parseFloat(e.target.value)||0})} className="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-bold" min="0" /></div>
                        </div>

                        {/* Per-user rate override */}
                        <div className="glass-strong rounded-2xl border border-white/50 p-5 space-y-3">
                            <div><h3 className="text-sm font-bold text-slate-800 flex items-center gap-2"><i className="fas fa-user-tag text-indigo-500"></i>Tarif Khusus per Pengguna</h3><p className="text-[10px] text-slate-400 mt-1">Isi tarif/jam USD khusus. Kosongkan untuk menggunakan tarif default (${settingsForm.baseHourlyRateUSD}/jam).</p></div>
                            <div className="space-y-2">
                                {users.filter(u=>u.role!=='admin'||u.id===session.id).map(u=>{
                                    const saved=settingsForm.userRates?.[u.id];
                                    const hasOvr=saved&&Number(saved)>0;
                                    const val=settingsForm.userRates?.[u.id]!==undefined?String(settingsForm.userRates[u.id]):'';
                                    return(
                                    <div key={u.id} className={`flex items-center gap-3 p-3 rounded-xl border transition-all ${hasOvr?'border-indigo-200 bg-indigo-50/40':'border-slate-100 bg-slate-50/40'}`}>
                                        <div className="w-7 h-7 rounded-xl flex items-center justify-center text-white font-black text-[10px] flex-shrink-0" style={{backgroundColor:u.color||'#94a3b8'}}>{(u.displayName||'?').substring(0,2).toUpperCase()}</div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-xs font-bold text-slate-700 leading-none">{u.displayName}</p>
                                            {!hasOvr&&<p className="text-[9px] text-slate-400 mt-0.5">Default: ${settingsForm.baseHourlyRateUSD}/jam</p>}
                                            {hasOvr&&<p className="text-[9px] text-indigo-500 font-bold mt-0.5">Override: ${Number(saved).toFixed(2)}/jam</p>}
                                        </div>
                                        <div className="flex items-center gap-1.5 flex-shrink-0">
                                            <span className="text-[10px] text-slate-400">$</span>
                                            <input type="number" min="0" step="0.5" placeholder={String(settingsForm.baseHourlyRateUSD)} value={val} onFocus={()=>setIsEditSt(true)} onChange={e=>setSF(prev=>({...prev,userRates:{...prev.userRates,[u.id]:e.target.value}}))} className={`w-20 p-1.5 text-xs font-bold rounded-lg border outline-none text-right transition-all ${hasOvr?'border-indigo-300 bg-white text-indigo-700':'border-slate-200 bg-white text-slate-700'}`} />
                                            <span className="text-[9px] text-slate-400">/jam</span>
                                            {hasOvr&&<button onClick={()=>{setIsEditSt(true);setSF(prev=>{const nr={...prev.userRates};delete nr[u.id];return{...prev,userRates:nr};});}} className="w-5 h-5 rounded-full bg-red-100 hover:bg-red-200 text-red-400 flex items-center justify-center transition" title="Hapus override"><i className="fas fa-times text-[8px]"></i></button>}
                                        </div>
                                    </div>);
                                })}
                            </div>
                        </div>

                        <button onClick={saveSt} disabled={busy||!isEditSt} className="w-full py-2.5 rounded-xl text-white font-bold text-sm transition-all disabled:opacity-40 btn-primary"><i className="fas fa-save mr-2"></i>Simpan Semua Pengaturan</button>
                    </div>)}

                    <UserForm show={showUF} onClose={()=>{setShowUF(false);setEditU(null)}} editing={editU} onSave={saveUser} tenants={null} notify={notify} mode="tenant" fixedTenantId={tenant.id} />
                    <Confirm show={cfm.show} title={cfm.title} msg={cfm.msg} danger={cfm.danger} onOk={cfm.onOk} onNo={()=>setCfm({show:false})} />
                </div>
            );
        };

        const SchedulerApp = ({ session, tenant, onLogout, onBack, notify }) => {
            const [view, setView] = useState('dashboard');
            const [td, setTd] = useState(tenant);
            const [users, setUsers] = useState([]);
            const [schedules, setSch] = useState([]);
            const [timesheets, setTs] = useState([]);
            const [sysSettings, setSys] = useState({ dailyQuotaHours:10, baseHourlyRateUSD:15, usdToIdr:16000 });
            const [tz, setTz] = useState(tenant.defaultTimezone||'WIB');

            const isSA = session.role==='superadmin';
            const isAdm = session.role==='admin'||isSA;
            const hasPerm = (p) => isAdm || (session.permissions||[]).includes(p);
            const canAdmin = isAdm || (session.permissions||[]).some(p=>p.startsWith('admin.'));
            const theme = THEMES[td.themeId]||THEMES[1];

            useEffect(()=>{ applyTheme(td.themeId||1); }, [td.themeId]);
            useEffect(() => {
                if (!tenant?.id) return; const un = [];
                (async () => { try {
                    await window.fa.signInAnonymously(window.auth);
                    un.push(window.fs.onSnapshot(window.fs.doc(window.db,'tenants',tenant.id), s=>{ if(s.exists()){const d=s.data();setTd({id:s.id,...d});if(d.settings)setSys(prev=>({...prev,...d.settings}));} }));
                    un.push(window.fs.onSnapshot(window.fs.query(window.fs.collection(window.db,'users'),window.fs.where('tenantId','==',tenant.id)), s=>setUsers(s.docs.map(d=>({id:d.id,...d.data()})))));
                    un.push(window.fs.onSnapshot(window.fs.collection(window.db,`tenants/${tenant.id}/schedules`), s=>setSch(s.docs.map(d=>({id:d.id,...d.data()})))));
                    un.push(window.fs.onSnapshot(window.fs.collection(window.db,`tenants/${tenant.id}/timesheets`), s=>setTs(s.docs.map(d=>({id:d.id,...d.data()})))));
                } catch(e){console.error(e);} })();
                return () => un.forEach(u=>u());
            }, [tenant?.id]);

            const etzs=td.enabledTimezones||['WIB'];
            const navs=[
                {id:'dashboard',icon:'fa-home',l:'Beranda',show:true},
                {id:'schedule',icon:'fa-calendar-alt',l:'Jadwal',show:hasPerm('schedule.view_own')||hasPerm('schedule.view_all')},
                {id:'timesheet',icon:'fa-file-invoice-dollar',l:'Timesheet',show:hasPerm('timesheet.view_own')||hasPerm('timesheet.view_all')},
                {id:'analytics',icon:'fa-chart-pie',l:'Analitik',show:hasPerm('analytics.view_own')||hasPerm('analytics.view_all')},
                {id:'admin',icon:'fa-cog',l:'Admin',show:canAdmin},
            ].filter(n=>n.show);

            return (
                <div className="min-h-screen pb-24">
                    <header className="glass-strong border-b border-white/30 sticky top-0 z-50 header-shadow">
                        <div className="max-w-2xl mx-auto px-4 py-2.5 flex items-center justify-between">
                            <div className="flex items-center gap-2.5">
                                {onBack&&<button onClick={onBack} className="w-8 h-8 rounded-xl flex items-center justify-center hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all active:scale-90"><i className="fas fa-arrow-left text-sm"></i></button>}
                                <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white text-sm font-bold shadow-md" style={{background:`linear-gradient(135deg, ${theme.primary}, ${theme.primaryDark})`}}>{(td.appName||'S')[0].toUpperCase()}</div>
                                <div><h1 className="text-sm font-extrabold text-slate-800 leading-tight tracking-tight">{td.appName||'Scheduler'}</h1>{td.appTagline&&<p className="text-[10px] text-slate-400 leading-tight">{td.appTagline}</p>}</div>
                            </div>
                            <div className="flex items-center gap-2">
                                {etzs.length>1&&<div className="flex gap-0.5 p-0.5 rounded-lg bg-slate-100/80 border border-slate-200/50">{etzs.map(z=><button key={z} onClick={()=>setTz(z)} className={`px-2.5 py-1 rounded-md text-[10px] font-bold transition-all ${tz===z?'bg-white shadow-sm text-slate-800':'text-slate-400 hover:text-slate-600'}`}>{z}</button>)}</div>}
                                <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-[11px] font-bold shadow-sm ring-2 ring-white/60" style={{background:session.color||theme.primary}}>{(session.displayName||'?')[0].toUpperCase()}</div>
                                <button onClick={onLogout} className="w-8 h-8 rounded-xl flex items-center justify-center hover:bg-red-50 text-slate-300 hover:text-red-500 transition-all active:scale-90" title="Keluar"><i className="fas fa-sign-out-alt text-sm"></i></button>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-2xl mx-auto px-4 py-5">
                        <div key={view} className="animate-view-enter">
                            {view==='dashboard'&&<DashboardView session={session} td={td} users={users} schedules={schedules} timesheets={timesheets} tz={tz} theme={theme} hasPerm={hasPerm} sysSettings={sysSettings} notify={notify} tenant={tenant} />}
                            {view==='schedule'&&<ScheduleView schedules={schedules} timesheets={timesheets} users={users} session={session} tenant={tenant} td={td} tz={tz} theme={theme} hasPerm={hasPerm} notify={notify} sysSettings={sysSettings} />}
                            {view==='timesheet'&&<TimesheetView schedules={schedules} timesheets={timesheets} users={users} session={session} tenant={tenant} td={td} tz={tz} theme={theme} hasPerm={hasPerm} notify={notify} sysSettings={sysSettings} />}
                            {view==='analytics'&&<AnalyticsView schedules={schedules} timesheets={timesheets} users={users} session={session} tz={tz} theme={theme} hasPerm={hasPerm} sysSettings={sysSettings} />}
                            {view==='admin'&&canAdmin&&<TenantAdminView users={users} timesheets={timesheets} schedules={schedules} session={session} tenant={tenant} td={td} tz={tz} theme={theme} notify={notify} sysSettings={sysSettings} hasPerm={hasPerm} />}
                        </div>
                    </main>
                    <nav className="fixed bottom-0 left-0 right-0 z-50">
                        <div className="max-w-2xl mx-auto">
                            <div className="mx-3 mb-3 glass-strong rounded-2xl shadow-xl border border-white/60 px-2 py-2" style={{display:'grid',gridTemplateColumns:`repeat(${navs.length},1fr)`,gap:'4px'}}>
                                {navs.map(n=>{const isAct=view===n.id;return(
                                    <button key={n.id} onClick={()=>setView(n.id)} className={`nav-dot ${isAct?'active':''} flex flex-col items-center py-2 px-1 rounded-xl transition-all duration-250 active:scale-90 select-none relative ${isAct?'':'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`} style={isAct?{color:theme.primary}:{}}>
                                        <i className={`fas ${n.icon} text-base transition-transform duration-200 ${isAct?'scale-110':''}`}></i>
                                        <span className={`text-[9px] font-bold mt-1 tracking-tight transition-colors ${isAct?'':'text-slate-400'}`} style={isAct?{color:theme.primary}:{}}>{n.l}</span>
                                    </button>);})}
                            </div>
                        </div>
                    </nav>
                </div>
            );
        };

        /* ═══════════════════════════════════════════════
           ROOT APP
           ═══════════════════════════════════════════════ */
        const App = () => {
            const [state, setState] = useState('loading');
            const [session, setSession] = useState(null);
            const [tenant, setTenant] = useState(null);
            const [notifs, setNotifs] = useState([]);
            const notify = useCallback((msg, type='info', dur=3500) => { const id=Date.now()+Math.random(); setNotifs(p=>[...p,{id,msg,type}]); setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),dur); }, []);

            useEffect(() => {
                const waitFb = () => new Promise(res => {
                    const check = () => (window.db && window.fs && window.fa) ? res() : setTimeout(check, 100);
                    check();
                });
                (async () => { try {
                    await waitFb();
                    await window.fa.signInAnonymously(window.auth);
                    const cfg=await window.fs.getDoc(window.fs.doc(window.db,'system','config'));
                    if(!cfg.exists()||!cfg.data().setupComplete){setState('setup');return;}
                    const saved=loadSession();
                    if(saved){
                        const uSnap=await window.fs.getDoc(window.fs.doc(window.db,'users',saved.id));
                        if(uSnap.exists()&&uSnap.data().isActive){
                            const d=uSnap.data();
                            const s={...saved,displayName:d.displayName,role:d.role,tenantId:d.tenantId,permissions:d.permissions||[],color:d.color||'#2563eb'};
                            setSession(s);saveSession(s);
                            if(s.role==='superadmin'){applyTheme(1);setState('super');return;}
                            if(s.tenantId){
                                const tSnap=await window.fs.getDoc(window.fs.doc(window.db,'tenants',s.tenantId));
                                if(tSnap.exists()){setTenant({id:tSnap.id,...tSnap.data()});applyTheme(tSnap.data().themeId||1);setState('app');return;}
                            }
                        }
                        clearSession();
                    }
                    setState('login');
                } catch(e){console.error('Boot error:',e);setState('login');} })();
            }, []);

            const login=(s)=>{setSession(s);saveSession(s);if(s.role==='superadmin'){applyTheme(1);setState('super');}else if(s.tenantId){window.fs.getDoc(window.fs.doc(window.db,'tenants',s.tenantId)).then(snap=>{if(snap.exists()){const t={id:snap.id,...snap.data()};setTenant(t);applyTheme(t.themeId||1);setState('app');}else notify('Workspace tidak ditemukan','error');});}};
            const logout=()=>{clearSession();setSession(null);setTenant(null);applyTheme(1);setState('login');notify('Berhasil keluar','info');};
            const enterTenant=(t)=>{setTenant(t);applyTheme(t.themeId||1);setState('app');};
            const backToSuper=()=>{setTenant(null);applyTheme(1);setState('super');};

            return (<>
                <Notifs items={notifs} />
                {state==='loading'&&<div className="min-h-screen flex flex-col items-center justify-center animate-fade-in"><div className="relative"><div className="w-14 h-14 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg" style={{background:'linear-gradient(135deg, var(--c-primary), var(--c-primary-dark))',animation:'spinGrow 0.6s ease-out'}}><i className="fas fa-layer-group"></i></div><div className="absolute -inset-2 rounded-3xl border-2 border-slate-200 animate-ping opacity-20"></div></div><p className="mt-5 text-sm font-semibold text-slate-400 animate-pulse">Memuat aplikasi...</p></div>}
                {state==='setup'&&<SetupWizard onDone={s=>{setSession(s);saveSession(s);applyTheme(1);setState('super')}} notify={notify} />}
                {state==='login'&&<Login onLogin={login} notify={notify} />}
                {state==='super'&&session&&<SuperDash session={session} onLogout={logout} notify={notify} onEnter={enterTenant} />}
                {state==='app'&&session&&tenant&&<SchedulerApp session={session} tenant={tenant} onLogout={logout} onBack={session.role==='superadmin'?backToSuper:null} notify={notify} />}
            </>);
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
